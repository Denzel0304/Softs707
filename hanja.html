<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한자 암기 — 급수별 학습</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hanzi-writer/3.5.1/hanzi-writer.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --ink: #1a1208;
    --paper: #faf7f0;
    --paper2: #f0ebe0;
    --accent: #8b4513;
    --accent2: #c8860a;
    --dim: #8a7d6a;
    --border: #d4c9b0;
    --green: #3a7d44;
    --red: #c0392b;
    --blue: #1a5276;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: .04em;
  }
  .logo span { color: var(--accent2); }

  /* ── GRADE TABS ── */
  .grade-bar {
    background: var(--paper2);
    border-bottom: 2px solid var(--border);
    padding: 0 16px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .grade-bar::-webkit-scrollbar { display: none; }
  .grade-btn {
    padding: 10px 14px;
    border: none;
    background: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: .85rem;
    font-weight: 500;
    color: var(--dim);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color .2s, border-color .2s;
  }
  .grade-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 700;
  }
  .grade-btn:hover:not(.active) { color: var(--ink); }

  /* ── MODE TABS ── */
  .mode-bar {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .mode-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--paper);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: .82rem;
    cursor: pointer;
    color: var(--dim);
    transition: all .2s;
  }
  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 700;
  }

  /* ── MAIN CONTENT ── */
  .main { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* ── GRID (목록) ── */
  .hanja-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .hanja-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow .2s, transform .15s;
    position: relative;
  }
  .hanja-card:hover { box-shadow: 0 4px 16px #0001; transform: translateY(-2px); }
  .hanja-card.memorized {
    border-color: var(--green);
    background: #f0faf2;
  }
  .hanja-char {
    font-family: 'Noto Serif KR', serif;
    font-size: 2.2rem;
    line-height: 1.1;
    color: var(--ink);
    display: block;
  }
  .hanja-hoon { font-size: .78rem; color: var(--dim); margin-top: 4px; }
  .hanja-um { font-size: .9rem; font-weight: 700; color: var(--accent); }
  .mem-badge {
    position: absolute;
    top: 6px; right: 8px;
    font-size: .7rem;
    color: var(--green);
    font-weight: 700;
  }
  .grade-badge {
    position: absolute;
    top: 6px; left: 8px;
    font-size: .62rem;
    color: var(--dim);
    background: var(--paper2);
    border-radius: 4px;
    padding: 1px 4px;
  }

  /* ── FLASHCARD ── */
  .flash-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 8px 0;
  }
  .flash-progress {
    font-size: .82rem;
    color: var(--dim);
    align-self: flex-end;
  }
  .flashcard {
    width: min(340px, 100%);
    height: 240px;
    perspective: 900px;
    cursor: pointer;
  }
  .flashcard-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .45s cubic-bezier(.4,0,.2,1);
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flash-face {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 24px #0002;
    border: 2px solid var(--border);
  }
  .flash-front { background: white; }
  .flash-back { background: var(--ink); color: var(--paper); transform: rotateY(180deg); }
  .flash-hanja {
    font-family: 'Noto Serif KR', serif;
    font-size: 5rem;
    line-height: 1;
  }
  .flash-hint { font-size: .8rem; color: var(--dim); margin-top: 8px; }
  .flash-hoon { font-size: 1.1rem; color: var(--accent2); }
  .flash-um { font-size: 2rem; font-weight: 700; margin-top: 4px; }
  .flash-grade-info { font-size: .8rem; color: var(--dim); margin-top: 8px; }

  .flash-nav {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .flash-nav button {
    padding: 10px 22px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: .9rem;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background .15s;
  }
  .flash-nav button:hover { background: var(--paper2); }
  .flash-nav .mem-btn {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }
  .flash-nav .mem-btn.off {
    background: white;
    color: var(--green);
  }

  /* ── WRITER ── */
  .writer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 8px 0;
  }
  .writer-info { text-align: center; }
  .writer-hanja {
    font-family: 'Noto Serif KR', serif;
    font-size: 2rem;
    color: var(--ink);
  }
  .writer-sub { font-size: .9rem; color: var(--dim); margin-top: 4px; }
  #writer-container {
    border: 2px solid var(--border);
    border-radius: 12px;
    background: white;
    overflow: hidden;
  }
  .writer-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .writer-controls button {
    padding: 9px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: .85rem;
    cursor: pointer;
    transition: background .15s;
  }
  .writer-controls button:hover { background: var(--paper2); }
  .writer-controls .primary-btn {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .writer-controls .primary-btn:hover { background: #6b3510; }
  .writer-nav { display: flex; gap: 8px; align-items: center; font-size: .85rem; color: var(--dim); }
  .writer-nav button {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background .15s;
  }
  .writer-nav button:hover { background: var(--paper2); }

  /* ── QUIZ ── */
  .quiz-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding: 8px 0;
    max-width: 480px;
    margin: 0 auto;
  }
  .quiz-question {
    background: white;
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 30px 24px;
    text-align: center;
    width: 100%;
  }
  .quiz-q-label { font-size: .8rem; color: var(--dim); margin-bottom: 10px; }
  .quiz-q-hanja {
    font-family: 'Noto Serif KR', serif;
    font-size: 4.5rem;
    line-height: 1;
    display: block;
  }
  .quiz-q-text { font-size: 1.3rem; font-weight: 700; color: var(--ink); }
  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
  }
  .quiz-opt {
    padding: 14px 10px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: .95rem;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--accent); background: #fdf6ed; }
  .quiz-opt.correct { border-color: var(--green); background: #edfaf1; color: var(--green); font-weight: 700; }
  .quiz-opt.wrong { border-color: var(--red); background: #fdecea; color: var(--red); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-score { font-size: .9rem; color: var(--dim); }
  .quiz-result {
    text-align: center;
    padding: 24px;
    background: white;
    border-radius: 16px;
    border: 2px solid var(--border);
    width: 100%;
  }
  .quiz-result .big { font-size: 2.5rem; font-weight: 700; color: var(--accent); font-family: 'Noto Serif KR', serif; }
  .quiz-restart {
    padding: 12px 28px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 10px 16px;
    background: var(--paper2);
    border-bottom: 1px solid var(--border);
    font-size: .8rem;
    color: var(--dim);
    flex-wrap: wrap;
  }
  .stats-bar strong { color: var(--ink); }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--dim); }
  .empty .big-char { font-family: 'Noto Serif KR', serif; font-size: 4rem; color: var(--border); display: block; }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    header { padding: 12px 16px; }
    .logo { font-size: 1.2rem; }

    .grade-bar { padding: 0 8px; }
    .grade-btn { padding: 8px 10px; font-size: .78rem; }

    .mode-bar { padding: 10px 12px; gap: 6px; }
    .mode-btn { padding: 7px 12px; font-size: .78rem; }

    .main { padding: 12px; }

    /* 목록 — 모바일은 3열로 */
    .hanja-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .hanja-card { padding: 10px 6px; }
    .hanja-char { font-size: 1.8rem; }
    .hanja-hoon { font-size: .7rem; }
    .hanja-um { font-size: .82rem; }
    .grade-badge { font-size: .58rem; }

    /* 플래시카드 */
    .flashcard { height: 200px; }
    .flash-hanja { font-size: 4rem; }
    .flash-nav { flex-wrap: wrap; justify-content: center; gap: 8px; }
    .flash-nav button { padding: 9px 14px; font-size: .82rem; }

    /* 퀴즈 */
    .quiz-question { padding: 20px 14px; }
    .quiz-q-hanja { font-size: 3.5rem; }
    .quiz-q-text { font-size: 1.1rem; }
    .quiz-options { gap: 8px; }
    .quiz-opt { padding: 12px 8px; font-size: .88rem; }

    /* 획순 */
    #writer-container { width: 100%; display: flex; justify-content: center; }
    .writer-hanja { font-size: 1.6rem; }
    .writer-controls { gap: 6px; }
    .writer-controls button { padding: 8px 12px; font-size: .8rem; }
    .writer-nav button { padding: 7px 12px; }

    /* 통계바 */
    .stats-bar { gap: 10px; font-size: .75rem; padding: 8px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">漢字 <span>암기</span></div>
  <div style="font-size:.8rem;color:#aaa;">한국어문회 급수별 · 8급~5급</div>
</header>

<div class="grade-bar" id="gradeTabs"></div>

<div class="stats-bar" id="statsBar"></div>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('list')">📋 목록</button>
  <button class="mode-btn" onclick="setMode('flash')">🃏 플래시카드</button>
  <button class="mode-btn" onclick="setMode('quiz')">✏️ 퀴즈</button>
  <button class="mode-btn" onclick="setMode('writer')">🖌️ 획순</button>
</div>

<div class="main" id="mainContent"></div>

// 전체 합치기
const ALL_GRADES = Object.keys(HANJA_DATA);
let currentGrade = 'all';
let currentMode = 'list';
let memorized = JSON.parse(localStorage.getItem('hanja_mem') || '{}');
let flashIdx = 0;
let flashList = [];
let quizState = null;
let writerObj = null;
let writerIdx = 0;

function saveMemorized() {
  localStorage.setItem('hanja_mem', JSON.stringify(memorized));
}

function getList(grade) {
  if (grade === 'all') return ALL_GRADES.flatMap(g => HANJA_DATA[g].map(h => ({char:h[0],hoon:h[1],um:h[2],grade:g})));
  return (HANJA_DATA[grade] || []).map(h => ({char:h[0],hoon:h[1],um:h[2],grade:grade}));
}

function getMemKey(item) { return item.grade + '_' + item.char; }

// ── GRADE TABS ──
function buildGradeTabs() {
  const bar = document.getElementById('gradeTabs');
  bar.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'grade-btn' + (currentGrade==='all'?' active':'');
  all.textContent = '전체 (500자)';
  all.onclick = () => { currentGrade='all'; buildGradeTabs(); updateStats(); render(); };
  bar.appendChild(all);
  ALL_GRADES.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'grade-btn' + (currentGrade===g?' active':'');
    const cnt = HANJA_DATA[g].length;
    btn.textContent = `${g} (${cnt}자)`;
    btn.onclick = () => { currentGrade=g; buildGradeTabs(); updateStats(); render(); };
    bar.appendChild(btn);
  });
}

// ── STATS ──
function updateStats() {
  const list = getList(currentGrade);
  const total = list.length;
  const done = list.filter(h => memorized[getMemKey(h)]).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('statsBar').innerHTML =
    `<span>총 <strong>${total}</strong>자</span>` +
    `<span>암기 완료 <strong style="color:var(--green)">${done}</strong>자</span>` +
    `<span>미암기 <strong style="color:var(--accent)">${total-done}</strong>자</span>` +
    `<span>진도 <strong>${pct}%</strong></span>`;
}

// ── MODE SWITCH ──
function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    b.classList.toggle('active', ['list','flash','quiz','writer'][i]===m);
  });
  flashIdx = 0;
  render();
}

// ── RENDER ──
function render() {
  if (currentMode === 'list') renderList();
  else if (currentMode === 'flash') renderFlash();
  else if (currentMode === 'quiz') renderQuiz();
  else if (currentMode === 'writer') renderWriter();
}

// ── 목록 ──
function renderList() {
  const list = getList(currentGrade);
  const main = document.getElementById('mainContent');
  if (!list.length) { main.innerHTML = '<div class="empty"><span class="big-char">無</span>데이터 없음</div>'; return; }
  main.innerHTML = '<div class="hanja-grid" id="hGrid"></div>';
  const grid = document.getElementById('hGrid');
  list.forEach(h => {
    const key = getMemKey(h);
    const card = document.createElement('div');
    card.className = 'hanja-card' + (memorized[key]?' memorized':'');
    card.innerHTML = `
      <span class="grade-badge">${h.grade}</span>
      ${memorized[key]?'<span class="mem-badge">✓</span>':''}
      <span class="hanja-char">${h.char}</span>
      <div class="hanja-hoon">${h.hoon}</div>
      <div class="hanja-um">${h.um}</div>
    `;
    card.onclick = () => {
      memorized[key] = !memorized[key];
      saveMemorized();
      updateStats();
      renderList();
    };
    grid.appendChild(card);
  });
}

// ── 플래시카드 ──
function renderFlash(idxOverride) {
  const list = getList(currentGrade);
  if (!list.length) { document.getElementById('mainContent').innerHTML = '<div class="empty"><span class="big-char">無</span>데이터 없음</div>'; return; }
  if (idxOverride !== undefined) flashIdx = idxOverride;
  if (flashIdx >= list.length) flashIdx = 0;
  if (flashIdx < 0) flashIdx = list.length - 1;
  flashList = list;
  const h = list[flashIdx];
  const key = getMemKey(h);
  document.getElementById('mainContent').innerHTML = `
    <div class="flash-wrap">
      <div class="flash-progress">${flashIdx+1} / ${list.length}</div>
      <div class="flashcard" id="fc" onclick="document.getElementById('fc').classList.toggle('flipped')">
        <div class="flashcard-inner">
          <div class="flash-face flash-front">
            <span class="flash-hanja">${h.char}</span>
            <div class="flash-hint">탭하면 정답 공개</div>
          </div>
          <div class="flash-face flash-back">
            <div class="flash-hoon">${h.hoon}</div>
            <div class="flash-um">${h.um}</div>
            <div class="flash-grade-info">${h.grade}</div>
          </div>
        </div>
      </div>
      <div class="flash-nav">
        <button onclick="renderFlash(${flashIdx-1})">◀ 이전</button>
        <button class="mem-btn ${memorized[key]?'':'off'}" onclick="toggleMemFlash('${key}',${flashIdx})">
          ${memorized[key]?'✓ 암기완료':'암기완료 표시'}
        </button>
        <button onclick="renderFlash(${flashIdx+1})">다음 ▶</button>
      </div>
      <button style="padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:inherit" onclick="shuffleFlash()">🔀 섞기</button>
    </div>
  `;
}

function toggleMemFlash(key, idx) {
  memorized[key] = !memorized[key];
  saveMemorized();
  updateStats();
  renderFlash(idx);
}

function shuffleFlash() {
  const list = getList(currentGrade);
  flashList = list.sort(() => Math.random() - 0.5);
  flashIdx = 0;
  // re-render with shuffled
  renderFlashDirect(flashList);
}

function renderFlashDirect(list) {
  if (!list.length) return;
  const h = list[flashIdx];
  const key = getMemKey(h);
  document.getElementById('mainContent').innerHTML = `
    <div class="flash-wrap">
      <div class="flash-progress">${flashIdx+1} / ${list.length} (섞음)</div>
      <div class="flashcard" id="fc" onclick="document.getElementById('fc').classList.toggle('flipped')">
        <div class="flashcard-inner">
          <div class="flash-face flash-front">
            <span class="flash-hanja">${h.char}</span>
            <div class="flash-hint">탭하면 정답 공개</div>
          </div>
          <div class="flash-face flash-back">
            <div class="flash-hoon">${h.hoon}</div>
            <div class="flash-um">${h.um}</div>
            <div class="flash-grade-info">${h.grade}</div>
          </div>
        </div>
      </div>
      <div class="flash-nav">
        <button onclick="flashIdx=Math.max(0,flashIdx-1);renderFlashDirect(flashList)">◀ 이전</button>
        <button class="mem-btn ${memorized[key]?'':'off'}" onclick="memorized['${key}']=!memorized['${key}'];saveMemorized();updateStats();renderFlashDirect(flashList)">
          ${memorized[key]?'✓ 암기완료':'암기완료 표시'}
        </button>
        <button onclick="flashIdx=Math.min(flashList.length-1,flashIdx+1);renderFlashDirect(flashList)">다음 ▶</button>
      </div>
      <button style="padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:inherit" onclick="shuffleFlash()">🔀 다시 섞기</button>
    </div>
  `;
}

// ── 퀴즈 ──
function renderQuiz(reset) {
  const list = getList(currentGrade);
  if (list.length < 4) {
    document.getElementById('mainContent').innerHTML = '<div class="empty"><span class="big-char">少</span>퀴즈를 위해 4자 이상 필요합니다</div>';
    return;
  }
  if (!quizState || reset) {
    const shuffled = [...list].sort(() => Math.random()-.5);
    quizState = { list: shuffled, idx: 0, score: 0, answered: false, total: Math.min(20, shuffled.length) };
  }
  const qs = quizState;
  if (qs.idx >= qs.total) {
    document.getElementById('mainContent').innerHTML = `
      <div class="quiz-wrap">
        <div class="quiz-result">
          <div style="font-size:.9rem;color:var(--dim);margin-bottom:8px">최종 점수</div>
          <div class="big">${qs.score} / ${qs.total}</div>
          <div style="margin-top:8px;color:var(--dim)">${Math.round(qs.score/qs.total*100)}점</div>
        </div>
        <button class="quiz-restart" onclick="renderQuiz(true)">다시 퀴즈</button>
      </div>
    `;
    return;
  }
  const h = qs.list[qs.idx];
  // 보기 4개 (정답 + 오답 3)
  const wrong = list.filter(x => x.char !== h.char).sort(() => Math.random()-.5).slice(0,3);
  const opts = [...wrong, h].sort(() => Math.random()-.5);
  // 퀴즈 타입: 홀수=한자→훈음, 짝수=훈음→한자
  const type = qs.idx % 2;
  document.getElementById('mainContent').innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-score">${qs.idx+1}/${qs.total} · 점수: ${qs.score}</div>
      <div class="quiz-question">
        <div class="quiz-q-label">${type===0?'이 한자의 훈·음은?':'이 훈·음의 한자는?'}</div>
        ${type===0
          ? `<span class="quiz-q-hanja">${h.char}</span>`
          : `<span class="quiz-q-text">${h.hoon} ${h.um}</span>`
        }
      </div>
      <div class="quiz-options" id="qOpts">
        ${opts.map((o,i) => `
          <button class="quiz-opt" id="qo${i}" onclick="answerQuiz(${i}, '${o.char}', '${h.char}')">
            ${type===0 ? o.hoon+' '+o.um : o.char}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function answerQuiz(idx, chosen, correct) {
  const qs = quizState;
  if (qs.answered) return;
  qs.answered = true;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    const char = chosen === correct ? chosen : null;
    // 정답 버튼 찾기
  });
  // 정답/오답 표시
  opts.forEach((btn, i) => {
    const txt = btn.textContent.trim();
    // check by index
  });
  if (chosen === correct) qs.score++;
  // 각 버튼에 정답/오답 클래스
  const allOpts = document.querySelectorAll('.quiz-opt');
  const type = qs.idx % 2;
  const list = getList(currentGrade);
  const h = qs.list[qs.idx];
  const wrong = list.filter(x => x.char !== h.char).sort(() => Math.random()-.5).slice(0,3);
  // 현재 opts는 이미 랜덤 배치됨 — chosen/correct로 직접 판단
  allOpts.forEach((btn,i) => {
    const val = btn.textContent.trim();
    const correctVal = type===0 ? h.hoon+' '+h.um : h.char;
    const chosenVal = allOpts[idx].textContent.trim();
    if (val === correctVal) btn.classList.add('correct');
    else if (i === idx && chosen !== correct) btn.classList.add('wrong');
    btn.disabled = true;
  });
  setTimeout(() => {
    qs.idx++;
    qs.answered = false;
    renderQuiz();
  }, 1200);
}

        <button onclick="writerGo(${writerIdx+1})">다음 ▶</button>
      </div>
      <div id="writer-msg" style="font-size:.82rem;color:var(--dim);text-align:center"></div>
    </div>
  `;
  // HanziWriter 초기화 — 화면 폭에 맞게 캔버스 크기 동적 조정
  setTimeout(() => {
    try {
      const size = Math.min(220, window.innerWidth - 80);
      writerObj = HanziWriter.create('writer-container', h.char, {
        width: size, height: size,
        padding: 14,
        strokeColor: '#1a1208',
        radicalColor: '#8b4513',
        highlightColor: '#c8860a',
        outlineColor: '#d4c9b0',
        showOutline: true,
        showCharacter: false,
        strokeAnimationSpeed: 1,
        delayBetweenStrokes: 300,
      });
    } catch(e) {
      const msg = document.getElementById('writer-msg');
      if (msg) msg.textContent = '⚠️ 이 한자의 획순 데이터를 불러올 수 없습니다.';
    }
  }, 100);
}

function writerAnimate() {
  if (!writerObj) return;
  writerObj.animateCharacter();
}

function writerQuizMode() {
  if (!writerObj) return;
  document.getElementById('writer-msg').textContent = '획순대로 따라 그려보세요!';
  writerObj.quiz({
    onComplete: () => {
      document.getElementById('writer-msg').textContent = '✓ 완성! 잘 하셨습니다.';
    }
  });
}

function writerReset() {
  if (!writerObj) return;
  writerObj.cancelQuiz();
  writerObj.setCharacter(getList(currentGrade)[writerIdx].char);
}

function writerGo(idx) {
  const list = getList(currentGrade);
  writerIdx = ((idx % list.length) + list.length) % list.length;
  writerObj = null;
  renderWriter();
}

// ── INIT ──
buildGradeTabs();
updateStats();
render();
</script>
</body>
</html>

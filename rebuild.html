<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rebuild</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f8f4;
    --bg2: #eaf3ea;
    --surface: #ffffff;
    --surface2: #f0f7f0;
    --border: #cde3cd;
    --border-light: #e2f0e2;
    --green-1: #4a9e6b;
    --green-2: #3d8a5c;
    --green-3: #6bbf8e;
    --green-soft: #a8d5b5;
    --green-pale: #d4edda;
    --green-mist: #e8f5eb;
    --text-primary: #1e3a2f;
    --text-secondary: #4a7060;
    --text-muted: #7da98d;
    --text-light: #aec9b5;
    --accent: #4a9e6b;
    --accent-hover: #3d8a5c;
    --danger: #c0392b;
    --danger-soft: #fdecea;
    --shadow-sm: 0 1px 4px rgba(74,158,107,0.08);
    --shadow-md: 0 4px 20px rgba(74,158,107,0.12);
    --shadow-lg: 0 8px 40px rgba(74,158,107,0.18);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── APP SHELL ── */
  #app {
    width: 100%; max-width: 430px;
    height: 100dvh;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top));
    background: var(--surface);
    border-bottom: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 72px;
  }

  .header-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Serif Display', serif;
    font-size: 27px;
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: 0.02em;
    white-space: nowrap;
    pointer-events: none;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 72px;
    justify-content: flex-end;
  }

  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--green-mist);
    color: var(--green-1);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background var(--transition), transform 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.92); background: var(--green-pale); }
  .icon-btn svg { width: 18px; height: 18px; }

  .back-btn {
    background: var(--green-mist);
    color: var(--green-1);
  }
  .back-btn:active { transform: scale(0.92); background: var(--green-pale); }

  /* ── SCREENS ── */
  .screen {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ── MAIN SCREEN ── */
  #screen-main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    gap: 0;
    min-height: 0;
  }

  /* Decorative background */
  #screen-main::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 240px; height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(107,191,142,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  #screen-main::after {
    content: '';
    position: absolute;
    bottom: 20px; left: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,158,107,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .quote-container {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 0;
    position: relative;
    z-index: 1;
    width: 100%;
  }

  .quote-card {
    background: var(--surface);
    border-radius: 24px;
    padding: 36px 30px 30px;
    width: 100%;
    max-height: 100%;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border-light);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .quote-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--green-3), var(--green-1), var(--green-soft));
    border-radius: 24px 24px 0 0;
  }

  .quote-deco {
    font-family: 'DM Serif Display', serif;
    font-size: 64px;
    line-height: 0.7;
    color: var(--green-pale);
    margin-bottom: 2px;
    display: block;
    flex-shrink: 0;
    user-select: none;
  }

  /* Flexible text area: takes remaining space, text auto-fits inside it */
  .quote-text-wrap {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 6px 0;
  }

  .quote-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 400;
    line-height: 1.55;
    color: var(--text-primary);
    text-align: center;
    word-break: keep-all;
    overflow-wrap: break-word;
    text-wrap: balance;
    letter-spacing: 0.01em;
    width: 100%;
    margin: 0;
  }

  .quote-text.empty {
    font-size: 16px !important;
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
  }

  .quote-counter {
    margin-top: 18px;
    text-align: center;
    font-size: 12px;
    color: var(--text-light);
    font-weight: 300;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin: 10px auto 0;
    flex-wrap: wrap;
    max-width: 200px;
    flex-shrink: 0;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.played { background: var(--green-soft); }
  .dot.current { background: var(--green-1); transform: scale(1.3); }

  /* Timer bar */
  .timer-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--border-light);
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green-3), var(--green-1));
    border-radius: 2px;
    width: 100%;
    transform-origin: left;
    animation: timerShrink 7s linear forwards;
  }
  @keyframes timerShrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }

  /* Bottom controls */
  .bottom-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 28px 22px;
    padding-bottom: max(22px, env(safe-area-inset-bottom));
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .time-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.05em;
    background: var(--surface);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border-light);
  }

  .toggles-group {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .toggle-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .toggle {
    position: relative;
    width: 46px; height: 26px;
    cursor: pointer;
  }
  .toggle input { display: none; }
  .toggle-track {
    position: absolute;
    inset: 0;
    border-radius: 13px;
    background: var(--border);
    transition: background var(--transition);
  }
  .toggle input:checked ~ .toggle-track { background: var(--green-1); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transition: transform var(--transition);
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

  /* 응급 모드 토글: 평소 분홍, ON 시 빨강 (시간/요일과 무관, 수동 토글 전용) */
  .toggle-emergency .toggle-track { background: #f4a7c1; }
  .toggle-emergency input:checked ~ .toggle-track { background: #e0314f; }

  /* Quote fade animation */
  .quote-fade-out { opacity: 0; transform: translateY(-8px); }
  .quote-fade-in  { animation: fadeInUp 0.5s ease forwards; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SETTINGS SCREEN ── */
  #screen-settings {
    display: none;
    flex-direction: column;
  }
  #screen-settings.active { display: flex; }

  .settings-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
  }

  .category-section {
    margin-bottom: 20px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 4px 10px;
    margin-bottom: 4px;
  }

  .category-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-morning .category-dot { background: #f4a946; }
  .cat-work .category-dot { background: #4ab8d4; }
  .cat-night .category-dot { background: #7c6bae; }
  .cat-always .category-dot { background: var(--green-1); }
  .cat-emergency .category-dot { background: #e0314f; }

  .category-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    flex: 1;
  }

  .category-count {
    font-size: 11px;
    color: var(--text-light);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .phrase-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 14px 14px;
    margin-bottom: 6px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    transition: background var(--transition);
    cursor: pointer;
  }
  .phrase-item:active { background: var(--green-mist); }

  .phrase-item-text {
    flex: 1;
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.5;
    font-weight: 300;
  }

  .phrase-delete-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-light);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background var(--transition), color var(--transition);
    padding: 0;
  }
  .phrase-delete-btn:active { background: var(--danger-soft); color: var(--danger); }
  .phrase-delete-btn svg { width: 14px; height: 14px; }

  .empty-category {
    text-align: center;
    padding: 12px;
    font-size: 13px;
    color: var(--text-light);
    font-weight: 300;
  }

  /* ── MODALS ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,58,47,0.35);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal-sheet {
    width: 100%;
    max-width: 430px;
    background: var(--surface);
    border-radius: 28px 28px 0 0;
    padding: 0 0 max(28px, env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height: 92dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-overlay.open .modal-sheet {
    transform: translateY(0);
  }

  .modal-handle {
    width: 40px; height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin: 14px auto 0;
    flex-shrink: 0;
  }

  .modal-header {
    padding: 20px 24px 16px;
    flex-shrink: 0;
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text-primary);
    font-weight: 400;
  }

  .modal-body {
    padding: 0 24px 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1;
  }

  /* Category tabs */
  .cat-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .cat-tab {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all var(--transition);
    font-weight: 400;
  }
  .cat-tab.selected {
    border-color: var(--green-1);
    background: var(--green-mist);
    color: var(--green-2);
    font-weight: 500;
  }

  .input-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
    display: block;
  }

  .input-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .input-label-row .input-label { margin-bottom: 8px; }

  .char-counter {
    font-size: 11px;
    color: var(--text-light);
    font-weight: 300;
    letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  .char-counter.near-limit { color: var(--green-1); font-weight: 500; }

  .phrase-textarea {
    width: 100%;
    min-height: 120px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 15px;
    font-family: 'Noto Serif KR', serif;
    color: var(--text-primary);
    background: var(--surface2);
    resize: none;
    outline: none;
    line-height: 1.6;
    transition: border-color var(--transition);
    user-select: text;
    -webkit-user-select: text;
  }
  .phrase-textarea:focus {
    border-color: var(--green-1);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(74,158,107,0.1);
  }
  .phrase-textarea::placeholder { color: var(--text-light); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; }

  .modal-footer {
    padding: 12px 24px 0;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
  }

  .btn-primary {
    background: var(--green-1);
    color: white;
  }
  .btn-primary:active { background: var(--green-2); transform: scale(0.98); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-secondary:active { background: var(--border); }

  .btn-danger {
    background: var(--danger-soft);
    color: var(--danger);
    border: 1px solid rgba(192,57,43,0.15);
  }

  /* Confirm modal */
  .confirm-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,58,47,0.45);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
  }
  .confirm-modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .confirm-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px 24px 20px;
    width: 100%;
    max-width: 320px;
    transform: scale(0.92);
    transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
    box-shadow: var(--shadow-lg);
  }
  .confirm-modal-overlay.open .confirm-card { transform: scale(1); }

  .confirm-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .confirm-msg {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .confirm-quote-preview {
    font-size: 13px;
    color: var(--green-2);
    background: var(--green-mist);
    border-radius: var(--radius-xs);
    padding: 8px 12px;
    margin-bottom: 16px;
    font-style: italic;
    word-break: keep-all;
  }

  .confirm-actions {
    display: flex;
    gap: 8px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: max(30px, env(safe-area-inset-bottom, 30px));
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text-primary);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 300;
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--green-soft); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-left" id="header-left">
      <!-- back button injected by JS when on settings -->
    </div>
    <span class="header-title">Rebuild</span>
    <div class="header-right" id="header-right">
      <button class="icon-btn" id="btn-add" aria-label="문구 추가">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <button class="icon-btn" id="btn-settings" aria-label="설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- MAIN SCREEN -->
  <section class="screen" id="screen-main">
    <div class="quote-container">
      <div class="quote-card" id="quote-card">
        <span class="quote-deco">"</span>
        <div class="quote-text-wrap">
          <p class="quote-text" id="quote-text">문구를 추가해보세요</p>
        </div>
        <div class="timer-bar-wrap" id="timer-bar-wrap" style="display:none">
          <div class="timer-bar" id="timer-bar"></div>
        </div>
        <p class="quote-counter" id="quote-counter"></p>
        <div class="progress-dots" id="progress-dots"></div>
      </div>
    </div>

    <div class="bottom-controls">

<input type="file" id="import-file" accept="application/json,.json" style="display:none">


<script>
// ══════════════════════════════════════════════
// DATA LAYER  (localStorage)
// ══════════════════════════════════════════════
const STORAGE_KEY = 'rebuild_phrases';

function loadPhrases() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function savePhrases(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

const CATEGORIES = [
  { key: 'morning',   label: '출근 전', cls: 'cat-morning' },
  { key: 'work',      label: '근무중', cls: 'cat-work' },
  { key: 'night',     label: '밤',   cls: 'cat-night' },
  { key: 'always',    label: '휴일', cls: 'cat-always' },
  { key: 'emergency', label: '응급', cls: 'cat-emergency' },
];

function getTimeCat(date) {
  const h = date.getHours();
  if (h >= 7 && h < 15) return 'morning';   // 출근 전 07:00~14:59
  if (h >= 15 && h < 22) return 'work';     // 근무중 15:00~21:59
  return 'night'; // 밤 22:00~06:59
}

function getTimeCatLabel(cat) {
  const map = { morning: '출근 전', work: '근무중', night: '밤', always: '휴일', emergency: '응급' };
  return map[cat] || '';
}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
function isWeekend() {
  const day = new Date().getDay(); // 0=일, 6=토
  return day === 0 || day === 6;
}

let phrases = loadPhrases();

let currentScreen = 'main'; // 'main' | 'settings'
let isAlwaysMode = isWeekend(); // 주말이면 휴일모드 ON, 평일이면 OFF
let isEmergencyMode = false; // 응급 모드: 시간/요일과 무관, 항상 OFF로 시작 (수동 토글만으로 작동)

// Playback
let shuffleQueue = [];
let playedCount = 0;
let currentIdx = 0;
let playTimer = null;
let timerBarEl = null;

// Modal state
let editingId = null; // null = add new, string = edit existing
let pendingDeleteId = null;
let addModalOpen = false;
let confirmOpen = false;
let alertOpen = false;

// ══════════════════════════════════════════════
// SHUFFLE
// ══════════════════════════════════════════════
function fisherYates(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQueue() {
  let cat;
  if (isEmergencyMode) {
    cat = 'emergency';
  } else if (isAlwaysMode) {
    cat = 'always';
  } else {
    cat = getTimeCat(new Date());
  }
  const pool = phrases.filter(p => p.cat === cat);
  shuffleQueue = fisherYates(pool);
  playedCount = 0;
  currentIdx = 0;
}

// ══════════════════════════════════════════════
// PLAYBACK ENGINE
// ══════════════════════════════════════════════
function startPlayback() {
  stopPlayback();
  buildQueue();
  showCurrentQuote();
}

function stopPlayback() {
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
}

function showCurrentQuote() {
  const card = document.getElementById('quote-card');
  const textEl = document.getElementById('quote-text');
  const counter = document.getElementById('quote-counter');
  const timerWrap = document.getElementById('timer-bar-wrap');

  if (shuffleQueue.length === 0) {
    // No phrases
    card.classList.remove('quote-fade-in');
    card.style.height = '';
    card.style.maxHeight = '';
    textEl.textContent = '문구를 추가해보세요';
    textEl.classList.add('empty');
    textEl.style.fontSize = '';
    counter.textContent = '';
    timerWrap.style.display = 'none';
    renderDots(0, 0);
    return;
  }

  textEl.classList.remove('empty');

  // Fade transition
  card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
  card.style.opacity = '0';
  card.style.transform = 'translateY(6px)';

  setTimeout(() => {
    const phrase = shuffleQueue[currentIdx];
    textEl.textContent = phrase ? phrase.text : '';
    counter.textContent = `${currentIdx + 1} / ${shuffleQueue.length}`;

    // Make timer bar + dots visible/rendered FIRST so they occupy their final
    // space, then fit the text against the truly remaining area (otherwise the
    // text is sized against a budget that later shrinks → clipping).
    timerWrap.style.display = 'block';
    resetTimerBar();
    renderDots(shuffleQueue.length, currentIdx);

    fitQuoteText();

    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';

    // Schedule next
    playTimer = setTimeout(() => advanceQuote(), 7000);
  }, 350);
}

// Auto-fit: pick the largest font size (between MIN and MAX) at which the
// current phrase fully fits inside the flexible text area — no clipping,
// no overflow. Short phrases get big & bold; long phrases shrink gracefully.
function fitQuoteText() {
  const textEl = document.getElementById('quote-text');
  const wrap = textEl.parentElement;            // .quote-text-wrap
  const card = document.getElementById('quote-card');
  const container = card ? card.parentElement : null; // .quote-container
  if (!wrap || !card || !container) return;
  const MAX = 30, MIN = 13;

  // Give the card a FIXED height equal to the available space. This keeps the
  // text budget constant (so the fit loop has a stable target instead of a
  // card that shrinks along with the font) and avoids the card jumping size
  // between short and long phrases during the 7s rotation.
  const cs = getComputedStyle(container);
  const padV = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
  const avail = Math.max(0, container.clientHeight - padV);
  card.style.height = avail + 'px';
  card.style.maxHeight = avail + 'px';

  // Stable budget for the text region.
  const budgetH = wrap.clientHeight;
  const budgetW = wrap.clientWidth;

  // Largest size (MAX..MIN) at which the phrase fits the budget.
  let size = MAX;
  textEl.style.fontSize = size + 'px';
  let guard = 0;
  while (size > MIN && guard < 40 &&
         (textEl.scrollHeight > budgetH + 1 ||
          textEl.scrollWidth  > budgetW + 1)) {
    size -= 1;
    textEl.style.fontSize = size + 'px';
    guard++;
  }
}

function advanceQuote() {
  currentIdx++;
  if (currentIdx >= shuffleQueue.length) {
    // All played — reshuffle
    shuffleQueue = fisherYates(shuffleQueue);
    currentIdx = 0;
  }
  showCurrentQuote();
}

function resetTimerBar() {
  const wrap = document.getElementById('timer-bar-wrap');
  wrap.innerHTML = '<div class="timer-bar" id="timer-bar"></div>';
}

function renderDots(total, current) {
  const container = document.getElementById('progress-dots');
  const MAX_DOTS = 20;
  container.innerHTML = '';
  if (total === 0) return;
  const show = Math.min(total, MAX_DOTS);
  // If more than MAX_DOTS, scale index
  const currentDot = total <= MAX_DOTS ? current : Math.round((current / total) * MAX_DOTS);
  for (let i = 0; i < show; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentDot ? ' played' : '') + (i === currentDot ? ' current' : '');
    container.appendChild(d);
  }
}

// ══════════════════════════════════════════════
// TIME LABEL
// ══════════════════════════════════════════════
function updateTimeLabel() {
  const el = document.getElementById('time-label');
  if (isEmergencyMode) {
    el.textContent = '응급';
  } else if (isAlwaysMode) {
    el.textContent = '휴일';
  } else {
    const cat = getTimeCat(new Date());
    el.textContent = getTimeCatLabel(cat);
  }
}

// ══════════════════════════════════════════════
// SCREEN NAVIGATION
// ══════════════════════════════════════════════
function showMain() {
  currentScreen = 'main';
  document.getElementById('screen-main').style.display = '';
  document.getElementById('screen-settings').style.display = 'none';
  document.getElementById('screen-settings').classList.remove('active');
  // Header buttons: left = import / export (same size as the right buttons)
  const headerLeft = document.getElementById('header-left');
  headerLeft.innerHTML = `
    <button class="icon-btn" id="btn-import" aria-label="파일 가져오기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </button>
    <button class="icon-btn" id="btn-export" aria-label="파일 내보내기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </button>`;
  document.getElementById('btn-import').addEventListener('click', onImportClick);
  document.getElementById('btn-export').addEventListener('click', onExportClick);
  document.getElementById('btn-add').style.display = '';
  document.getElementById('btn-settings').style.display = '';
  updateTimeLabel();
  startPlayback();
}

function showSettings() {
  currentScreen = 'settings';
  stopPlayback();
  document.getElementById('screen-main').style.display = 'none';
  document.getElementById('screen-settings').style.display = '';
  document.getElementById('screen-settings').classList.add('active');
  // Header: back button, no + or settings
  const headerLeft = document.getElementById('header-left');
  headerLeft.innerHTML = `
    <button class="icon-btn back-btn" id="btn-back" aria-label="뒤로가기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>`;
  document.getElementById('btn-back').addEventListener('click', dismissLayer);
  document.getElementById('btn-add').style.display = 'none';
  document.getElementById('btn-settings').style.display = 'none';
  renderSettings();
}

// ══════════════════════════════════════════════
// SETTINGS RENDER
// ══════════════════════════════════════════════
function renderSettings() {
  const container = document.getElementById('settings-list');
  container.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const items = phrases
      .filter(p => p.cat === cat.key)
      .sort((a, b) => a.text.localeCompare(b.text, 'ko'));

    const section = document.createElement('div');
    section.className = 'category-section';

    section.innerHTML = `
      <div class="category-header ${cat.cls}">
        <div class="category-dot"></div>
        <span class="category-name">${cat.label}</span>
        <span class="category-count">${items.length}</span>
      </div>
    `;

    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-category';
      empty.textContent = '문구가 없습니다';
      section.appendChild(empty);
    } else {
      items.forEach(p => {
        const row = document.createElement('div');
        row.className = 'phrase-item';
        row.innerHTML = `
          <span class="phrase-item-text">${escapeHtml(p.text)}</span>
          <button class="phrase-delete-btn" data-id="${p.id}" aria-label="삭제">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>`;

        // Click on text = edit
        row.querySelector('.phrase-item-text').addEventListener('click', () => {
          openLayer(() => openAddModal(p.id));
        });
        row.querySelector('.phrase-item-text').style.cursor = 'pointer';

        // Delete
        row.querySelector('.phrase-delete-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          openLayer(() => openDeleteConfirm(p.id));
        });

        section.appendChild(row);
      });
    }

    container.appendChild(section);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
// ADD/EDIT MODAL
// ══════════════════════════════════════════════
function openAddModal(id = null) {
  editingId = id;
  const modal = document.getElementById('modal-add');
  const title = document.getElementById('modal-add-title');
  const textarea = document.getElementById('phrase-input');
  const tabs = document.querySelectorAll('.cat-tab');

  if (id) {
    // Edit mode
    const phrase = phrases.find(p => p.id === id);
    if (!phrase) return;
    title.textContent = '문구 수정';
    textarea.value = phrase.text;
    tabs.forEach(t => {
      t.classList.toggle('selected', t.dataset.cat === phrase.cat);
    });
  } else {
    // Add mode
    title.textContent = '새 문구 추가';
    textarea.value = '';
    // Default to current mode's cat (응급 > 휴일 > 시간대), or morning
    const defaultCat = isEmergencyMode ? 'emergency' : (isAlwaysMode ? 'always' : getTimeCat(new Date()));
    tabs.forEach(t => {
      t.classList.toggle('selected', t.dataset.cat === defaultCat);
    });
  }

  modal.classList.add('open');
  addModalOpen = true;
  updateCharCounter();
  setTimeout(() => textarea.focus(), 400);
}

function updateCharCounter() {
  const textarea = document.getElementById('phrase-input');
  const counter = document.getElementById('char-counter');
  const max = textarea.getAttribute('maxlength') || 140;
  const len = textarea.value.length;
  counter.textContent = `${len} / ${max}`;
  counter.classList.toggle('near-limit', len >= max * 0.85);
}

function closeAddModal() {
  const modal = document.getElementById('modal-add');
  modal.classList.remove('open');
  addModalOpen = false;
  document.getElementById('phrase-input').blur();
}

function savePhrase() {
  const text = document.getElementById('phrase-input').value.trim();
  if (!text) { showToast('문구를 입력해주세요'); return; }

  const selectedTab = document.querySelector('.cat-tab.selected');
  const cat = selectedTab ? selectedTab.dataset.cat : 'morning';

  if (editingId) {
    // Update
    const idx = phrases.findIndex(p => p.id === editingId);
    if (idx !== -1) {
      phrases[idx].text = text;
      phrases[idx].cat = cat;
    }
    showToast('문구가 수정되었습니다');
  } else {
    // Add
    phrases.push({ id: genId(), text, cat });
    showToast('문구가 추가되었습니다');
  }

  savePhrases(phrases);
  const wasSettings = (currentScreen === 'settings');
  dismissLayer(); // closes add modal + syncs history guard

  if (wasSettings) {
    renderSettings();
  } else {
    startPlayback();
  }
}

// ══════════════════════════════════════════════
// DELETE CONFIRM
// ══════════════════════════════════════════════
function openDeleteConfirm(id) {
  pendingDeleteId = id;
  const phrase = phrases.find(p => p.id === id);
  if (!phrase) return;
  document.getElementById('confirm-preview').textContent = phrase.text;
  document.getElementById('modal-confirm').classList.add('open');
  confirmOpen = true;
}

function closeDeleteConfirm() {
  pendingDeleteId = null;
  document.getElementById('modal-confirm').classList.remove('open');
  confirmOpen = false;
}

function confirmDelete() {
  if (!pendingDeleteId) return;
  phrases = phrases.filter(p => p.id !== pendingDeleteId);
  savePhrases(phrases);
  const wasSettings = (currentScreen === 'settings');
  dismissLayer(); // closes confirm modal + syncs history guard
  showToast('문구가 삭제되었습니다');
  if (wasSettings) {
    renderSettings();
  } else {
    startPlayback();
  }
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════
// ALERT MODAL (info / import result)
// ══════════════════════════════════════════════
function openAlert(title, msg) {
  document.getElementById('alert-title').textContent = title;
  document.getElementById('alert-msg').textContent = msg;
  document.getElementById('modal-alert').classList.add('open');
  alertOpen = true;
}
function closeAlert() {
  document.getElementById('modal-alert').classList.remove('open');
  alertOpen = false;
}

// ══════════════════════════════════════════════
// IMPORT / EXPORT  (with signature so foreign files are rejected)
// ══════════════════════════════════════════════
const FILE_SIGNATURE = 'REBUILD_BACKUP_V1';

function onExportClick() {
  const payload = {
    __signature__: FILE_SIGNATURE,
    version: 1,
    exportedAt: new Date().toISOString(),
    phrases: phrases
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `rebuild-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('파일을 내보냈습니다');
}

function onImportClick() {
  // Opens the OS file picker. Cancelling it (e.g. hardware back) simply
  // returns to the app — it does not touch our history guard at all.
  const input = document.getElementById('import-file');
  input.value = ''; // allow re-selecting the same file
  input.click();
}

function handleImportFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let data;
    try {
      data = JSON.parse(reader.result);
    } catch (e) {
      openLayer(() => openAlert('가져오기 실패', '파일을 읽을 수 없습니다. 올바른 Rebuild 백업 파일이 아닙니다.'));
      return;
    }
    // Signature check — reject anything not exported by this app.
    if (!data || data.__signature__ !== FILE_SIGNATURE || !Array.isArray(data.phrases)) {
      openLayer(() => openAlert('가져오기 실패', '서명이 확인되지 않았습니다. 이 파일은 Rebuild에서 내보낸 파일이 아닙니다.'));
      return;
    }
    // Sanitise the incoming phrases.
    const validCats = ['morning', 'work', 'night', 'always', 'emergency'];
    const legacyCatMap = { afternoon: 'work', evening: 'work' }; // 구버전 백업 파일 호환
    const imported = [];
    data.phrases.forEach(p => {
      if (!p || typeof p.text !== 'string') return;
      const text = p.text.trim().slice(0, 140);
      if (!text) return;
      imported.push({
        id: (typeof p.id === 'string' && p.id) ? p.id : genId(),
        text: text,
        cat: validCats.includes(p.cat) ? p.cat : (legacyCatMap[p.cat] || 'always')
      });
    });
    phrases = imported;
    savePhrases(phrases);
    if (currentScreen === 'settings') renderSettings(); else startPlayback();
    openLayer(() => openAlert('가져오기 완료', `${imported.length}개의 문구를 불러왔습니다.`));
  };
  reader.onerror = () => {
    openLayer(() => openAlert('가져오기 실패', '파일을 읽는 중 오류가 발생했습니다.'));
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════
// NAVIGATION & BACK-BUTTON HANDLING
// ──────────────────────────────────────────────
// Model: ONE history entry ("guard") per open layer (settings screen /
// add modal / confirm modal), and popstate is the SINGLE place that ever
// closes a layer. Every open pushes exactly one guard; every in-app
// dismiss is simply history.back(). Because pushes and backs are strictly
// 1-to-1, the stack never desyncs, so:
//   • back from a modal    → closes only that modal (returns to screen behind)
//   • back from settings   → returns to main
//   • back from bare main  → exits the site in ONE press
//   • guards never accumulate, regardless of how many times you
//     open/close (no "press back many times" problem)
// ══════════════════════════════════════════════

// Close the top-most open layer (priority: confirm > add modal > settings).
// Returns true if something was closed.
function closeTopVisually() {
  if (alertOpen)    { closeAlert();          return true; }
  if (confirmOpen)  { closeDeleteConfirm(); return true; }
  if (addModalOpen) { closeAddModal();      return true; }
  if (currentScreen === 'settings') { showMain(); return true; }
  return false;
}

// Open a layer: show it, then push exactly one guard for it.
function openLayer(openFn) {
  openFn();
  history.pushState({ rebuildGuard: true }, '');
}

// In-app dismiss (Cancel, overlay tap, back arrow, Save, Delete).
// Just step back in history; popstate performs the actual visual close.
function dismissLayer() {
  history.back();
}

// Hardware / browser back button AND our own history.back() both land here.
// Either way the intent is identical: close one top layer.
window.addEventListener('popstate', () => {
  closeTopVisually();
  // If nothing was open, we were on bare main: the browser has already
  // navigated away (site exit). No guard remains to re-add.
});

// ══════════════════════════════════════════════
// EVENT BINDINGS
// ══════════════════════════════════════════════
document.getElementById('btn-add').addEventListener('click', () => {
  openLayer(() => openAddModal(null));
});

document.getElementById('btn-settings').addEventListener('click', () => {
  openLayer(() => showSettings());
});

// Category tabs in modal
document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('selected'));
    tab.classList.add('selected');
  });
});

// Add modal: overlay tap to dismiss
document.getElementById('modal-add').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-add')) {
    dismissLayer();
  }
});
document.getElementById('modal-add-cancel').addEventListener('click', dismissLayer);
document.getElementById('modal-add-save').addEventListener('click', savePhrase);

// Confirm modal: overlay tap to dismiss
document.getElementById('modal-confirm').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-confirm')) dismissLayer();
});
document.getElementById('confirm-cancel').addEventListener('click', dismissLayer);
document.getElementById('confirm-ok').addEventListener('click', confirmDelete);

// Alert modal: OK button / overlay tap both dismiss through the guard system
document.getElementById('alert-ok').addEventListener('click', dismissLayer);
document.getElementById('modal-alert').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-alert')) dismissLayer();
});

// Import file chosen
document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  handleImportFile(file);
});

// Toggle "휴일"
document.getElementById('toggle-always').addEventListener('change', (e) => {
  isAlwaysMode = e.target.checked;
  updateTimeLabel();
  startPlayback();
});

// Toggle "응급" — 시간/요일과 무관, 토글로만 켜고 끄는 응급 모드
document.getElementById('toggle-emergency').addEventListener('change', (e) => {
  isEmergencyMode = e.target.checked;
  updateTimeLabel();
  startPlayback();
});

// Live character counter while typing
document.getElementById('phrase-input').addEventListener('input', updateCharCounter);

// Re-fit the visible quote when the screen size / orientation changes
let resizeFitTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeFitTimer);
  resizeFitTimer = setTimeout(() => {
    const textEl = document.getElementById('quote-text');
    if (currentScreen === 'main' && shuffleQueue.length > 0 && !textEl.classList.contains('empty')) {
      fitQuoteText();
    }
  }, 150);
});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
// Mark the base entry. No guard yet — bare main exits with a single back.
history.replaceState({ rebuildBase: true }, '');
// 주말이면 토글 체크박스를 ON으로 초기화
document.getElementById('toggle-always').checked = isAlwaysMode;
document.getElementById('toggle-emergency').checked = isEmergencyMode;
showMain();

</script>

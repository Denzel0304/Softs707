<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#faf7f2">
<title>빠른 메모</title>
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --surface-2: #f3efe7;
    --text: #2d2a26;
    --text-soft: #6b655d;
    --text-mute: #a09a91;
    --border: #ebe5da;
    --accent: #5b7a6a;
    --accent-soft: #e8efeb;
    --shadow-sm: 0 1px 2px rgba(60, 50, 35, 0.04);
    --shadow-md: 0 4px 14px rgba(60, 50, 35, 0.08);
    --shadow-lg: 0 12px 32px rgba(60, 50, 35, 0.14);

    --c-todo: #d97757;
    --c-todo-bg: #fbeae0;
    --c-idea: #7a8a4e;
    --c-idea-bg: #eef0e0;
    --c-basic: #6c7a8a;
    --c-basic-bg: #e4e8ee;
    --c-buy: #9b6bbf;
    --c-buy-bg: #f0e8f7;

    --header-h: 108px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  /* === Header === */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--bg);
    padding-top: var(--safe-top);
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: grid;
    grid-template-columns: 38px 1fr 38px;
    align-items: center;
    padding: 12px 16px 8px;
  }
  .title-wrap {
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .title-icon {
    width: 22px; height: 22px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .title {
    font-size: 19px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--text);
  }
  .gear-btn {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    transition: all 0.15s;
    justify-self: end;
  }
  .gear-btn:active {
    background: var(--surface-2);
    transform: scale(0.94);
  }
  .gear-btn svg { width: 20px; height: 20px; color: var(--text-soft); }

  .search-bar {
    margin: 0 16px 10px;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px;
  }
  .search-bar svg { width: 18px; height: 18px; color: var(--text-mute); flex-shrink: 0; }
  .search-bar input {
    flex: 1; border: none; outline: none; background: none;
    font-size: 15px; padding: 4px 0;
  }
  .search-clear {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--text-mute);
    color: white;
    display: none;
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .search-clear.visible { display: flex; }
  .search-clear svg { width: 12px; height: 12px; color: white; }

  .filters {
    display: flex; gap: 6px; padding: 0 16px 10px; overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-soft);
    white-space: nowrap;
    transition: all 0.15s;
  }
  .filter-chip.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .filter-chip[data-cat="todo"].active { background: var(--c-todo); border-color: var(--c-todo); color: white; }
  .filter-chip[data-cat="idea"].active { background: var(--c-idea); border-color: var(--c-idea); color: white; }
  .filter-chip[data-cat="basic"].active { background: var(--c-basic); border-color: var(--c-basic); color: white; }
  .filter-chip[data-cat="buy"].active { background: var(--c-buy); border-color: var(--c-buy); color: white; }

  /* === List === */
  .list-container {
    position: fixed;
    top: 0;
    left: 0; right: 0; bottom: 0;
    padding-top: var(--header-h);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  .list {
    padding: 12px 16px calc(96px + var(--safe-bottom));
    display: flex; flex-direction: column; gap: 10px;
  }
  .empty {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-mute);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 14px; }

  .card {
    background: var(--surface);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    display: flex;
    transition: transform 0.1s;
  }
  .card:active { transform: scale(0.99); }
  .card-stripe {
    width: 5px; flex-shrink: 0;
  }
  .card[data-cat="todo"] .card-stripe { background: var(--c-todo); }
  .card[data-cat="idea"] .card-stripe { background: var(--c-idea); }
  .card[data-cat="basic"] .card-stripe { background: var(--c-basic); }
  .card[data-cat="buy"] .card-stripe { background: var(--c-buy); }

  .card-body {
    flex: 1;
    padding: 12px 6px 12px 14px;
    min-width: 0;
    display: flex; flex-direction: column;
    cursor: pointer;
  }
  .card-meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
  }
  .card-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.02em;
  }
  .card[data-cat="todo"] .card-tag { background: var(--c-todo-bg); color: var(--c-todo); }
  .card[data-cat="idea"] .card-tag { background: var(--c-idea-bg); color: var(--c-idea); }
  .card[data-cat="basic"] .card-tag { background: var(--c-basic-bg); color: var(--c-basic); }
  .card[data-cat="buy"] .card-tag { background: var(--c-buy-bg); color: var(--c-buy); }
  .card-time {
    font-size: 11px;
    color: var(--text-mute);
  }
  .card-content {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .card-x {
    flex-shrink: 0;
    width: 38px;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 12px;
    color: var(--text-mute);
  }
  .card-x svg { width: 16px; height: 16px; }
  .card-x:active { color: var(--text); }

  /* === FAB === */
  .fab {
    position: fixed;
    right: 18px;
    bottom: calc(20px + var(--safe-bottom));
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--text);
    color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-lg);
    z-index: 20;
    transition: transform 0.12s;
  }
  .fab:active { transform: scale(0.92); }
  .fab svg { width: 26px; height: 26px; }

  /* === PC Layout (768px+) === */
  @media (min-width: 768px) {
    :root { --pc-w: 720px; --pc-left: calc(50% - 360px); }

    body { background: #e8e3db; }

    .header {
      left: var(--pc-left);
      right: auto;
      width: var(--pc-w);
      border-radius: 0 0 16px 16px;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      box-shadow: 0 2px 16px rgba(60,50,35,0.10);
    }

    .list-container {
      left: var(--pc-left);
      right: auto;
      width: var(--pc-w);
    }

    .fab {
      right: auto;
      left: calc(var(--pc-left) + var(--pc-w) - 76px);
    }

    /* 카드 글씨 & 패딩 조금 더 크게 */
    .card-content { font-size: 15px; }
    .card-body { padding: 14px 8px 14px 18px; }
    .list { padding: 16px 20px calc(100px + var(--safe-bottom)); gap: 12px; }
    .search-bar { margin: 0 20px 12px; }
    .filters { padding: 0 20px 12px; }
    .header-top { padding: 16px 20px 10px; }
    .title { font-size: 21px; }

    /* 모달: editor·menu는 화면 가운데 */
    #editorModal, #menuModal { align-items: center; padding: 24px; }

    .sheet {
      border-radius: 18px !important;
      max-width: 560px;
      max-height: 90vh;
      height: auto;
      padding-bottom: 24px;
      animation: popIn 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .editor-textarea {
      flex: none !important;
      min-height: 38vh !important;
      max-height: 75vh !important;
    }

    .editor-links {
      max-height: 18vh;
      overflow-y: auto;
    }



    .menu {
      border-radius: 16px;
      max-width: 400px;
      padding-bottom: 8px;
      animation: popIn 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .menu-handle { display: none; }
  }

  @media (min-width: 1100px) {
    :root { --pc-w: 860px; --pc-left: calc(50% - 430px); }
    .fab { left: calc(var(--pc-left) + var(--pc-w) - 76px); }
  }

  /* === Modal === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45, 42, 38, 0.4);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.18s ease;
  }
  .modal-overlay.show { display: flex; }
  .modal-overlay.center { align-items: center; padding: 24px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .sheet {
    background: var(--bg);
    width: 100%;
    max-width: 520px;
    border-radius: 18px 18px 0 0;
    padding: 20px 18px calc(20px + var(--safe-bottom));
    animation: slideUp 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
    max-height: 90vh;
    height: auto;
    display: flex; flex-direction: column;
  }
  .dialog {
    background: var(--surface);
    border-radius: 16px;
    padding: 22px 20px 16px;
    width: 100%;
    max-width: 340px;
    animation: popIn 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  /* Settings menu */
  .menu {
    background: var(--surface);
    border-radius: 14px 14px 0 0;
    width: 100%;
    max-width: 520px;
    padding: 8px 0 calc(8px + var(--safe-bottom));
    animation: slideUp 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .menu-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 4px auto 12px;
  }
  .menu-item {
    width: 100%;
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    font-size: 15px;
    color: var(--text);
    text-align: left;
  }
  .menu-item:active { background: var(--surface-2); }
  .menu-item svg { width: 20px; height: 20px; color: var(--text-soft); flex-shrink: 0; }
  .menu-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* Editor */
  .editor-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .editor-cancel, .editor-save {
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    transition: all 0.15s;
  }
  .editor-cancel {
    color: var(--text);
    padding: 8px 14px;
    background: #e0d8c8;
    border: 1px solid #c9bea8;
  }
  .editor-cancel:active { background: #cfc4af; }
  .editor-save {
    color: white;
    background: var(--accent);
    padding: 8px 18px;
    box-shadow: var(--shadow-sm);
  }
  .editor-save:active {
    background: #4a6557;
    transform: scale(0.96);
  }
  .editor-save:disabled { opacity: 0.5; }

  .cat-select {
    display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .cat-option {
    flex: 1;
    min-width: calc(33.333% - 4px);
    padding: 11px 8px;
    border-radius: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-soft);
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .cat-option .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-mute);
    transition: all 0.15s;
  }
  .cat-option[data-cat="todo"] .dot { background: var(--c-todo); }
  .cat-option[data-cat="idea"] .dot { background: var(--c-idea); }
  .cat-option[data-cat="basic"] .dot { background: var(--c-basic); }
  .cat-option[data-cat="buy"] .dot { background: var(--c-buy); }
  .cat-option.selected .dot {
    background: white;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
  }
  .cat-option[data-cat="todo"].selected {
    background: var(--c-todo);
    border-color: var(--c-todo);
    color: white;
    box-shadow: 0 2px 8px rgba(217, 119, 87, 0.35);
  }
  .cat-option[data-cat="idea"].selected {
    background: var(--c-idea);
    border-color: var(--c-idea);
    color: white;
    box-shadow: 0 2px 8px rgba(122, 138, 78, 0.35);
  }
  .cat-option[data-cat="basic"].selected {
    background: var(--c-basic);
    border-color: var(--c-basic);
    color: white;
    box-shadow: 0 2px 8px rgba(108, 122, 138, 0.35);
  }
  .cat-option[data-cat="buy"].selected {
    background: var(--c-buy);
    border-color: var(--c-buy);
    color: white;
    box-shadow: 0 2px 8px rgba(155, 107, 191, 0.35);
  }

  .editor-textarea {
    flex: 1;
    width: 100%;
    min-height: 120px;
    max-height: 38vh;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    background: var(--surface);
    font-size: 16px;
    line-height: 1.55;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
  }
  .editor-textarea:focus { border-color: var(--accent); }

  .editor-links {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
    max-height: 25vh;
    overflow-y: auto;
  }
  .editor-link {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 10px;
    background: var(--accent-soft);
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    word-break: break-all;
    line-height: 1.4;
  }
  .editor-link:active { background: var(--surface-2); }
  .editor-link svg { width: 15px; height: 15px; flex-shrink: 0; }

  .editor-actions {
    display: flex; gap: 10px;
    margin-top: 14px;
  }
  .btn-delete {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    background: #fdecea;
    border: 1px solid #f5c4be;
    color: #c0392b;
    font-size: 14px; font-weight: 500;
  }
  .btn-delete:active { background: #f9d5d1; }

  /* Confirm dialog */
  .dialog-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .dialog-msg {
    font-size: 14px;
    color: var(--text-soft);
    margin-bottom: 18px;
    line-height: 1.5;
  }
  .dialog-actions {
    display: flex; gap: 8px;
  }
  .dialog-btn {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
  }
  .dialog-btn.cancel {
    background: var(--surface-2);
    color: var(--text);
  }
  .dialog-btn.confirm {
    background: #c25a45;
    color: white;
  }
  .dialog-btn:active { opacity: 0.85; }

  /* Toast */
  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(96px + var(--safe-bottom));
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    padding: 11px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    z-index: 1000;
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    pointer-events: none;
    box-shadow: var(--shadow-lg);
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Search highlight */
  mark {
    background: #fff3a8;
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* === Login overlay === */
  .login-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: none; align-items: center; justify-content: center; z-index: 500;
  }
  .login-overlay.active { display: flex; }
  .login-box {
    width: 280px; padding: 32px 28px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px; text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .login-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.02em; }
  .login-sub { font-size: 12.5px; color: var(--text-soft); margin-bottom: 22px; }
  .pin-input {
    width: 100%; padding: 12px; font-size: 22px; text-align: center;
    letter-spacing: 10px; border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--surface-2); margin-bottom: 14px; outline: none;
    color: var(--text);
  }
  .pin-input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 11px; font-size: 14px; font-weight: 600;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    cursor: pointer;
  }
  .login-btn:active { opacity: 0.85; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-msg { font-size: 12px; margin-top: 12px; min-height: 14px; color: var(--text-soft); }
  .login-msg.err { color: #c0392b; }
  .login-msg.ok  { color: #2e7d32; }

  /* === Sync indicator === */
  .sync-bar {
    font-size: 10.5px; color: var(--text-mute);
    text-align: center; padding: 3px 0 0;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>

<!-- ===== 로그인 오버레이 ===== -->
<div id="login-overlay" class="login-overlay active">
  <div class="login-box">
    <div class="login-title">빠른 메모</div>
    <div class="login-sub">PIN 4자리를 입력하세요</div>
    <input type="password" id="pin-input" class="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
    <button id="login-btn" class="login-btn" onclick="doLogin()">로그인</button>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<header class="header" id="header">
  <div class="header-top">
    <div></div>
    <div class="title-wrap">
      <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
        <polyline points="13 2 13 9 20 9"/>
        <line x1="9" y1="14" x2="15" y2="14"/>
        <line x1="9" y1="17" x2="13" y2="17"/>
      </svg>
      <div class="title">빠른 메모</div>
    </div>
    <button class="gear-btn" id="gearBtn" aria-label="설정">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>

<script>
/* =========================================================
   빠른 메모 — single-file app + Supabase 동기화
   ========================================================= */

const SB_URL  = 'https://zkkhzsgaryoraytvsqbf.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpra2h6c2dhcnlvcmF5dHZzcWJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc5ODM5OTcsImV4cCI6MjA1MzU1OTk5N30.UJtqcka35dVssnZRuUk6zukfjF9UNX392Shd841GSQk';
const FM34_AK    = 'FM34_ak';
const FM34_CACHE = 'FM34_data';

const CATS = ['todo', 'idea', 'basic'];
const CAT_LABEL = { todo: '투자', idea: '글감', basic: '기타' };

/* ---------- State ---------- */
let memos = [];
let currentFilter = 'all';
let currentSearch = '';
let editingId = null;
let editingCat = null;
let pendingDeleteId = null;
let syncTimer = null, syncing = false;
let authFailCount = 0;
const AUTH_FAIL_MAX = 3;

/* ---------- 기본 유틸 ---------- */
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}
function getAK() { return localStorage.getItem(FM34_AK); }
function setAK(k) { localStorage.setItem(FM34_AK, k); }
function clearAK() { localStorage.removeItem(FM34_AK); }
function setSyncBar(text) {
  const el = document.getElementById('sync-bar');
  if (el) el.textContent = text;
}

/* =========================================================
   Supabase RPC / 로그인 / 동기화
   ========================================================= */
async function rpc(fn, args) {
  return fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: {
      'apikey': SB_ANON,
      'Authorization': 'Bearer ' + SB_ANON,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(args)
  });
}

async function doLogin() {
  const pin = document.getElementById('pin-input').value.trim();
  const msg = document.getElementById('login-msg');
  const btn = document.getElementById('login-btn');
  if (!/^\d{4}$/.test(pin)) {
    msg.className = 'login-msg err'; msg.textContent = 'PIN 4자리 숫자를 입력하세요'; return;
  }
  btn.disabled = true; msg.className = 'login-msg'; msg.textContent = '확인 중...';
  try {
    const r = await rpc('fm34_login', { p_pin: pin });
    if (!r.ok) { msg.className = 'login-msg err'; msg.textContent = '서버 오류 (' + r.status + ')'; btn.disabled = false; return; }
    const data = await r.json();
    if (data.ok) {
      setAK(data.key);
      document.getElementById('pin-input').value = '';
      msg.className = 'login-msg ok'; msg.textContent = '로그인 성공';
      await afterLogin();
    } else if (data.reason === 'wrong_pin') {
      msg.className = 'login-msg err'; msg.textContent = `PIN 불일치 (남은 시도: ${data.remaining}회)`;
      document.getElementById('pin-input').value = ''; btn.disabled = false;
    } else if (data.reason === 'locked') {
      const until = new Date(data.until).toLocaleTimeString('ko-KR');
      msg.className = 'login-msg err'; msg.textContent = `잠금 상태 (${until}까지)`; btn.disabled = false;
    } else if (data.reason === 'no_pin') {
      msg.className = 'login-msg err'; msg.textContent = 'PIN이 등록되지 않았습니다'; btn.disabled = false;
    } else {
      msg.className = 'login-msg err'; msg.textContent = '로그인 실패'; btn.disabled = false;
    }
  } catch (e) {
    msg.className = 'login-msg err'; msg.textContent = '네트워크 오류'; btn.disabled = false;
  }
}

async function afterLogin() {
  document.getElementById('login-overlay').classList.remove('active');
  await pullFromServer();
}

async function doLogout() {
  // 모달을 history.back() 없이 직접 강제로 닫는다
  modalStack.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('show');
  });
  modalStack.length = 0;

  const key = getAK();
  if (key) { try { await rpc('fm34_logout', { p_key: key }); } catch (e) {} }
  Object.keys(localStorage).forEach(k => { if (k.startsWith('FM34_')) localStorage.removeItem(k); });
  memos = [];
  render();
  document.getElementById('login-overlay').classList.add('active');
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-msg').textContent = '';
  authFailCount = 0;
  setSyncBar('');
  setTimeout(() => document.getElementById('pin-input').focus(), 50);
}

async function pullFromServer() {
  const key = getAK();
  if (!key) return;
  setSyncBar('↓ 불러오는 중...');
  try {
    const r = await rpc('fm34_pull', { p_key: key });
    if (r.status === 401 || r.status === 403) { registerAuthFail(); return; }
    if (!r.ok) {
      const t = await r.text();
      if (t.includes('unauthorized')) { registerAuthFail(); return; }
      setSyncBar('⚠ 불러오기 실패'); return;
    }
    authFailCount = 0;
    const data = await r.json();
    memos = Array.isArray(data) ? data : [];
    localStorage.setItem(FM34_CACHE, JSON.stringify(memos));
    setSyncBar('✓ 동기화됨');
    render();
  } catch (e) {
    setSyncBar('⚠ 네트워크 오류');
    // 캐시로 폴백
    try {
      const cached = localStorage.getItem(FM34_CACHE);
      if (cached) { memos = JSON.parse(cached); render(); }
    } catch (_) {}
  }
}

function queueSync() {
  if (!getAK()) return;
  setSyncBar('● 변경됨');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToServer, 1200);
}

async function pushToServer() {
  const key = getAK();
  if (!key) return;
  if (syncing) { syncTimer = setTimeout(pushToServer, 800); return; }
  syncing = true;
  setSyncBar('↑ 저장 중...');
  try {
    const r = await rpc('fm34_push', { p_key: key, p_data: memos });
    if (r.status === 401 || r.status === 403) { registerAuthFail(); return; }
    if (!r.ok) {
      const t = await r.text();
      if (t.includes('unauthorized')) { registerAuthFail(); return; }
      setSyncBar('⚠ 저장 실패'); return;
    }
    authFailCount = 0;
    localStorage.setItem(FM34_CACHE, JSON.stringify(memos));
    setSyncBar('✓ 저장됨');
  } catch (e) {
    setSyncBar('⚠ 네트워크 오류');
  } finally {
    syncing = false;
  }
}

function registerAuthFail() {
  authFailCount++;
  setSyncBar(`⚠ 인증 오류 (${authFailCount}/${AUTH_FAIL_MAX})`);
  if (authFailCount >= AUTH_FAIL_MAX) doLogout();
}

/* ---------- Storage (로컬 캐시만) ---------- */

/* =========================================================
   MODAL SYSTEM — 단순화된 단일 책임 시스템
   ---------------------------------------------------------
   - 열기: openModal(id)  →  history.pushState 한 번
   - 닫기: closeModal()   →  history.back() 호출
   - 뒤로가기(popstate): 가장 위 모달만 닫는다. 사이트 빠져나가지 않음.
   - 어떤 모달이든 한 함수로 처리, 스택은 브라우저가 관리.
   ========================================================= */

const modalStack = [];  // 현재 열려있는 모달 id들

function openModal(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('show');
  modalStack.push(id);
  history.pushState({ modalDepth: modalStack.length }, '');
}

function closeModal() {
  // 가장 위 모달을 닫는다 (popstate 트리거)
  if (modalStack.length === 0) return;
  history.back();
}

function closeAllModals() {
  while (modalStack.length > 0) closeModal();
}

// popstate가 모달 닫기의 유일한 경로. 이걸로 일관성 확보.
window.addEventListener('popstate', () => {
  if (modalStack.length === 0) return;
  const id = modalStack.pop();
  const el = document.getElementById(id);
  if (el) el.classList.remove('show');
  // 모달별 정리 작업
  onModalClosed(id);
});

// 첫 로드 시 history에 base state를 하나 깔아둔다.
// (외부에서 들어왔을 때 뒤로가기가 모달이 아닌 경우에도 안전하게.)
history.replaceState({ modalDepth: 0 }, '');

function onModalClosed(id) {
  if (id === 'editorModal') {
    // 입력 내용 초기화 (저장 안 하면 버려짐)
    const et = document.getElementById('editorText');
    et.value = '';
    et._listType = null;
    et._listNum = null;
    editingId = null;
    editingCat = null;
    refreshCatUI();
    document.getElementById('editorActions').style.display = 'none';
  } else if (id === 'confirmModal') {
    pendingDeleteId = null;
  }
}

/* ---------- Overlay click closes top modal ---------- */
function bindOverlayClicks() {
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });
  });
}

/* ---------- Toast ---------- */
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

/* ---------- Render ---------- */
function relTime(ts) {
  const diff = Date.now() - ts;
  const sec = Math.floor(diff / 1000);
  if (sec < 30) return '방금 전';
  if (sec < 60) return `${sec}초 전`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}분 전`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}시간 전`;
  const day = Math.floor(hr / 24);
  if (day < 7) return `${day}일 전`;
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}.${m}.${dd}`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function highlight(text, q) {
  const safe = escapeHtml(text);
  if (!q) return safe;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function render() {
  const list = document.getElementById('list');
  const q = currentSearch.trim().toLowerCase();

  // 카테고리별 카운트 업데이트
  const counts = { todo: 0, idea: 0, basic: 0 };
  memos.forEach(m => { if (counts[m.cat] !== undefined) counts[m.cat]++; });
  document.querySelectorAll('.filter-chip[data-cat]').forEach(btn => {
    const cat = btn.dataset.cat;
    const label = CAT_LABEL[cat];
    btn.textContent = `${label}(${counts[cat]})`;
  });

  let filtered = memos.slice();
  if (currentFilter !== 'all') {
    filtered = filtered.filter(m => m.cat === currentFilter);
  }
  if (q) {
    filtered = filtered.filter(m => m.content.toLowerCase().includes(q));
  }
  filtered.sort((a, b) => b.updatedAt - a.updatedAt);

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📝</div>
        <div class="empty-text">${memos.length === 0 ? '아직 메모가 없습니다' : '결과가 없습니다'}</div>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(m => `
    <div class="card" data-cat="${m.cat}" data-id="${m.id}">
      <div class="card-stripe"></div>
      <div class="card-body" data-action="edit" data-id="${m.id}">
        <div class="card-meta">
          <span class="card-tag">${CAT_LABEL[m.cat]}</span>
          <span class="card-time">${relTime(m.updatedAt)}</span>
        </div>
        <div class="card-content">${highlight(m.content, q)}</div>
      </div>
      <button class="card-x" data-action="delete" data-id="${m.id}" aria-label="삭제">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/>
        </svg>
      </button>
    </div>
  `).join('');
}

/* ---------- Editor: URL 자동 추출 & 링크 미리보기 ---------- */
// "//" 가 입력되는 순간을 신호로 삼아 그 앞의 스킴(http/https)까지 포함해
// 유효한 URL 토큰들을 텍스트에서 찾아 아래에 클릭 가능한 링크로 보여준다.
function extractUrls(text) {
  const regex = /https?:\/\/[^\s]+/g;
  const found = text.match(regex) || [];
  // 끝에 붙은 문장부호 등은 제거
  const cleaned = found.map(u => u.replace(/[)\]}>,.!?;:'"]+$/, ''));
  // 중복 제거, 순서 유지
  const seen = new Set();
  const result = [];
  cleaned.forEach(u => {
    if (u && !seen.has(u)) {
      seen.add(u);
      result.push(u);
    }
  });
  return result;
}

function updateEditorLinks() {
  const et = document.getElementById('editorText');
  const box = document.getElementById('editorLinks');
  const urls = extractUrls(et.value);
  if (urls.length === 0) {
    box.innerHTML = '';
    return;
  }
  box.innerHTML = urls.map(u => `
    <a class="editor-link" href="${u.replace(/"/g, '&quot;')}" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <span>${u}</span>
    </a>
  `).join('');
}

/* ---------- Editor ---------- */
function refreshCatUI() {
  document.querySelectorAll('#catSelect .cat-option').forEach(b => {
    b.classList.toggle('selected', b.dataset.cat === editingCat);
  });

function openNewMemo() {
  editingId = null;
  editingCat = null;
  const et = document.getElementById('editorText');

}

function openEditMemo(id) {
  const m = memos.find(x => x.id === id);
  if (!m) return;

  editingCat = m.cat;
  const et2 = document.getElementById('editorText');
  et2.value = m.content;
  et2._listType = null;
  et2._listNum = null;
  document.getElementById('editorActions').style.display = 'flex';
  refreshCatUI();
  updateEditorLinks();
  openModal('editorModal');
  setTimeout(() => { et2.scrollTop = 0; document.getElementById('editorLinks').scrollTop = 0; }, 50);
}

function trySave() {
  const text = document.getElementById('editorText').value.trim();
  if (!editingCat) {
    toast('종류를 선택해주세요');
    return;
  }
  if (!text) {
    toast('내용을 입력해주세요');
    return;
  }
  const now = Date.now();
  if (editingId) {
    const m = memos.find(x => x.id === editingId);
    if (m) {
      m.content = text;
      m.cat = editingCat;
      m.updatedAt = now;
    }
  } else {
    memos.push({
      id: genId(),
      content: text,
      cat: editingCat,
      createdAt: now,
      updatedAt: now
    });
    // 새 메모는 최상단에 표시되므로 스크롤을 top으로 리셋
    const lc = document.querySelector('.list-container');
    if (lc) lc.scrollTop = 0;
  }
  queueSync();
  render();
  closeModal();
}

/* ---------- Delete ---------- */
function askDelete(id) {
  pendingDeleteId = id;
  openModal('confirmModal');
}
function doDelete() {
  const id = pendingDeleteId;
  if (!id) { closeModal(); return; }
  memos = memos.filter(m => m.id !== id);
  queueSync();
  render();
  // 열려있는 모든 모달을 즉시 닫는다 (confirmModal + editorModal 등)
  const count = modalStack.length;
  for (let i = 0; i < count; i++) {
    const mid = modalStack.pop();
    const el = document.getElementById(mid);
    if (el) el.classList.remove('show');
    onModalClosed(mid);
  }
  // history 스택도 맞춰서 정리
  if (count > 0) {
    history.go(-count);
  }
  toast('삭제되었습니다');
}

/* ---------- Export / Import ---------- */
function exportJson() {
  const data = {
    app: 'quick-memo',
    version: 1,
    exportedAt: Date.now(),
    memos: memos
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const ts = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
  a.href = url;
  a.download = `quick-memo_${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  closeModal();
  toast('내보내기 완료');
}

function importJson(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      const incoming = Array.isArray(data) ? data : data.memos;
      if (!Array.isArray(incoming)) throw new Error('invalid format');

      const existingIds = new Set(memos.map(m => m.id));
      let added = 0;
      incoming.forEach(m => {
        if (!m || typeof m.content !== 'string' || !CATS.includes(m.cat)) return;
        let id = m.id || genId();
        if (existingIds.has(id)) id = genId();   // 충돌시 새 id
        const now = Date.now();
        memos.push({
          id,
          content: m.content,
          cat: m.cat,
          createdAt: m.createdAt || now,
          updatedAt: m.updatedAt || m.createdAt || now
        });
        existingIds.add(id);
        added++;
      });
      queueSync();
      render();
      closeModal();
      toast(`${added}개 가져왔습니다`);
    } catch (err) {
      toast('가져오기 실패: 잘못된 파일');
    }
  };
  reader.readAsText(file);
}

/* ---------- Event bindings ---------- */
function bindEvents() {
  // Gear → menu
  document.getElementById('gearBtn').addEventListener('click', () => openModal('menuModal'));

  // Menu items
  document.getElementById('menuExport').addEventListener('click', exportJson);
  document.getElementById('menuLogout').addEventListener('click', doLogout);
  document.getElementById('menuImport').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) importJson(f);
    e.target.value = '';
  });

  // FAB
  document.getElementById('fab').addEventListener('click', openNewMemo);

  // Search
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  searchInput.addEventListener('input', (e) => {
    currentSearch = e.target.value;
    searchClear.classList.toggle('visible', currentSearch.length > 0);
    render();
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    currentSearch = '';
    searchClear.classList.remove('visible');
    render();
    searchInput.blur();
  });

  // Filters
  document.getElementById('filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-chip');
    if (!btn) return;
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });

  // Card actions
  document.getElementById('list').addEventListener('click', (e) => {
    const delBtn = e.target.closest('[data-action="delete"]');
    if (delBtn) {
      e.stopPropagation();
      askDelete(delBtn.dataset.id);
      return;
    }
    const editBtn = e.target.closest('[data-action="edit"]');
    if (editBtn) {
      openEditMemo(editBtn.dataset.id);
    }
  });

  // Editor
  document.getElementById('editorCancel').addEventListener('click', () => closeModal());
  document.getElementById('editorSave').addEventListener('click', trySave);
  document.getElementById('editorDelete').addEventListener('click', () => {
    if (editingId) askDelete(editingId);
  });
  document.getElementById('catSelect').addEventListener('click', (e) => {
    const opt = e.target.closest('.cat-option');
    if (!opt) return;
    editingCat = opt.dataset.cat;
    refreshCatUI();
  });

  // Auto-numbering & bullet in textarea
  // 모바일 소프트키보드는 keydown의 e.key가 신뢰되지 않으므로
  // 스페이스/엔터 트리거는 'input' 이벤트로 처리한다.
  const editorText = document.getElementById('editorText');

  // 커서가 있는 줄이 화면에 보이도록 textarea 스크롤을 맞춘다.
  function scrollCursorIntoView(ta) {
    // lineHeight 기반으로 커서 y 추정 후 scrollTop 보정
    const style = window.getComputedStyle(ta);
    const lineHeight = parseFloat(style.lineHeight) || parseFloat(style.fontSize) * 1.5;
    const paddingTop = parseFloat(style.paddingTop) || 0;
    const pos = ta.selectionStart;
    const textBefore = ta.value.substring(0, pos);
    const linesBefore = textBefore.split('\n').length;
    const cursorY = paddingTop + (linesBefore - 1) * lineHeight;
    const visibleBottom = ta.scrollTop + ta.clientHeight;
    if (cursorY + lineHeight > visibleBottom) {
      ta.scrollTop = cursorY + lineHeight - ta.clientHeight + lineHeight;
    } else if (cursorY < ta.scrollTop) {
      ta.scrollTop = cursorY - paddingTop;
    }
  }

  editorText.addEventListener('input', function(e) {
    updateEditorLinks();
    const ta = this;
    const pos = ta.selectionStart;
    const val = ta.value;
    const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
    // 방금 입력된 문자 확인: 현재 커서 직전 문자
    const charBefore = val[pos - 1];
    const lineText = val.substring(lineStart, pos);

    /* ── 스페이스 입력: 리스트 활성화 트리거 ── */
    if (charBefore === ' ') {
      const textBeforeSpace = lineText.substring(0, lineText.length - 1); // 스페이스 제외

      // '* ' → bullet
      if (textBeforeSpace === '*') {
        // '*' + 공백을 '• '로 교체
        const newVal = val.substring(0, lineStart) + '• ' + val.substring(pos);
        ta.value = newVal;
        const newPos = lineStart + 2;
        ta.selectionStart = ta.selectionEnd = newPos;
        ta._listType = 'bullet';
        ta._listNum = null;
        scrollCursorIntoView(ta);
        return;
      }

      // '숫자.' → numbered list
      const numMatch = textBeforeSpace.match(/^(\d+)\.$/);
      if (numMatch) {
        const startNum = parseInt(numMatch[1], 10);
        const prefix = startNum + '. ';
        const newVal = val.substring(0, lineStart) + prefix + val.substring(pos);
        ta.value = newVal;
        const newPos = lineStart + prefix.length;
        ta.selectionStart = ta.selectionEnd = newPos;
        ta._listType = 'number';
        ta._listNum = startNum;
        scrollCursorIntoView(ta);
        return;
      }
    }

    /* ── 엔터 입력: 리스트 계속 또는 종료 ── */
    if (charBefore === '\n') {
      if (!ta._listType) return;

      // 엔터 직전 줄 (방금 완성된 줄)
      const prevLineEnd = pos - 1; // '\n' 위치
      const prevLineStart = val.lastIndexOf('\n', prevLineEnd - 1) + 1;
      const prevLine = val.substring(prevLineStart, prevLineEnd);

      if (ta._listType === 'number') {
        const numLine = prevLine.match(/^(\d+)\. (.*)$/);
        if (!numLine) { ta._listType = null; return; }
        const content = numLine[2];
        if (content.trim() === '') {
          // 빈 항목 → 리스트 종료, 해당 줄 prefix 제거 후 엔터도 제거
          const newVal = val.substring(0, prevLineStart) + val.substring(pos);
          ta.value = newVal;
          ta.selectionStart = ta.selectionEnd = prevLineStart;
          ta._listType = null;
          ta._listNum = null;
        } else {
          // 다음 번호 prefix 삽입 (브라우저가 이미 '\n' 삽입한 상태)
          const nextNum = ta._listNum + 1;
          ta._listNum = nextNum;
          const prefix = nextNum + '. ';
          const newVal = val.substring(0, pos) + prefix + val.substring(pos);
          ta.value = newVal;
          const newPos = pos + prefix.length;
          ta.selectionStart = ta.selectionEnd = newPos;
        }
        scrollCursorIntoView(ta);
        return;
      }

      if (ta._listType === 'bullet') {
        const bulletLine = prevLine.match(/^• (.*)$/);
        if (!bulletLine) { ta._listType = null; return; }
        const content = bulletLine[1];
        if (content.trim() === '') {
          // 빈 항목 → 리스트 종료
          const newVal = val.substring(0, prevLineStart) + val.substring(pos);
          ta.value = newVal;
          ta.selectionStart = ta.selectionEnd = prevLineStart;
          ta._listType = null;
        } else {
          // 불릿 계속
          const newVal = val.substring(0, pos) + '• ' + val.substring(pos);
          ta.value = newVal;
          ta.selectionStart = ta.selectionEnd = pos + 2;
        }
        scrollCursorIntoView(ta);
        return;
      }
    }

    // 일반 타이핑 중에도 커서가 항상 보이게
    scrollCursorIntoView(ta);
  });

  // Confirm modal
  document.getElementById('confirmCancel').addEventListener('click', () => closeModal());
  document.getElementById('confirmDelete').addEventListener('click', doDelete);

  // Overlay clicks → close top modal
  bindOverlayClicks();
}

/* ---------- Periodic time refresh ---------- */
setInterval(() => {
  if (modalStack.length === 0) render();
}, 60000);

/* ---------- Header height sync ---------- */
function syncHeaderHeight() {
  const h = document.getElementById('header').offsetHeight;
  document.documentElement.style.setProperty('--header-h', h + 'px');
}

/* ---------- Init ---------- */
bindEvents();
syncHeaderHeight();

// PIN 입력: 4자리 자동 로그인 / Enter
const pinEl = document.getElementById('pin-input');
pinEl.addEventListener('input', (e) => { if (e.target.value.length === 4) doLogin(); });
pinEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
setTimeout(() => pinEl.focus(), 50);

// 캐시 데이터 우선 렌더 (오프라인 대비)
try {
  const cached = localStorage.getItem(FM34_CACHE);
  if (cached) { memos = JSON.parse(cached); }
} catch (_) {}

// 저장된 토큰 있으면 자동 로그인
if (getAK()) {
  document.getElementById('login-overlay').classList.remove('active');
  render();
  pullFromServer();
}

// 폰트 로딩, 회전, safe-area 변화 등에 대응
window.addEventListener('resize', syncHeaderHeight);
window.addEventListener('orientationchange', syncHeaderHeight);
if (window.ResizeObserver) {
  new ResizeObserver(syncHeaderHeight).observe(document.getElementById('header'));
}

// 키보드가 올라오면 sheet의 padding-bottom을 키보드 높이만큼 늘려
// 내용(링크, 삭제버튼)이 키보드에 가리지 않게 한다.
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', function() {
    const vv = window.visualViewport;
    const keyboardHeight = window.innerHeight - vv.height;
    document.querySelectorAll('.sheet').forEach(sheet => {
      if (keyboardHeight > 0) {
        sheet.style.paddingBottom = keyboardHeight + 'px';
        sheet.style.maxHeight = (vv.height - 24) + 'px';
      } else {
        sheet.style.paddingBottom = '';
        sheet.style.maxHeight = '';
      }
    });
  });
}

// Prevent accidental form submission via Enter on search
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') e.preventDefault();
});

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>초기화</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #fff8f3;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 36px 28px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(180,100,50,0.13);
    border: 1px solid #f0d9c8;
    width: 100%; max-width: 320px;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  .title { font-size: 18px; font-weight: 800; color: #2d1f14; margin-bottom: 8px; }
  .desc { font-size: 13.5px; color: #7a5c48; line-height: 1.6; margin-bottom: 28px; }
  .btn {
    width: 100%; padding: 14px;
    background: #e8732a; color: white;
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:active { background: #c45e1a; transform: scale(0.97); }
  .btn.done { background: #16a34a; }
  .result {
    margin-top: 18px; font-size: 13px;
    color: #7a5c48; line-height: 1.7;
    min-height: 20px;
  }
  .result.ok { color: #16a34a; font-weight: 600; }
  .result.none { color: #b89888; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🧹</div>
  <div class="title">로컬 저장소 초기화</div>
  <div class="desc">이 기기에 저장된 로그인 세션을<br>완전히 삭제해요.</div>
  <button class="btn" id="btn" onclick="clearStorage()">지금 초기화하기</button>
  <div class="result" id="result"></div>
</div>

<script>
function clearStorage() {
  const btn = document.getElementById('btn');
  const result = document.getElementById('result');

  // 삭제 대상 키 목록
  const targets = [
    'HRT3479_key',
    'HRT3479_user',
    // 다른 앱 키도 필요하면 여기 추가
  ];

  const found = [];
  const notFound = [];

  targets.forEach(k => {
    if (localStorage.getItem(k) !== null) {
      localStorage.removeItem(k);
      found.push(k);
    } else {
      notFound.push(k);
    }
  });

  btn.classList.add('done');
  btn.textContent = '✅ 완료';
  btn.disabled = true;

  if (found.length > 0) {
    result.className = 'result ok';
    result.textContent = '삭제 완료: ' + found.join(', ');
  } else {
    result.className = 'result none';
    result.textContent = '저장된 데이터가 없었어요.';
  }
}
</script>
</body>
</html>

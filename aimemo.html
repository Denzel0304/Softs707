    if (!r.ok) { msg.className = 'login-msg err'; msg.textContent = '서버 오류 (' + r.status + ')'; btn.disabled = false; return; }
    const data = await r.json();
    if (data.ok) {
      setAccessKey(data.key);
      document.getElementById('pin-input').value = '';
      msg.className = 'login-msg ok'; msg.textContent = '로그인 성공';
      await afterLogin();
    } else if (data.reason === 'wrong_pin') {
      msg.className = 'login-msg err'; msg.textContent = `PIN 불일치 (남은 시도: ${data.remaining}회)`;
      document.getElementById('pin-input').value = '';
      btn.disabled = false;
    } else if (data.reason === 'locked') {
      const until = new Date(data.until).toLocaleTimeString('ko-KR');
      msg.className = 'login-msg err'; msg.textContent = `잠금 상태 (${until}까지)`;
      btn.disabled = false;
    } else if (data.reason === 'no_pin') {
      msg.className = 'login-msg err'; msg.textContent = 'PIN이 등록되지 않았습니다';
      btn.disabled = false;
    } else {
      msg.className = 'login-msg err'; msg.textContent = '로그인 실패';
      btn.disabled = false;
    }
  } catch(e) {
    msg.className = 'login-msg err'; msg.textContent = '네트워크 오류: ' + e.message;
    btn.disabled = false;
  }
}

async function afterLogin() {
  document.getElementById('login-overlay').classList.remove('active');
  await pullFromServer();
  startPolling();
}

/* ── 로그아웃 (확인 모달 표시) ── */
function doLogout() {
  HS.open('modal-logout-confirm');
}

/* ── 로그아웃 실제 처리 ── */
async function confirmLogout() {
  HS.close('modal-logout-confirm');
  const key = getAccessKey();
  clearTimeout(syncTimer); syncTimer = null;
  stopPolling();
  if (key) {
    try { await rpc('zaim_logout', { p_key: key }); } catch(e) {}
  }
  Object.keys(localStorage).forEach(k => { if (k.startsWith('zaim73_')) localStorage.removeItem(k); });
  S = { memos: [], consult: [], hospital: [] };
  renderAll();
  document.getElementById('login-overlay').classList.add('active');
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-msg').textContent = '';
  authFailCount = 0;
  setSyncIndicator('idle', '●  대기 중');
  setTimeout(() => document.getElementById('pin-input').focus(), 50);
}

/* ── 인증 실패 누적 카운터 (일시 오류와 진짜 만료 구분) ── */
let authFailCount = 0;
const AUTH_FAIL_THRESHOLD = 3;

/* ── pull (서버 → 로컬) ── 
   부팅 시 호출되는 경우 자동 로그아웃 절대 안 함 */
async function pullFromServer(opts = {}) {
  const silent = opts.silent === true;  // true면 인증 실패해도 로그아웃 처리 안 함
  const key = getAccessKey();
  if (!key) return;
  setSyncIndicator('pending', '↓ 불러오는 중...');
  try {
    const r = await rpc('zaim_pull', { p_key: key });
    if (r.status === 401 || r.status === 403) {
      if (!silent) registerAuthFail();
      else setSyncIndicator('err', '⚠ 동기화 보류');
      return;
    }
    if (!r.ok) {
      const t = await r.text();
      if (t.includes('unauthorized')) {
        if (!silent) registerAuthFail();
        else setSyncIndicator('err', '⚠ 동기화 보류');
        return;
      }
      setSyncIndicator('err', '⚠ 불러오기 실패');
      return;
    }
    // 응답 성공 → 인증 카운터 리셋
    authFailCount = 0;
    const data = await r.json();
    if (data && typeof data === 'object') {
      S.memos    = Array.isArray(data.memos)    ? data.memos    : [];
      S.consult  = Array.isArray(data.consult)  ? data.consult  : [];
      S.hospital = Array.isArray(data.hospital) ? data.hospital : [];
    }
    migrateHospital();
    migrateMemos();
    migrateConsult();
    sortHospital();
    sortConsult();
    localStorage.setItem('zaim73_data', JSON.stringify(S));
    renderAll();
    setSyncIndicator('ok', '✓ 동기화됨');
  } catch(e) {
    // 네트워크 오류 — 절대 로그아웃하지 않음
    setSyncIndicator('err', '⚠ 네트워크 오류');
  }
}

/* ── push (로컬 → 서버), debounce 3초 ── */
function queueSync() {
  if (!getAccessKey()) return;
  setSyncIndicator('pending', '● 변경됨');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToServer, 3000);
}

async function pushToServer() {
  const key = getAccessKey();
  if (!key) return;
  if (syncing) { syncTimer = setTimeout(pushToServer, 1500); return; }
  syncing = true;
  setSyncIndicator('pending', '↑ 저장 중...');
  try {
    const payload = { memos: S.memos, consult: S.consult, hospital: S.hospital };
    const r = await rpc('zaim_push', { p_key: key, p_data: payload });
    if (r.status === 401 || r.status === 403) {
      registerAuthFail();
      return;
    }
    if (!r.ok) {
      const t = await r.text();
      if (t.includes('unauthorized')) {
        registerAuthFail();
        return;
      }
      setSyncIndicator('err', '⚠ 저장 실패');
      return;
    }
    // 성공 → 인증 카운터 리셋
    authFailCount = 0;
    lastPushAt = Date.now();
    setSyncIndicator('ok', '✓ 저장됨');
  } catch(e) {
    // 네트워크 오류 — 로그아웃 안 함
    setSyncIndicator('err', '⚠ 네트워크 오류');
  } finally {
    syncing = false;
  }
}

/* ── 인증 실패 누적 처리 ──
   연속 N번 unauthorized가 나와야 진짜 키 만료로 판단.
   1~2번 정도는 일시 오류로 간주하고 무시. */
function registerAuthFail() {
  authFailCount++;
  if (authFailCount >= AUTH_FAIL_THRESHOLD) {
    forceLogout('세션이 만료되었습니다. 다시 로그인하세요');
  } else {
    setSyncIndicator('err', `⚠ 동기화 실패 (${authFailCount}/${AUTH_FAIL_THRESHOLD})`);
  }
}

/* ── 강제 로그아웃 (키 진짜 무효일 때만) ── */
function forceLogout(reason) {
  clearTimeout(syncTimer); syncTimer = null;
  stopPolling();
  Object.keys(localStorage).forEach(k => { if (k.startsWith('zaim73_')) localStorage.removeItem(k); });
  S = { memos: [], consult: [], hospital: [] };
  renderAll();
  authFailCount = 0;
  document.getElementById('login-overlay').classList.add('active');
  document.getElementById('login-msg').className = 'login-msg err';
  document.getElementById('login-msg').textContent = reason || '다시 로그인하세요';
  document.getElementById('login-btn').disabled = false;
  setSyncIndicator('idle', '●  대기 중');
  setTimeout(() => document.getElementById('pin-input').focus(), 50);
}

function setSyncIndicator(state, text) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  el.className = 'sync-indicator ' + (state === 'idle' ? '' : state);
  el.textContent = text;
}

/* PIN 입력 UX: 4자리 채워지면 자동 로그인 시도, Enter도 동작 */
document.addEventListener('DOMContentLoaded', () => {
  const pinInput = document.getElementById('pin-input');
  if (pinInput) {
    pinInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
      if (e.target.value.length === 4) doLogin();
    });
    pinInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  }
});

/* ============================================================
   Utils
============================================================ */
function v(id) { return document.getElementById(id).value.trim(); }
function clear(id) { document.getElementById(id).value = ''; }
function emptyState(msg) { return `<div class="empty"><div class="empty-icon">○</div>${msg}</div>`; }
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._to); t._to = setTimeout(() => t.style.opacity = '0', 2200);
}

loadLocal();

/* ============================================================
   백그라운드 자동 동기화 (폴링 + 포커스)
   - 탭이 활성화된 동안만 30초마다 서버 확인
   - 탭 복귀 시 즉시 1회 pull
   - 모달 열려있거나 막 push한 직후엔 skip
============================================================ */
const POLL_INTERVAL = 30000; // 30초
const POST_PUSH_SKIP = 5000; // push 후 5초간 polling pull 무시
let pollTimer = null;
let lastPushAt = 0;

function startPolling() {
  stopPolling();
  pollTimer = setInterval(autoPull, POLL_INTERVAL);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function autoPull() {
  // 로그인 안 됨 → skip
  if (!getAccessKey()) return;
  // 탭 비활성 → skip (보험)
  if (document.hidden) return;
  // 모달 열려 있음 (입력 중일 가능성) → skip
  if (document.querySelector('.modal-backdrop.open')) return;
  // 막 push한 직후 → skip (메아리 방지)
  if (Date.now() - lastPushAt < POST_PUSH_SKIP) return;
  // 동기화 진행 중 → skip
  if (syncing) return;

  await pullFromServerQuiet();
}

/* ── 조용한 pull: 화면 변경 없으면 렌더/표시 안 함 ── */
async function pullFromServerQuiet() {
  const key = getAccessKey();
  if (!key) return;
  try {
    const r = await rpc('zaim_pull', { p_key: key });
    if (!r.ok) {
      // 일시 오류면 무시. silent 모드 — 아무 표시도 안 함
      return;
    }
    authFailCount = 0;
    const data = await r.json();
    if (!data || typeof data !== 'object') return;

    const newState = {
      memos:    Array.isArray(data.memos)    ? data.memos    : [],
      consult:  Array.isArray(data.consult)  ? data.consult  : [],
      hospital: Array.isArray(data.hospital) ? data.hospital : []
    };

    // 로컬과 서버 동일하면 아무것도 안 함 (깜빡임 방지)
    const localSig = JSON.stringify({
      memos: S.memos, consult: S.consult, hospital: S.hospital
    });
    const serverSig = JSON.stringify(newState);
    if (localSig === serverSig) return;

    // 변경 있음 → 적용
    S.memos    = newState.memos;
    S.consult  = newState.consult;
    S.hospital = newState.hospital;
    migrateHospital();
    migrateMemos();
    migrateConsult();
    sortHospital();
    sortConsult();
    localStorage.setItem('zaim73_data', JSON.stringify(S));
    renderAll();
    setSyncIndicator('ok', '✓ 새 데이터 동기화됨');
  } catch(e) {
    // 네트워크 오류는 그냥 무시
  }
}

/* 탭 활성화 변화 감지 */
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopPolling();
  } else {
    // 복귀하면 즉시 1회 + 폴링 재개
    if (getAccessKey()) {
      autoPull();
      startPolling();
    }
  }
});

/* 창 포커스 감지 (visibilitychange와 중복되지만 안전 보강) */
window.addEventListener('focus', () => {
  if (!document.hidden && getAccessKey()) autoPull();
});

/* ============================================================
   부팅: 로그인 상태에 따라 분기
============================================================ */
(async function boot() {
  if (getAccessKey()) {
    document.getElementById('login-overlay').classList.remove('active');
    await pullFromServer({ silent: true });
    startPolling();
  } else {
    document.getElementById('login-overlay').classList.add('active');
    setTimeout(() => document.getElementById('pin-input').focus(), 50);
  }
})();
</script>

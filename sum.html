<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<title>숨</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --g50:#f0faf0;--g100:#d4f0d4;--g200:#a8e0a8;--g300:#78cc78;--g400:#4db84d;
    --g500:#339933;--g600:#267326;--g700:#1a4f1a;
    --bg:#f7fdf7;--surface:#ffffff;
    --text1:#1a4f1a;--text2:#267326;--text3:#4db84d;
    --border:#c8e8c8;
  }
  html,body{width:100%;height:100%;overflow:hidden;touch-action:none;overscroll-behavior:none;}
  body{font-family:'Apple SD Gothic Neo',system-ui,sans-serif;background:var(--bg);color:var(--text1);}
  #app{display:flex;flex-direction:column;width:100%;height:100%;max-width:430px;margin:0 auto;background:var(--bg);overflow:hidden;}

  /* HEADER */
  #header{background:var(--surface);border-bottom:1px solid var(--border);height:62px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  #header h1{font-size:26px;font-weight:700;color:var(--g600);display:flex;align-items:center;gap:8px;}
  #header h1 i{font-size:28px;color:var(--g400);}

  /* PAGES */
  .page{flex:1;min-height:0;overflow:hidden;display:none;flex-direction:column;}
  .page.active{display:flex;}
  #page-breath{align-items:center;justify-content:space-evenly;padding:6px 16px;}
  #page-history{align-items:center;justify-content:center;padding:20px 16px;}
  #page-settings{padding:0;overflow:hidden;}

  /* TABBAR */
  #tabbar{background:var(--surface);border-top:1px solid var(--border);display:flex;height:52px;flex-shrink:0;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;transition:color 0.15s;}
  .tab i{font-size:20px;}
  .tab.active{color:var(--g500);font-weight:600;}

  /* ── 호흡 페이지 ── */
  #phase-wrap{text-align:center;}
  #phase-label{font-size:16px;font-weight:600;color:var(--g600);letter-spacing:1px;}
  #phase-sub{font-size:11px;color:var(--text3);margin-top:2px;}

  #viz-tabs{display:flex;gap:4px;background:var(--g50);border:1px solid var(--border);border-radius:10px;padding:3px;width:100%;max-width:280px;}
  .viz-tab{flex:1;border:none;background:none;cursor:pointer;padding:5px 6px;border-radius:7px;font-size:11px;color:var(--text2);transition:all 0.15s;}
  .viz-tab.active{background:var(--g400);color:#fff;font-weight:600;}

  #viz-wrap{display:flex;align-items:center;justify-content:center;width:100%;height:160px;flex-shrink:0;}
  #circle-viz{position:relative;width:160px;height:160px;flex-shrink:0;}
  #circle-viz svg{width:100%;height:100%;}
  .track{fill:none;stroke:var(--g100);stroke-width:12;}
  .prog{fill:none;stroke:var(--g400);stroke-width:12;stroke-linecap:round;transform-origin:center;transform:rotate(-90deg);}
  #circle-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  #circle-time{font-size:30px;font-weight:300;color:var(--g600);}
  #circle-unit{font-size:11px;color:var(--text3);}

  #pulse-viz{position:relative;width:160px;height:160px;flex-shrink:0;display:none;}
  #pulse-viz svg{width:100%;height:100%;}
  #pulse-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  #pulse-time{font-size:30px;font-weight:300;color:var(--g600);}
  #pulse-unit{font-size:11px;color:var(--text3);}

  #wave-viz{width:160px;height:160px;flex-shrink:0;display:none;position:relative;border-radius:16px;overflow:hidden;background:var(--g50);}
  #wave-canvas{position:absolute;inset:0;width:100%;height:100%;}
  #wave-time-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30px;font-weight:300;color:var(--g600);pointer-events:none;}

  #stats{display:flex;gap:8px;width:100%;max-width:300px;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 4px;text-align:center;}
  .stat-val{font-size:14px;font-weight:600;color:var(--g600);}
  .stat-lbl{font-size:10px;color:var(--text3);margin-top:1px;}

  #session-row{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:12px;}
  #session-bar{width:120px;height:5px;background:var(--g100);border-radius:3px;overflow:hidden;}
  #session-fill{height:100%;background:var(--g300);border-radius:3px;width:0%;}

  #controls{display:flex;gap:10px;align-items:center;}
  .ctrl-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--g300);background:var(--surface);cursor:pointer;font-size:19px;color:var(--g600);display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .ctrl-btn:active{transform:scale(0.93);}
  #play-btn{width:56px;height:56px;background:var(--g400);border-color:var(--g400);color:#fff;font-size:22px;}
  #play-btn:active{background:var(--g500);}

  /* ── 기록 페이지 ── */
  #page-history{justify-content:flex-start !important;overflow-y:auto;padding:16px 16px 20px;}
  #history-empty{text-align:center;margin:auto;}
  #history-empty i{font-size:44px;margin-bottom:10px;display:block;color:var(--g200);}
  #history-empty p{font-size:15px;font-weight:500;color:var(--text2);}
  #history-empty span{font-size:13px;color:var(--text3);margin-top:4px;display:block;}

  /* 월간 목표 원형 카드 */
  #monthly-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;margin-bottom:12px;}
  #monthly-card-top{display:flex;align-items:center;justify-content:space-between;width:100%;}
  #monthly-title{font-size:13px;font-weight:700;color:var(--text1);}
  #monthly-change-btn{font-size:11px;font-weight:600;color:var(--g500);background:var(--g50);border:1px solid var(--g200);border-radius:8px;padding:4px 10px;cursor:pointer;}
  #monthly-ring-wrap{position:relative;width:140px;height:140px;}
  #monthly-ring-wrap svg{width:100%;height:100%;}
  .ring-track{fill:none;stroke:var(--g100);stroke-width:14;stroke-linecap:round;}
  .ring-prog{fill:none;stroke:var(--g400);stroke-width:14;stroke-linecap:round;transform-origin:center;transform:rotate(-90deg);transition:stroke-dasharray 0.6s cubic-bezier(0.34,1.2,0.64,1),stroke 0.4s;}
  .ring-overflow{fill:none;stroke:var(--g300);stroke-width:14;stroke-linecap:round;stroke-dasharray:0 565;transform-origin:center;transform:rotate(-90deg);transition:stroke-dasharray 0.6s cubic-bezier(0.34,1.2,0.64,1);opacity:0.45;}
  #monthly-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  #monthly-pct{font-size:26px;font-weight:300;color:var(--g600);line-height:1;}
  #monthly-pct-unit{font-size:10px;color:var(--text3);margin-top:2px;}
  #monthly-stats-row{display:flex;gap:8px;width:100%;}
  .m-stat{flex:1;background:var(--g50);border-radius:10px;padding:7px 4px;text-align:center;}
  .m-stat-val{font-size:14px;font-weight:600;color:var(--g600);}
  .m-stat-lbl{font-size:10px;color:var(--text3);margin-top:1px;}

  /* 목표 변경 모달 */
  #goal-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  #goal-modal-overlay.show{opacity:1;pointer-events:all;}
  #goal-modal{background:#fff;border-radius:20px;padding:24px 20px;width:280px;transform:scale(0.92);transition:transform 0.2s;}
  #goal-modal-overlay.show #goal-modal{transform:scale(1);}
  #goal-modal h3{font-size:15px;font-weight:700;color:var(--text1);margin-bottom:14px;}
  #goal-input{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;font-size:22px;font-weight:700;text-align:center;color:var(--g600);outline:none;}
  #goal-input:focus{border-color:var(--g400);}
  #goal-modal-btns{display:flex;gap:8px;margin-top:14px;}
  .gm-cancel{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:14px;cursor:pointer;color:var(--text2);}
  .gm-save{flex:1;padding:10px;border-radius:10px;border:none;background:var(--g400);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}

  /* 기록 리스트 */
  #history-list{width:100%;display:flex;flex-direction:column;gap:8px;}
  #history-list-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
  .history-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;}
  .hi-left{flex:1;}
  .hi-title{font-size:13px;font-weight:600;color:var(--text1);}
  .hi-sub{font-size:11px;color:var(--text3);margin-top:2px;}
  .hi-right{font-size:13px;font-weight:600;color:var(--g500);margin-left:10px;}
  .hi-del{width:26px;height:26px;border-radius:8px;background:rgba(200,50,50,0.07);border:none;cursor:pointer;color:#c03030;font-size:13px;display:flex;align-items:center;justify-content:center;margin-left:6px;flex-shrink:0;}

  /* ── 설정 페이지 ── */
  .setting-group{padding:12px 16px 0;}
  .setting-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
  .setting-name{font-size:13px;color:var(--text1);}
  .setting-val{font-size:13px;font-weight:600;color:var(--g600);min-width:48px;text-align:right;}
  input[type=range]{flex:1;margin:0 8px;accent-color:var(--g400);}
  .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 16px;}
  .preset-btn{border:1.5px solid var(--border);background:var(--g50);border-radius:10px;padding:7px 8px;cursor:pointer;text-align:left;transition:all 0.15s;}
  .preset-btn:active,.preset-btn.selected{border-color:var(--g400);background:var(--g100);}
  .preset-name{font-size:11px;font-weight:600;color:var(--g700);}
  .preset-desc{font-size:9px;color:var(--text3);margin-top:1px;}
  .ratio-visual{display:flex;height:6px;border-radius:3px;overflow:hidden;margin:0 16px 4px;}
  #ratio-in{background:var(--g300);}
  #ratio-out{background:var(--g600);}
  .ratio-labels{display:flex;justify-content:space-between;padding:0 16px;font-size:10px;color:var(--text3);margin-bottom:2px;}
  #save-btn{display:block;margin:20px 16px 14px;width:calc(100% - 32px);padding:10px;background:var(--g500);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
  #save-btn:active{background:var(--g600);}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1><i class="ti ti-wind"></i> 숨</h1>
  </div>

  <!-- 호흡 -->
  <div class="page active" id="page-breath">
    <div id="phase-wrap">
      <div id="phase-label">준비</div>
      <div id="phase-sub">시작 버튼을 눌러주세요.</div>
    </div>
    <div id="viz-tabs">
      <button class="viz-tab active" data-mode="circle">원형</button>
      <button class="viz-tab" data-mode="pulse">맥박</button>
      <button class="viz-tab" data-mode="wave">파동</button>
    </div>
    <div id="viz-wrap">
      <div id="circle-viz">
        <svg viewBox="0 0 220 220">
          <circle class="track" cx="110" cy="110" r="90"/>
          <circle class="prog" id="prog-circle" cx="110" cy="110" r="90"/>
        </svg>
        <div id="circle-center">
          <div id="circle-time">0.0</div>
          <div id="circle-unit">초</div>
        </div>
      </div>
      <div id="pulse-viz">
        <svg viewBox="0 0 220 220">
          <circle cx="110" cy="110" r="90" fill="none" stroke="var(--g100)" stroke-width="2"/>
          <circle id="pulse-circle" cx="110" cy="110" r="0" fill="var(--g400)"/>
        </svg>
        <div id="pulse-center">
          <div id="pulse-time">0.0</div>
          <div id="pulse-unit">초</div>
        </div>
      </div>
      <div id="wave-viz">
        <canvas id="wave-canvas" width="320" height="320"></canvas>
        <div id="wave-time-label">0.0</div>
      </div>
    </div>
    <div id="stats">
      <div class="stat"><div class="stat-val" id="stat-cycle">5.5</div><div class="stat-lbl">회/분</div></div>
      <div class="stat"><div class="stat-val" id="stat-in">4.9s</div><div class="stat-lbl">들숨</div></div>
      <div class="stat"><div class="stat-val" id="stat-out">6.1s</div><div class="stat-lbl">날숨</div></div>
    </div>
    <div id="session-row">
      <i class="ti ti-clock" style="font-size:13px;"></i>
      <span id="session-text">0:00 / 5:00</span>
      <div id="session-bar"><div id="session-fill"></div></div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="reset-btn"><i class="ti ti-player-skip-back"></i></button>
      <button class="ctrl-btn" id="play-btn"><i class="ti ti-player-play"></i></button>
    </div>
  </div>

  <!-- 기록 -->
  <div class="page" id="page-history">
    <!-- 월간 원형 카드 -->
    <div id="monthly-card">
      <div id="monthly-card-top">
        <span id="monthly-title">이번 달 목표</span>
        <button id="monthly-change-btn">변경</button>
      </div>
      <div id="monthly-ring-wrap">
        <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-track" cx="90" cy="90" r="73"/>
          <circle class="ring-prog" id="ring-prog" cx="90" cy="90" r="73"/>
          <circle class="ring-overflow" id="ring-overflow" cx="90" cy="90" r="73"/>
        </svg>
        <div id="monthly-center">
          <div id="monthly-pct">0%</div>
          <div id="monthly-pct-unit">달성률</div>
        </div>
      </div>
      <div id="monthly-stats-row">
        <div class="m-stat"><div class="m-stat-val" id="m-done">0</div><div class="m-stat-lbl">완료 횟수</div></div>
        <div class="m-stat"><div class="m-stat-val" id="m-goal-val">31</div><div class="m-stat-lbl">목표 횟수</div></div>
        <div class="m-stat"><div class="m-stat-val" id="m-remain">31</div><div class="m-stat-lbl">남은 횟수</div></div>
      </div>
    </div>

    <!-- 기록 없음 -->
    <div id="history-empty" style="display:none;">
      <i class="ti ti-leaf"></i>
      <p>기록이 없어요.</p>
      <span>세션을 완료하면 여기에 기록됩니다.</span>
    </div>

    <!-- 기록 리스트 -->
    <div id="history-list-wrap" style="width:100%;">
      <div id="history-list-title">세션 기록</div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- 월간 목표 변경 모달 -->
  <div id="goal-modal-overlay">
    <div id="goal-modal">
      <h3>🎯 이번 달 목표 횟수</h3>
      <input type="number" id="goal-input" min="1" max="200" value="31" inputmode="numeric"/>
      <div id="goal-modal-btns">
        <button class="gm-cancel" id="gm-cancel">취소</button>
        <button class="gm-save" id="gm-save">저장</button>
      </div>
    </div>
  </div>

  <!-- 설정 -->
  <div class="page" id="page-settings">
    <div class="setting-group"><div class="setting-label">프리셋</div></div>
    <div class="preset-grid" id="preset-grid"></div>

    <div class="setting-group">
      <div class="setting-label">호흡 속도</div>
      <div class="setting-row">
        <span class="setting-name">1분 당 횟수</span>
        <span class="setting-val" id="val-cycles">5.5</span>
      </div>
      <div class="setting-row"><input type="range" id="sl-cycles" min="5" max="10" step="0.5" value="5.5"></div>
    </div>

    <div class="setting-group">
      <div class="setting-label">들숨 : 날숨 비율</div>
      <div class="setting-row">
        <span class="setting-name">들숨 비율</span>
        <span class="setting-val" id="val-in-ratio">45%</span>
      </div>
      <div class="setting-row"><input type="range" id="sl-ratio" min="10" max="90" step="5" value="45"></div>
      <div class="ratio-visual"><div id="ratio-in" style="flex:45"></div><div id="ratio-out" style="flex:55"></div></div>
      <div class="ratio-labels"><span id="lbl-in">들숨 4.9초</span><span id="lbl-out">날숨 6.1초</span></div>
    </div>

    <div class="setting-group">
      <div class="setting-label">세션 시간</div>
      <div class="setting-row">
        <span class="setting-name">호흡 시간</span>
        <span class="setting-val" id="val-session">5분</span>
      </div>
      <div class="setting-row"><input type="range" id="sl-session" min="1" max="30" step="1" value="5"></div>
    </div>

    <button id="save-btn">적용하기</button>
  </div>

  <div id="tabbar">
    <button class="tab active" data-page="page-breath"><i class="ti ti-wind"></i><span>호흡</span></button>
    <button class="tab" data-page="page-history"><i class="ti ti-chart-line"></i><span>기록</span></button>
    <button class="tab" data-page="page-settings"><i class="ti ti-settings"></i><span>설정</span></button>
  </div>
</div>

<script>
const PRESETS=[
  {name:'공명 호흡',desc:'5.5회 · 45:55',cycles:5.5,ratio:45,session:5},
  {name:'4-6 호흡',desc:'6회 · 40:60',cycles:6,ratio:40,session:5},
  {name:'박스 호흡',desc:'6회 · 50:50',cycles:6,ratio:50,session:5},
  {name:'이완 호흡',desc:'5회 · 33:67',cycles:5,ratio:33,session:10},
];

const DEFAULT={cycles:5.5,ratio:45,session:5};
let cfg;
try{ cfg=JSON.parse(localStorage.getItem('sum_cfg'))||{...DEFAULT}; }
catch(e){ cfg={...DEFAULT}; }

let running=false,phase='idle',phaseStart=null,phaseTotal=0,sessionStart=null,rafId=null;
let vizMode='circle',pausedPhaseElapsed=0,pausedSessionElapsed=0,wavePhase=0;
let historyLog=[];
let monthlyGoal=31;
try{ historyLog=JSON.parse(localStorage.getItem('sum_history'))||[]; }catch(e){ historyLog=[]; }
try{ monthlyGoal=parseInt(localStorage.getItem('sum_monthly_goal'))||31; }catch(e){ monthlyGoal=31; }
const CIRC=2*Math.PI*90;

const phaseLabel=document.getElementById('phase-label');
const phaseSub=document.getElementById('phase-sub');
const circleTime=document.getElementById('circle-time');
const progCircle=document.getElementById('prog-circle');
const waveTL=document.getElementById('wave-time-label');
const sessionText=document.getElementById('session-text');
const sessionFill=document.getElementById('session-fill');
const playBtn=document.getElementById('play-btn');
const waveCanvas=document.getElementById('wave-canvas');
const wCtx=waveCanvas.getContext('2d');

function calcT(c){const cy=60/c.cycles;return{inSec:cy*(c.ratio/100),outSec:cy*(1-c.ratio/100)};}

function updateStats(){
  const t=calcT(cfg);
  document.getElementById('stat-cycle').textContent=cfg.cycles;
  document.getElementById('stat-in').textContent=t.inSec.toFixed(1)+'s';
  document.getElementById('stat-out').textContent=t.outSec.toFixed(1)+'s';
  sessionText.textContent='0:00 / '+fmt(cfg.session*60);
}

function setProg(ratio,isIn){
  progCircle.style.strokeDasharray=`${CIRC*ratio} ${CIRC}`;
  progCircle.style.stroke=isIn?'#78cc78':'#267326';
  const r=isIn?ratio*90:(1-ratio)*90;
  const pc=document.getElementById('pulse-circle');
  pc.setAttribute('r',r);
  pc.setAttribute('fill',isIn?'#78cc78':'#267326');
  const pt=document.getElementById('pulse-time');
  pt.style.color=r>20?'#fff':'#267326';
  document.getElementById('pulse-unit').style.color=r>20?'rgba(255,255,255,0.8)':'#4db84d';
}

function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}

function drawWave(r,isIn){
  const W=waveCanvas.width,H=waveCanvas.height;
  wCtx.clearRect(0,0,W,H);
  const amp=15+r*35;
  wCtx.beginPath();
  for(let x=0;x<=W;x++){
    const y=H/2+amp*Math.sin(x/W*1.5*2*Math.PI+wavePhase);
    x===0?wCtx.moveTo(x,y):wCtx.lineTo(x,y);
  }
  wCtx.strokeStyle=isIn?'#78cc78':'#267326';
  wCtx.lineWidth=4;wCtx.stroke();
  wavePhase+=isIn?0.04:-0.04;
}

function tick(now){
  if(!running)return;
  const t=calcT(cfg),sessMs=cfg.session*60000;
  const sessEl=pausedSessionElapsed+(now-sessionStart);
  sessionFill.style.width=(Math.min(sessEl/sessMs,1)*100)+'%';
  sessionText.textContent=fmt(sessEl/1000)+' / '+fmt(cfg.session*60);
  if(sessEl>=sessMs){completeSession();return;}
  const phEl=pausedPhaseElapsed+(now-phaseStart)/1000;
  const ratio=Math.min(phEl/phaseTotal,1),rem=Math.max(phaseTotal-phEl,0);
  const isIn=phase==='in';
  setProg(ratio,isIn);
  const ts=rem.toFixed(1);
  circleTime.textContent=ts;
  document.getElementById('pulse-time').textContent=ts;
  waveTL.textContent=ts;
  if(vizMode==='wave')drawWave(ratio,isIn);
  if(ratio>=1){
    pausedPhaseElapsed=0;
    if(phase==='in'){phase='out';phaseTotal=t.outSec;phaseLabel.textContent='날숨';phaseSub.textContent=t.outSec.toFixed(1)+'초간 천천히 내쉬세요.';}
    else{phase='in';phaseTotal=t.inSec;phaseLabel.textContent='들숨';phaseSub.textContent=t.inSec.toFixed(1)+'초간 천천히 들이 쉬세요.';}
    phaseStart=now;
  }
  rafId=requestAnimationFrame(tick);
}

function completeSession(){
  running=false;cancelAnimationFrame(rafId);
  const now=new Date();
  historyLog.unshift({
    date:now.toLocaleDateString('ko-KR',{month:'short',day:'numeric'}),
    time:now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    ym:now.getFullYear()+'-'+(now.getMonth()+1),
    session:cfg.session,cycles:cfg.cycles,ratio:cfg.ratio
  });
  localStorage.setItem('sum_history',JSON.stringify(historyLog));
  renderHistory();
  stop(true);
}

function start(){
  if(running)return;
  const t=calcT(cfg);running=true;phase='in';phaseTotal=t.inSec;
  pausedPhaseElapsed=0;pausedSessionElapsed=0;
  phaseStart=sessionStart=performance.now();
  phaseLabel.textContent='들숨';phaseSub.textContent=t.inSec.toFixed(1)+'초간 천천히 들이 쉬세요.';
  playBtn.innerHTML='<i class="ti ti-player-pause"></i>';
  rafId=requestAnimationFrame(tick);
}

function pause(){
  if(!running)return;running=false;cancelAnimationFrame(rafId);
  const now=performance.now();
  pausedPhaseElapsed+=(now-phaseStart)/1000;
  pausedSessionElapsed+=(now-sessionStart);
  playBtn.innerHTML='<i class="ti ti-player-play"></i>';
  phaseLabel.textContent='일시정지';phaseSub.textContent='다시 시작하려면 재생을 누르세요.';
}

function resume(){
  if(running)return;running=true;
  phaseStart=sessionStart=performance.now();
  const t=calcT(cfg);
  phaseLabel.textContent=phase==='in'?'들숨':'날숨';
  phaseSub.textContent=phase==='in'?t.inSec.toFixed(1)+'초간 천천히 들이 쉬세요.':t.outSec.toFixed(1)+'초간 천천히 내쉬세요.';
  playBtn.innerHTML='<i class="ti ti-player-pause"></i>';
  rafId=requestAnimationFrame(tick);
}

function stop(done){
  running=false;cancelAnimationFrame(rafId);phase='idle';
  pausedPhaseElapsed=0;pausedSessionElapsed=0;
  setProg(0,true);
  circleTime.textContent='0.0';
  document.getElementById('pulse-time').textContent='0.0';
  waveTL.textContent='0.0';
  sessionFill.style.width=done?'100%':'0%';
  sessionText.textContent='0:00 / '+fmt(cfg.session*60);
  playBtn.innerHTML='<i class="ti ti-player-play"></i>';
  phaseLabel.textContent=done?'완료!':'준비';
  phaseSub.textContent=done?'훌륭해요! 세션을 마쳤습니다 🌿':'시작 버튼을 눌러주세요.';
  if(vizMode==='wave')wCtx.clearRect(0,0,waveCanvas.width,waveCanvas.height);
  document.getElementById('pulse-circle').setAttribute('r',0);
}

playBtn.addEventListener('click',()=>{
  if(phase==='idle')start();
  else if(running)pause();
  else resume();
});
document.getElementById('reset-btn').addEventListener('click',()=>{pause();stop(false);});

// VIZ 탭
document.querySelectorAll('.viz-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.viz-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');vizMode=btn.dataset.mode;
    document.getElementById('circle-viz').style.display=vizMode==='circle'?'block':'none';
    document.getElementById('pulse-viz').style.display=vizMode==='pulse'?'block':'none';
    document.getElementById('wave-viz').style.display=vizMode==='wave'?'block':'none';
  });
});
document.getElementById('circle-viz').style.display='block';
document.getElementById('pulse-viz').style.display='none';
document.getElementById('wave-viz').style.display='none';
progCircle.style.strokeDasharray=`0 ${CIRC}`;

// 페이지 탭 전환
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const target=btn.dataset.page;
    document.querySelectorAll('.page').forEach(p=>{
      p.classList.toggle('active',p.id===target);
    });
  });
});

// 월간 링 렌더
const RING_CIRC=2*Math.PI*73;
function renderMonthlyRing(){
  const now=new Date();
  const ym=now.getFullYear()+'-'+(now.getMonth()+1);
  const thisMon=historyLog.filter(h=>h.ym===ym).length;
  const pct=Math.round((thisMon/monthlyGoal)*100);
  const over=Math.max(0,thisMon-monthlyGoal);
  const base=Math.min(thisMon,monthlyGoal);
  const basePct=base/monthlyGoal;
  const overPct=over/monthlyGoal;

  const prog=document.getElementById('ring-prog');
  const overEl=document.getElementById('ring-overflow');
  prog.style.strokeDasharray=`${RING_CIRC*Math.min(basePct,1)} ${RING_CIRC}`;
  prog.style.stroke=over>0?'var(--g500)':'var(--g400)';
  if(over>0){
    overEl.style.strokeDasharray=`${RING_CIRC*Math.min(overPct,1)} ${RING_CIRC}`;
  } else {
    overEl.style.strokeDasharray=`0 ${RING_CIRC}`;
  }

  document.getElementById('monthly-pct').textContent=pct+'%';
  document.getElementById('m-done').textContent=thisMon;
  document.getElementById('m-goal-val').textContent=monthlyGoal;
  document.getElementById('m-remain').textContent=Math.max(0,monthlyGoal-thisMon);
  if(over>0){
    document.getElementById('monthly-pct').style.color='var(--g500)';
    document.getElementById('m-remain').textContent='+'+over;
    document.getElementById('m-remain').closest('.m-stat').querySelector('.m-stat-lbl').textContent='초과 달성';
  } else {
    document.getElementById('monthly-pct').style.color='var(--g600)';
    document.getElementById('m-remain').closest('.m-stat').querySelector('.m-stat-lbl').textContent='남은 횟수';
  }
}

function renderHistory(){
  renderMonthlyRing();
  const list=document.getElementById('history-list');
  const empty=document.getElementById('history-empty');
  if(!historyLog.length){
    empty.style.display='block';
    document.getElementById('history-list-wrap').style.display='none';
    return;
  }
  empty.style.display='none';
  document.getElementById('history-list-wrap').style.display='block';
  list.innerHTML='';
  historyLog.forEach((h,i)=>{
    const el=document.createElement('div');
    el.className='history-item';
    el.innerHTML=`<div class="hi-left"><div class="hi-title">${h.date} ${h.time}</div><div class="hi-sub">${h.cycles}회/분 · 들숨 ${h.ratio}% · 날숨 ${100-h.ratio}%</div></div><div class="hi-right">${h.session}분</div><button class="hi-del" data-idx="${i}" title="삭제"><i class="ti ti-x"></i></button>`;
    list.appendChild(el);
  });
  list.querySelectorAll('.hi-del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      historyLog.splice(parseInt(btn.dataset.idx),1);
      localStorage.setItem('sum_history',JSON.stringify(historyLog));
      renderHistory();
    });
  });
}

// 월간 목표 변경 모달
document.getElementById('monthly-change-btn').addEventListener('click',()=>{
  document.getElementById('goal-input').value=monthlyGoal;
  document.getElementById('goal-modal-overlay').classList.add('show');
});
document.getElementById('gm-cancel').addEventListener('click',()=>{
  document.getElementById('goal-modal-overlay').classList.remove('show');
});
document.getElementById('gm-save').addEventListener('click',()=>{
  const v=parseInt(document.getElementById('goal-input').value);

  document.getElementById('goal-modal-overlay').classList.remove('show');
});

// 설정 슬라이더
function syncSettings(){
  const c=parseFloat(document.getElementById('sl-cycles').value);
  const r=parseInt(document.getElementById('sl-ratio').value);
  const s=parseInt(document.getElementById('sl-session').value);
  document.getElementById('val-cycles').textContent=c;
  document.getElementById('val-in-ratio').textContent=r+'%';
  document.getElementById('val-session').textContent=s+'분';
  const cy=60/c,inS=(cy*r/100).toFixed(1),outS=(cy*(100-r)/100).toFixed(1);
  document.getElementById('ratio-in').style.flex=r;
  document.getElementById('ratio-out').style.flex=100-r;
  document.getElementById('lbl-in').textContent='들숨 '+inS+'초';
  document.getElementById('lbl-out').textContent='날숨 '+outS+'초';
}
['sl-cycles','sl-ratio','sl-session'].forEach(id=>{
  document.getElementById(id).addEventListener('input',syncSettings);
});

// 적용하기
document.getElementById('save-btn').addEventListener('click',()=>{
  cfg={
    cycles:parseFloat(document.getElementById('sl-cycles').value),
    ratio:parseInt(document.getElementById('sl-ratio').value),
    session:parseInt(document.getElementById('sl-session').value)
  };
  localStorage.setItem('sum_cfg',JSON.stringify(cfg));
  updateStats();
  stop(false);
  // 호흡 탭으로 이동
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-page="page-breath"]').classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-breath'));
});

// 프리셋
const pg=document.getElementById('preset-grid');
PRESETS.forEach(p=>{
  const btn=document.createElement('button');
  btn.className='preset-btn';
  btn.innerHTML='<div class="preset-name">'+p.name+'</div><div class="preset-desc">'+p.desc+'</div>';
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('sl-cycles').value=p.cycles;
    document.getElementById('sl-ratio').value=p.ratio;
    document.getElementById('sl-session').value=p.session;
    syncSettings();
  });
  pg.appendChild(btn);
});

// 초기화 — 저장된 cfg로 슬라이더 세팅
document.getElementById('sl-cycles').value=cfg.cycles;
document.getElementById('sl-ratio').value=cfg.ratio;
document.getElementById('sl-session').value=cfg.session;
syncSettings();
updateStats();
renderHistory();
</script>

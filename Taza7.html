<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYPE — 타자연습</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Gowun+Dodum&family=Archivo:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eaf4e4; --bg2:#dcebd0; --panel:#ffffff; --ink:#1f2a1c; --muted:#6d7d63;
    --line:#cfe0c2; --accent:#3fa34d; --accent-soft:#d4eecb; --good:#2f9e44;
    --bad:#e03131; --bad-bg:rgba(224,49,49,.12); --cur-bg:#fff7c2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(900px 480px at 82% -8%, rgba(63,163,77,.14), transparent 60%),
      radial-gradient(720px 560px at -8% 108%, rgba(63,163,77,.10), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:'Archivo',sans-serif; min-height:100%;
    display:flex;flex-direction:column;align-items:center; padding:0 20px 60px;
  }
  .wrap{width:100%;max-width:880px}
  /* 고정 헤더 */
  header{position:sticky;top:0;z-index:20;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    border-bottom:1px solid var(--line);padding:24px 0 16px;margin-bottom:22px}
  .logo{font-weight:900;font-size:34px;letter-spacing:-2px;line-height:.9;text-align:center}
  .logo small{display:block;font-family:'Space Mono',monospace;font-weight:400;
    font-size:11px;letter-spacing:3px;color:var(--muted);margin-top:6px}
  .logo b{color:var(--accent)}
  .modes{display:flex;gap:6px}
  .mode-btn{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;
    background:var(--panel);color:var(--muted);border:1px solid var(--line);
    padding:9px 14px;border-radius:999px;cursor:pointer;transition:.18s}
  .mode-btn:hover{color:var(--ink);border-color:var(--accent)}
  .mode-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  .config{display:flex;gap:18px;flex-wrap:nowrap;align-items:center;margin-bottom:20px}
  .seg{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .seg .cap{font-family:'Archivo',sans-serif;font-size:15px;font-weight:800;letter-spacing:.5px;color:var(--ink)}
  .pill{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
  .pill button{border:none;background:transparent;color:var(--muted);font-family:'Space Mono',monospace;
    font-size:12px;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.15s}
  .pill button.on{background:var(--accent-soft);color:var(--ink);font-weight:700}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
    background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:20px}
  .stat{background:var(--panel);padding:15px 14px}
  .stat .label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  .stat .val{font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:3px}
  .stat .val span{font-size:13px;color:var(--muted);font-weight:600;margin-left:3px}
  .stat.live .val{color:var(--accent)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px 30px 24px;position:relative;
    box-shadow:0 10px 30px -18px rgba(47,107,46,.4)}
  .progress{position:absolute;left:0;top:0;height:3px;width:0;background:var(--accent);border-radius:16px 0 0 0;transition:width .15s}

  /* ── 단어 스트림 뷰 ── */
  .word-stage{
    position:relative;overflow:hidden;
    height:90px;
    display:flex;align-items:center;
    border-bottom:1px solid var(--line);
  }
  /* 흐르는 단어들 컨테이너 */
  .word-belt{
    position:absolute;
    display:flex;align-items:center;gap:0;
    white-space:nowrap;
    transition:transform .22s cubic-bezier(.4,0,.2,1);
    will-change:transform;
  }
  /* 개별 단어 칩 — 기본(지나간/먼 앞) */
  .w{
    display:inline-flex;align-items:center;
    font-family:'Space Mono',monospace;
    font-size:22px;color:var(--muted);
    padding:0 12px;
    transition:font-size .18s, color .18s, font-weight .18s, opacity .18s;
    cursor:default;user-select:none;
    line-height:1;
  }
  .w.kor{font-family:'Gowun Dodum',sans-serif;}
  .w.done-ok{color:var(--good);}
  .w.done-bad{color:var(--bad);}
  /* 완료 단어는 더 작게 */
  .w.done-ok, .w.done-bad{font-size:18px;}
  /* 활성 단어 */
  .w.active{font-size:42px;font-weight:700;color:var(--ink);}
  .w.active.kor{font-size:44px;}
  /* 다음 단어 (next 클래스) */
  .w.next-word{font-size:28px;font-weight:600;color:var(--ink);opacity:1;}
  .w.next-word.kor{font-size:30px;}
  /* 그 뒤 단어들 */
  .w.pending{font-size:22px;opacity:.45;}
  /* 활성 단어 안의 글자 색 */
  .w.active .lch.ok{color:var(--good);}
  .w.active .lch.bad{color:var(--bad);background:var(--bad-bg);border-radius:2px;}
  .w.active .lch.rest{color:var(--muted);}
  .w.active .lch.next{color:var(--ink);}
  @keyframes blink{50%{opacity:0}}

  /* ── 입력창 ── */
  .input-row{margin-top:0;display:flex;gap:0;align-items:stretch;}
  #field{
    flex:1;background:#f6fbf2;border:1px solid var(--line);
    border-top:none;border-radius:0 0 0 10px;
    color:var(--ink);
    font-family:'Space Mono',monospace;font-size:32px;line-height:1;
    padding:0 20px;outline:none;transition:border-color .18s, box-shadow .18s;
    height:80px;overflow:hidden;
  }
  #field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(63,163,77,.16);z-index:1;position:relative;}
  #field.kor{font-family:'Gowun Dodum',sans-serif;font-size:34px;}
  .btn{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1px;background:var(--accent);
    color:#fff;border:none;border-radius:10px;padding:14px 22px;font-weight:700;cursor:pointer;transition:.15s}
  .btn:hover{filter:brightness(1.06)}
  .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--muted)}
  .btn.ghost:hover{color:var(--ink);border-color:var(--accent)}
  .btn.soft{background:var(--accent-soft);border:1px solid var(--line);color:var(--accent);
    border-top:none;border-radius:0 0 10px 0;height:80px;padding:0 22px;}
  .btn.soft:hover{filter:brightness(.97);border-color:var(--accent)}
  .hint{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:13px;letter-spacing:.5px}
  .overlay{position:fixed;inset:0;background:rgba(31,42,28,.42);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:20px;z-index:30}
  .overlay.show{display:flex}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;width:100%;max-width:440px;padding:30px;
    box-shadow:0 24px 60px -20px rgba(47,107,46,.45);animation:pop .25s ease}
  @keyframes pop{from{transform:translateY(12px) scale(.97);opacity:0}to{transform:none;opacity:1}}
  .card h2{font-size:26px;font-weight:900;letter-spacing:-1px;margin-bottom:2px}
  .card h2 em{color:var(--accent);font-style:normal}
  .card .sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:6px}
  .rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}
  .rbox{background:#f6fbf2;border:1px solid var(--line);border-radius:12px;padding:14px}
  .rbox .l{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  .rbox .v{font-size:28px;font-weight:800;margin-top:3px}
  .name-row{display:flex;gap:8px;margin-top:6px}
  #pname{flex:1;background:#f6fbf2;border:1px solid var(--line);border-radius:10px;color:var(--ink);
    font-family:'Space Mono',monospace;padding:12px 14px;outline:none}
  #pname:focus{border-color:var(--accent)}
  .lb{margin-top:28px}
  .lb h3{font-family:'Archivo',sans-serif;font-size:22px;font-weight:900;letter-spacing:-.5px;color:var(--ink);
    margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .lb h3 button{font-family:'Archivo',sans-serif;font-size:14px;font-weight:800;background:none;border:none;color:var(--bad);cursor:pointer;letter-spacing:0}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;table-layout:fixed}
  th,td{text-align:left;padding:11px 8px;border-bottom:1px solid var(--line);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tr:last-child td{border-bottom:none}
  th{font-family:'Archivo',sans-serif;font-size:13px;font-weight:800;letter-spacing:.3px;color:var(--ink)}
  td.rank,th.rank{font-family:'Space Mono',monospace;color:var(--accent);font-weight:700;width:32px;text-align:center}
  td.score{font-weight:800}
  .col-name{width:13%}
  .col-mode{width:10%}
  .col-style{width:18%}
  .col-score{width:16%}
  .col-acc{width:13%}
  .col-time{width:22%}
  tr.empty td{color:var(--muted);text-align:center;font-family:'Space Mono',monospace;font-size:12px;padding:24px;white-space:normal}
  .you{background:var(--accent-soft)}
  td .unit{color:var(--muted);font-weight:400;font-size:10px}
  footer{margin-top:32px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.5px;text-align:center;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">TYPE<b>.</b><small>TYPING TRAINER</small></div>
  </header>
  <div class="config">
    <div class="modes" id="modes">
      <button class="mode-btn on" data-mode="eng">영타 ENG</button>
      <button class="mode-btn" data-mode="kor">한글 KOR</button>
    </div>
    <div class="seg">
      <span class="cap">방식</span>
      <div class="pill" id="style-pill">
        <button data-style="time" class="on">시간제</button>
        <button data-style="length">분량제</button>
      </div>
    </div>
    <div class="seg" id="dur-seg">
      <span class="cap" id="dur-cap">시간</span>
      <div class="pill" id="dur-pill">
        <button data-dur="60" class="on">1분</button>
        <button data-dur="180">3분</button>
        <button data-dur="300">5분</button>
      </div>
    </div>
  </div>
  <div class="stats">
    <div class="stat live"><div class="label" id="speed-label">WPM</div><div class="val" id="s-speed">0</div></div>
    <div class="stat"><div class="label" id="cpm-label">타수 CPM</div><div class="val" id="s-cpm">0</div></div>
    <div class="stat"><div class="label">정확도</div><div class="val" id="s-acc">100<span>%</span></div></div>
    <div class="stat"><div class="label" id="time-label">남은시간</div><div class="val" id="s-time">1:00</div></div>
  </div>
  <div class="panel">
    <div class="progress" id="progress"></div>
    <!-- 단어 스트림 -->
    <div class="word-stage" id="word-stage">
      <div class="word-belt" id="word-belt"></div>
    </div>
    <!-- 입력 + 버튼 (하단 일체형) -->
    <div class="input-row">
      <input type="text" id="field"
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button class="btn soft" id="restart">다시 ↻</button>
    </div>
    <div class="hint" id="hint">입력을 시작하면 측정이 시작됩니다 · ESC = 다시 시작</div>
  </div>
  <div class="lb">
    <h3>기록 <button id="clear-lb">기록 삭제</button></h3>
    <table>
      <thead><tr>
        <th class="rank">#</th>
        <th class="col-name">이름</th>
        <th class="col-mode">모드</th>
        <th class="col-style">방식</th>
        <th class="col-score" id="th-score">WPM</th>
        <th class="col-acc">정확도</th>
        <th class="col-time">수행시간</th>
      </tr></thead>
      <tbody id="lb-body"></tbody>
    </table>
  </div>
  <footer>한글=타건수 기반 CPM · 영타=분당 타건수 CPM (WPM은 CPM÷5, 참고용)</footer>
</div>
<div class="overlay" id="overlay">
  <div class="card">
    <h2>완료<em>!</em></h2>
    <div class="sub" id="r-sub"></div>
    <div class="rgrid">
      <div class="rbox"><div class="l" id="rl-speed">WPM</div><div class="v" id="r-speed">0</div></div>
      <div class="rbox"><div class="l" id="rl-cpm">WPM</div><div class="v" id="r-cpm">0</div></div>
      <div class="rbox"><div class="l">정확도</div><div class="v" id="r-acc">0%</div></div>
      <div class="rbox"><div class="l">수행시간</div><div class="v" id="r-time">0s</div></div>
    </div>
    <div class="name-row">
      <input id="pname" placeholder="이름 입력 (최대 5자)" maxlength="5">
      <button class="btn" id="save-score">등록</button>
    </div>
    <div style="margin-top:14px"><button class="btn ghost" id="again" style="width:100%;padding:12px 0">다시 도전 →</button></div>
  </div>
</div>
<script>
// ===== 콘텐츠 풀 (대폭 확장) =====
const ENG_WORDS=("the be of and a to in he have it that for they with as not on she at by this we you do but from or which one would all will there say who make when can more if no man out other so what time up go about than into could state only new year some take come these know see use get like then first any work now may such give over think most even find day also after way many must look before great back through long where much should well people down own just because good each those feel seem how high too place little world very still nation hand old life tell write become here show house both between need mean call develop under last right move thing general school never same another begin while number part turn real leave might want point form off child few small since against ask late home interest large person end open public follow during present without again hold govern around possible head consider word program problem however lead system set order eye plan run keep face fact group play stand increase early course change help line city door without family night picture learn money serve appear road map science rule govern pull cold notice voice fall power town fine certain fly unit lead cry dark machine note wait plan figure star box noun field rest correct able pound done beauty drive stood contain front teach week final gave green oh quick develop sleep warm free minute strong special mind behind clear tail produce fact street inch lot nothing course stay wheel full force blue object decide surface deep moon island foot yet busy test record boat common gold possible plane stead dry wonder laugh thousand ago ran check game shape yes hot miss brought heat snow bed bring sit perhaps fill east weight language among").split(" ");
const ENG_SENT=[
  "the quick brown fox jumps over the lazy dog every morning",
  "practice makes perfect when you keep your hands steady and your eyes ahead",
  "a journey of a thousand miles begins with a single step forward",
  "code is read far more often than it is ever written by anyone",
  "stay hungry stay foolish and never stop learning something new each day",
  "simplicity is the ultimate form of sophistication in any honest design",
  "the best way to predict the future is to invent it with your own hands",
  "great work comes from loving what you do and doing it again tomorrow",
  "small daily habits quietly compound into remarkable long term results",

  "type with rhythm and let the words flow like a calm steady river",

];
const KOR_SENT=[
  "오늘도 한 걸음씩 천천히 나아가면 분명히 어딘가에 닿게 됩니다",
  "타자 연습은 매일 조금씩 꾸준히 하는 것이 가장 좋은 방법입니다",
  "바른 자세로 손을 가볍게 올려 두고 어깨에 힘을 빼고 시작하세요",
  "꾸준함이 결국 가장 빠른 지름길이 된다는 사실을 자주 잊곤 합니다",

  "정확하게 치는 연습이 빠르게 치는 것보다 언제나 먼저여야 합니다",
  "봄바람이 부는 거리를 걷다 보면 마음이 한결 가벼워지곤 합니다",
  "좋은 글은 천천히 읽고 또박또박 따라 쓰는 동안 몸에 새겨집니다",
  "오늘 하루도 수고한 나에게 따뜻한 위로의 말을 건네어 봅니다",
  "키보드 위에 놓인 열 손가락이 각자의 자리를 기억하게 만드세요",
  "조급한 마음을 내려놓으면 오히려 속도가 자연스럽게 붙습니다",

const KOR_WORDS=("오늘 우리 사람 시간 하루 마음 생각 사랑 행복 친구 가족 학교 공부 연습 자세 손가락 키보드 화면 단어 문장 속도 정확 노력 습관 꾸준 천천히 빠르게 가볍게 바르게 함께 조금씩 매일 결국 변화 시작 도전 성장 자신 미래 희망 즐거움 여유 평화 봄날 햇살 바람 나무 강물 하늘 구름 별빛 새벽 저녁 노을 향기 미소 위로 응원 용기 바다 산책 음악 책상 연필 공책 가방 시계 거울 의자 창문 햇볕 빗방울 무지개 들판 골목 정원 호수 언덕 구슬 편지 약속 기억 추억 계절 새벽녘").split(" ");

// ===== 상태 =====
let mode='eng', style='time', dur=60;
let words=[], wordIdx=0;           // 단어 배열 & 현재 인덱스
let wordResults=[];                // {word, typed, ok} 결과 기록
let started=false, finished=false, startTime=0, deadline=0, timerId=null;
let typedTotal=0, typedWrong=0;

const $=s=>document.querySelector(s);
const field=$('#field');
const belt=$('#word-belt');
const progressEl=$('#progress');

const CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNG=["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
const JONG=["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const DOUBLE={"ㄲ":2,"ㄸ":2,"ㅃ":2,"ㅆ":2,"ㅉ":2,"ㄳ":2,"ㄵ":2,"ㄶ":2,"ㄺ":2,"ㄻ":2,"ㄼ":2,"ㄽ":2,"ㄾ":2,"ㄿ":2,"ㅀ":2,"ㅄ":2,"ㅘ":2,"ㅙ":2,"ㅚ":2,"ㅝ":2,"ㅞ":2,"ㅟ":2,"ㅢ":2,"ㅒ":2,"ㅖ":2};
function keystrokes(str){
  let k=0;
  for(const ch of str){
    const code=ch.charCodeAt(0);
    if(code>=0xAC00 && code<=0xD7A3){
      const s=code-0xAC00, cho=Math.floor(s/588), jung=Math.floor((s%588)/28), jong=s%28;
      k+=DOUBLE[CHO[cho]]||1; k+=DOUBLE[JUNG[jung]]||1; if(jong>0) k+=DOUBLE[JONG[jong]]||1;
    } else { k+=1; }
  }
  return k;
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function makeWords(){
  // 항상 단어 배열로 반환
  if(style==='time'){
    const pool=mode==='eng'?ENG_WORDS:KOR_WORDS;
    let arr=[]; while(arr.length<300) arr=arr.concat(shuffle(pool));
    return arr.slice(0,300);
  } else {
    const sents=mode==='eng'?ENG_SENT:KOR_SENT;
    const target_chars=({60:200,180:600,300:1000})[dur]||300;
    const order=shuffle(sents); let out=[]; let len=0, i=0;
    while(len<target_chars){ const s=order[i%order.length]; out.push(...s.split(' ')); len+=s.length+1; i++; }
    return out;
  }
}

function fmtClock(sec){ sec=Math.max(0,Math.round(sec)); const m=Math.floor(sec/60),s=sec%60; return m+':'+String(s).padStart(2,'0'); }
function fmtDur(sec){ sec=Math.round(sec); if(sec<60) return sec+'s'; return Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0'); }

// ── 벨트 렌더링 ──
function buildBelt(){
  belt.innerHTML='';
  const isKor=mode==='kor';
  words.forEach((w,i)=>{
    const span=document.createElement('span');
    let cls='w'+(isKor?' kor':'');
    if(i<wordIdx)       cls+=' '+(wordResults[i]&&wordResults[i].ok?'done-ok':'done-bad');
    else if(i===wordIdx) cls+=' active';
    else if(i===wordIdx+1) cls+=' next-word';
    else                cls+=' pending';
    span.className=cls;
    span.dataset.idx=i;
    if(i===wordIdx) span.innerHTML=renderActiveWord(w,'');
    else span.textContent=w;
    belt.appendChild(span);
  });
  alignBelt();
}

function renderActiveWord(word, typed){
  let html='';
  const maxLen=Math.max(word.length, typed.length);
  for(let i=0;i<maxLen;i++){
    if(i<word.length){
      const ch=word[i]==='<'?'&lt;':word[i];
      if(i<typed.length){
        const ok=typed[i]===word[i];
        html+=`<span class="lch ${ok?'ok':'bad'}">${ch}</span>`;
      } else if(i===typed.length){
        html+=`<span class="lch next">${ch}</span>`;
      } else {
        html+=`<span class="lch rest">${ch}</span>`;
      }
    } else {
      // 단어보다 더 친 글자 — 빨간 점으로 표시
      html+=`<span class="lch bad">·</span>`;
    }
  }
  return html;
}

function alignBelt(){
  // 활성 단어의 첫 글자를 stage 중앙(50%)에 고정
  const stage=$('#word-stage');
  const stageW=stage.offsetWidth;
  const center=stageW/2;

  // 활성 칩의 offsetLeft 계산
  const chips=belt.children;
  if(!chips.length) return;
  let offset=0;
  for(let i=0;i<chips.length;i++){
    if(i===wordIdx){ offset=chips[i].offsetLeft; break; }
  }
  // 활성 단어 앞쪽 절반 너비만큼 더 당겨서 단어 시작이 중앙에 오게
  belt.style.transform=`translateX(${center - offset}px)`;
}

function paintActive(){
  const chips=belt.children;
  if(!chips[wordIdx]) return;
  const w=words[wordIdx];
  const typed=field.value;
  chips[wordIdx].innerHTML=renderActiveWord(w,typed);
}

// ── 단어 확정 (스페이스) ──
function commitWord(){
  const typed=field.value.trimEnd();
  const w=words[wordIdx];
  const ok=(typed===w);

  // 정확도 계산
  typedTotal+=Math.max(typed.length,w.length);
  for(let i=0;i<Math.max(typed.length,w.length);i++){
    if((typed[i]||'')!==(w[i]||'')) typedWrong++;
  }
  wordResults.push({word:w, typed, ok});

  // 칩 상태 업데이트
  const chips=belt.children;
  chips[wordIdx].className='w'+(mode==='kor'?' kor':'')+' '+(ok?'done-ok':'done-bad');
  chips[wordIdx].textContent=w;

  wordIdx++;
  field.value='';

  // 분량제 완료 체크
  if(style==='length' && wordIdx>=words.length){ finish(); return; }
  // 시간제는 단어 부족 시 더 추가
  if(style==='time' && wordIdx>=words.length-10){
    const pool=mode==='eng'?ENG_WORDS:KOR_WORDS;
    const more=shuffle(pool).slice(0,50);
    more.forEach(w2=>{
      const span=document.createElement('span');
      span.className='w'+(mode==='kor'?' kor':'')+' pending';
      span.textContent=w2; belt.appendChild(span);
    });
    words.push(...more);
  }

  // 다음 단어 활성화
  const nc=belt.children[wordIdx];
  if(nc){
    const isKor=mode==='kor';
    nc.className='w'+(isKor?' kor':'')+' active';
    nc.innerHTML=renderActiveWord(words[wordIdx],'');
  }
  // 다다음 단어: next-word 클래스
  const nnc=belt.children[wordIdx+1];
  if(nnc){
    const isKor=mode==='kor';
    nnc.className='w'+(isKor?' kor':'')+' next-word';
  }
  // 이전 next-word였던 것(현재 active)은 이미 위에서 처리됨

  // 진행률
  const total=style==='length'?words.length:Math.max(words.length,wordIdx+1);
  progressEl.style.width=Math.min(100,(wordIdx/total)*100)+'%';

  alignBelt();
}

function accuracy(){ if(typedTotal===0) return 100; return Math.max(0,Math.round((1-typedWrong/typedTotal)*100)); }

function computeSpeed(){
  const sec=(Date.now()-startTime)/1000;
  // 완료된 단어들의 정답 글자 수로 속도 계산
  const okChars=wordResults.reduce((s,r)=>{
    let c=0; for(let i=0;i<Math.min(r.typed.length,r.word.length);i++) if(r.typed[i]===r.word[i]) c++;
    return s+c;
  },0);
  if(mode==='kor'){ const ks=keystrokes(wordResults.filter(r=>r.ok).map(r=>r.word).join('')); const cpm=sec>0?Math.round(ks/sec*60):0; return {speed:cpm,cpm,sec}; }
  const cpm=sec>0?Math.round(okChars/sec*60):0;
  const wpm=sec>0?Math.round((okChars/5)/sec*60):0;
  return {speed:cpm,cpm,wpm,sec};
}

function liveStats(){
  const {speed,cpm,wpm}=computeSpeed();
  $('#s-speed').textContent=speed;
  $('#s-cpm').textContent=mode==='eng'?(wpm||0):cpm;
  $('#s-acc').innerHTML=accuracy()+'<span>%</span>';
  if(style==='time'){ const remain=(deadline-Date.now())/1000; $('#s-time').textContent=fmtClock(remain); if(remain<=0) finish(); }
  else { $('#s-time').textContent=fmtClock((Date.now()-startTime)/1000); }
}

function startTimer(){
  started=true; startTime=Date.now(); deadline=startTime+dur*1000;
  timerId=setInterval(liveStats,100);
  $('#hint').textContent=style==='time'?'시간이 끝나면 자동 종료됩니다':'끝까지 다 치면 종료됩니다';
}

// ── 입력 이벤트 ──
field.addEventListener('input',()=>{
  if(finished) return;
  if(!started) startTimer();
  paintActive();
});

field.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ reset(); return; }
  if(e.key===' ' || e.key==='Enter'){
    e.preventDefault();
    if(finished) return;
    if(!started) startTimer();
    if(field.value.length===0) return; // 빈 칸 무시
    commitWord();
    liveStats();
  }
  if(e.key==='Backspace'){
    if(field.value.length===0) e.preventDefault();
  }
});

field.addEventListener('paste',e=>e.preventDefault());

function finish(){
  if(finished) return;
  finished=true; clearInterval(timerId); field.disabled=true;
  const {speed,cpm,wpm,sec}=computeSpeed();
  $('#rl-speed').textContent='타수 CPM';
  if($('#rl-cpm')) $('#rl-cpm').textContent=mode==='eng'?'WPM':'타/분';
  $('#r-speed').textContent=speed;
  $('#r-cpm').textContent=mode==='eng'?(wpm||0):cpm;
  $('#r-acc').textContent=accuracy()+'%';
  $('#r-time').textContent=sec.toFixed(1)+'s';
  $('#r-sub').textContent=`${mode==='kor'?'한글':'영타'} · ${style==='time'?fmtClock(dur)+' 시간제':'분량제'}`;
  pendingScore={mode,style,dur,speed,cpm,wpm:wpm||0,acc:accuracy(),elapsed:sec,speedLabel:'타수 CPM',t:Date.now()};
  $('#overlay').classList.add('show'); $('#pname').focus();
}

function reset(){
  clearInterval(timerId); started=false; finished=false; startTime=0;
  typedTotal=0; typedWrong=0; wordIdx=0; wordResults=[];
  words=makeWords();
  field.value=''; field.disabled=false;
  field.classList.toggle('kor',mode==='kor');
  progressEl.style.width='0%';
  buildBelt();
  if(mode==='kor'){ $('#speed-label').textContent='타수 CPM'; $('#cpm-label').textContent='타/분'; $('#rl-cpm')&&($('#rl-cpm').textContent='타/분'); }
  else { $('#speed-label').textContent='타수 CPM'; $('#cpm-label').textContent='WPM'; $('#rl-cpm')&&($('#rl-cpm').textContent='WPM'); }
  $('#s-speed').textContent='0'; $('#s-cpm').textContent='0'; $('#s-acc').innerHTML='100<span>%</span>';
  $('#time-label').textContent=style==='time'?'남은시간':'경과시간';
  $('#s-time').textContent=style==='time'?fmtClock(dur):'0:00';
  $('#th-score').textContent='CPM';
  $('#dur-cap').textContent=style==='time'?'시간':'분량';
  $('#hint').textContent='입력을 시작하면 측정이 시작됩니다 · ESC = 다시 시작';
  field.focus();
}

// ===== 순위표 =====
let pendingScore=null;
const LB_KEY='type_lb_v3';
const loadLB=()=>{try{return JSON.parse(localStorage.getItem(LB_KEY))||[]}catch{return[]}};
const saveLB=l=>localStorage.setItem(LB_KEY,JSON.stringify(l));
function styleText(r){
  const min=r.dur%60===0?(r.dur/60)+'분':r.dur+'초';
  return (r.style==='time'?'시간제 '+min:'분량제 '+min);
}
function fmtStamp(ts){
  const d=new Date(ts);
  const mm=d.getMonth()+1, dd=d.getDate();
  const hh=String(d.getHours()).padStart(2,'0'), mi=String(d.getMinutes()).padStart(2,'0');
  return `${mm}/${dd}, ${hh}:${mi}`;
}
function renderLB(hl=null){
  const list=loadLB().slice().reverse().slice(0,20);
  const body=$('#lb-body');
  if(!list.length){ body.innerHTML='<tr class="empty"><td colspan="7">아직 기록이 없습니다 — 첫 기록의 주인공이 되어보세요</td></tr>'; return; }
  body.innerHTML=list.map((r,i)=>`<tr class="${r.t===hl?'you':''}">
    <td class="rank">${list.length-i}</td>
    <td class="col-name">${(r.name||'익명').replace(/</g,'&lt;')}</td>
    <td class="col-mode">${r.mode==='kor'?'한글':'영타'}</td>
    <td class="col-style">${styleText(r)}</td>
    <td class="col-score score">${r.speed} <span class="unit">CPM</span></td>
    <td class="col-acc">${r.acc}%</td>
    <td class="col-time">${fmtStamp(r.t)}</td></tr>`).join('');
}
$('#save-score').addEventListener('click',()=>{
  if(!pendingScore) return;
  const name=$('#pname').value.trim().slice(0,5);
  if(!name){
    const inp=$('#pname'); inp.placeholder='이름을 입력해 주세요'; inp.style.borderColor='var(--bad)'; inp.focus(); return;
  }
  const list=loadLB(); const entry={...pendingScore,name};
  list.push(entry); saveLB(list); renderLB(entry.t);
  $('#overlay').classList.remove('show'); $('#pname').value=''; $('#pname').style.borderColor=''; reset();
});
$('#pname').addEventListener('input',()=>{ $('#pname').style.borderColor=''; });
$('#clear-lb').addEventListener('click',()=>{ if(confirm('순위표 기록을 모두 지울까요?')){localStorage.removeItem(LB_KEY);renderLB();} });
$('#again').addEventListener('click',()=>{ $('#overlay').classList.remove('show'); reset(); });
$('#restart').addEventListener('click',reset);
document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); mode=b.dataset.mode; reset();
}));
$('#style-pill').addEventListener('click',e=>{
  const btn=e.target.closest('button'); if(!btn) return;
  $('#style-pill').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  btn.classList.add('on'); style=btn.dataset.style; reset();
});
$('#dur-pill').addEventListener('click',e=>{
  const btn=e.target.closest('button'); if(!btn) return;
  $('#dur-pill').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
  btn.classList.add('on'); dur=+btn.dataset.dur; reset();
});
renderLB(); reset();
window.addEventListener('resize',()=>{ alignBelt(); });
</script>

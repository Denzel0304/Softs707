<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>심리 상자</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f6f3;
    --bg3: #f0efe9;
    --text: #1a1917;
    --text2: #6b6a65;
    --text3: #a8a7a2;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --accent: #1a1917;
    --accent-bg: #1a1917;
    --accent-text: #ffffff;
    --radius: 8px;
    --radius-lg: 12px;
    --success-bg: #eaf3de;
    --success-text: #27500a;
    --error-bg: #fcebeb;
    --error-text: #791f1f;
    --tag-bg: #efefeb;
    --tag-text: #5f5e5a;
    /* 감정강도 스케일: 초록(편안) -> 주황 -> 빨강(고통) */
    --int-low: #4f8a3d;
    --int-mid: #c8862b;
    --int-high: #a52f2f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg2); color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  textarea { font-family: inherit; }

  /* ===== 로그인 오버레이 ===== */
  .login-overlay {
    position: fixed; inset: 0; background: var(--bg2);
    display: none; align-items: center; justify-content: center; z-index: 200;
  }
  .login-overlay.active { display: flex; }
  .login-box {
    width: 280px; padding: 32px 28px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    text-align: center;
  }
  .login-title { font-size: 19px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
  .login-sub { font-size: 12.5px; color: var(--text2); margin-bottom: 22px; }
  .pin-input {
    width: 100%; padding: 12px; font-size: 22px; text-align: center;
    letter-spacing: 10px; border: 1px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); margin-bottom: 14px; outline: none;
  }
  .pin-input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 11px; font-size: 14px; font-weight: 600;
    background: var(--accent-bg); color: var(--accent-text); border: none;
    border-radius: var(--radius);
  }
  .login-btn:hover { opacity: 0.85; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-msg { font-size: 12px; margin-top: 12px; min-height: 14px; color: var(--text2); }
  .login-msg.err { color: var(--error-text); }
  .login-msg.ok { color: var(--success-text); }

  /* ===== 레이아웃 ===== */
  #app { display: none; height: 100vh; }
  #app.active { display: flex; }
  .app-shell { display: flex; width: 100%; height: 100%; }

  .sidebar {
    width: 380px; flex-shrink: 0; background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100%;
  }
  .sidebar-head {
    padding: 18px 18px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .brand { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .head-btns { display: flex; gap: 6px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: var(--radius);
    border: 1px solid var(--border2); background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: var(--text2);
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); }

  .new-entry-bar { padding: 12px 18px; border-bottom: 1px solid var(--border); }
  .new-entry-btn {
    width: 100%; padding: 10px; border-radius: var(--radius);
    background: var(--accent-bg); color: var(--accent-text); border: none;
    font-size: 13.5px; font-weight: 600;
  }
  .new-entry-btn:hover { opacity: 0.88; }

  .sync-row {
    padding: 8px 18px; font-size: 11px; color: var(--text3);
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .sync-row .logout-link { color: var(--text3); text-decoration: underline; cursor: pointer; }
  .sync-row .logout-link:hover { color: var(--text2); }

  .entry-list { flex: 1; overflow-y: auto; padding: 8px; }
  .empty-list { padding: 40px 20px; text-align: center; color: var(--text3); font-size: 13px; line-height: 1.6; }

  .entry-card {
    padding: 13px 14px; border-radius: var(--radius); margin-bottom: 6px;
    border: 1px solid transparent; cursor: pointer; position: relative;
  }
  .entry-card:hover { background: var(--bg3); }
  .entry-card.selected { background: var(--bg3); border-color: var(--border2); }
  .entry-card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 24px; }
  .entry-card-date { font-size: 11.5px; color: var(--text3); margin-bottom: 8px; }
  .intensity-mini { display: flex; align-items: center; gap: 6px; }
  .int-chip {
    font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
    color: #fff; min-width: 20px; text-align: center;
  }
  .int-arrow { color: var(--text3); font-size: 11px; }
  .entry-del-btn {
    position: absolute; top: 11px; right: 10px; width: 20px; height: 20px;
    border: none; background: transparent; color: var(--text3); font-size: 13px;
    border-radius: 4px; display: none; align-items: center; justify-content: center;
  }
  .entry-card:hover .entry-del-btn { display: flex; }
  .entry-del-btn:hover { background: var(--error-bg); color: var(--error-text); }

  .main-panel { flex: 1; height: 100%; overflow-y: auto; background: var(--bg2); }
  .panel-inner { max-width: 720px; margin: 0 auto; padding: 36px 28px 60px; }

  .empty-state {
    height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text3); font-size: 13.5px; gap: 6px;
  }
  .empty-state .big { font-size: 34px; opacity: .5; margin-bottom: 8px; }

  /* ===== 상세보기 ===== */
  .detail-head { margin-bottom: 6px; }
  .detail-title-input {
    width: 100%; font-size: 21px; font-weight: 700; border: none; background: transparent;
    color: var(--text); outline: none; padding: 4px 0; letter-spacing: -0.3px;
  }
  .detail-meta { font-size: 12px; color: var(--text3); margin-bottom: 18px; }

  .intensity-banner {
    display: flex; align-items: center; gap: 14px; padding: 14px 16px;
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg);
    margin-bottom: 22px;
  }
  .intensity-banner .label { font-size: 11.5px; color: var(--text2); }
  .intensity-banner .big-chip { font-size: 18px; font-weight: 800; padding: 4px 12px; border-radius: 20px; color: #fff; }
  .intensity-banner .arrow-big { font-size: 18px; color: var(--text3); }
  .intensity-banner .delta { margin-left: auto; font-size: 12.5px; color: var(--text2); }

  .qa-item { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; background: var(--bg); overflow: hidden; }
  .qa-head { padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; }
  .qa-head:hover { background: var(--bg3); }
  .qa-num { font-size: 11px; font-weight: 700; color: var(--text3); padding-top: 2px; min-width: 22px; }
  .qa-q { flex: 1; font-size: 13.5px; line-height: 1.5; }
  .qa-preview { font-size: 12px; color: var(--text3); margin-top: 4px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; }
  .qa-chevron { color: var(--text3); font-size: 11px; padding-top: 3px; transition: transform .15s; }
  .qa-item.open .qa-chevron { transform: rotate(90deg); }
  .qa-body { display: none; padding: 0 14px 14px; }
  .qa-item.open .qa-body { display: block; }
  .qa-textarea {
    width: 100%; min-height: 90px; border: 1px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); padding: 10px 12px; font-size: 13.5px; line-height: 1.55; resize: vertical; outline: none;
  }
  .qa-textarea:focus { border-color: var(--accent); }
  .cat-badge {
    display: inline-block; font-size: 10px; font-weight: 700; color: var(--tag-text);
    background: var(--tag-bg); padding: 2px 6px; border-radius: 4px; margin-right: 6px; letter-spacing: .3px;
  }

  .detail-actions { display: flex; gap: 8px; margin-top: 18px; position: sticky; bottom: 0; }
  .save-btn {
    flex: 1; padding: 12px; border-radius: var(--radius); background: var(--accent-bg);
    color: var(--accent-text); border: none; font-size: 14px; font-weight: 700;
  }
  .save-btn:hover { opacity: .88; }
  .save-btn:disabled { opacity: .5; }

  /* ===== 새 기록 (wizard) ===== */
  .wizard-progress-track { height: 5px; background: var(--bg3); border-radius: 3px; margin-bottom: 22px; overflow: hidden; }
  .wizard-progress-fill { height: 100%; background: var(--accent-bg); transition: width .2s; }
  .wizard-step-meta { font-size: 12px; color: var(--text3); margin-bottom: 10px; display: flex; justify-content: space-between; }
  .wizard-q { font-size: 19px; font-weight: 700; line-height: 1.5; margin-bottom: 18px; letter-spacing: -0.2px; }
  .wizard-textarea {
    width: 100%; min-height: 220px; border: 1px solid var(--border2); border-radius: var(--radius-lg);
    background: var(--bg); padding: 16px; font-size: 14.5px; line-height: 1.65; resize: vertical; outline: none;
  }
  .wizard-textarea:focus { border-color: var(--accent); }
  .wizard-nav { display: flex; gap: 8px; margin-top: 18px; }
  .nav-btn {
    flex: 1; padding: 12px; border-radius: var(--radius); font-size: 14px; font-weight: 600; border: 1px solid var(--border2);
    background: var(--bg);
  }
  .nav-btn:hover { background: var(--bg3); }
  .nav-btn.primary { background: var(--accent-bg); color: var(--accent-text); border: none; }
  .nav-btn.primary:hover { opacity: .88; }
  .nav-btn:disabled { opacity: .4; cursor: not-allowed; }
  .wizard-title-row { margin-bottom: 24px; }
  .wizard-title-row label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 6px; }
  .wizard-title-input {
    width: 100%; padding: 11px 13px; border: 1px solid var(--border2); border-radius: var(--radius);
    font-size: 14.5px; background: var(--bg); outline: none;
  }
  .wizard-title-input:focus { border-color: var(--accent); }

  /* ===== 설정 (문항 관리) ===== */
  .settings-section { margin-bottom: 26px; }
  .settings-cat-label { font-size: 11.5px; font-weight: 700; color: var(--text3); letter-spacing: .5px; margin: 18px 0 8px; }
  .q-edit-row {
    display: flex; align-items: center; gap: 8px; padding: 9px 10px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px;
  }
  .q-edit-row textarea {
    flex: 1; border: none; background: transparent; font-size: 13px; line-height: 1.5; resize: none; outline: none;
    min-height: 20px; padding: 2px 0;
  }
  .q-mini-btn {
    width: 26px; height: 26px; border: 1px solid var(--border2); background: var(--bg); border-radius: 5px;
    font-size: 12px; color: var(--text2); flex-shrink: 0;
  }
  .q-mini-btn:hover { background: var(--bg3); }
  .q-mini-btn.danger:hover { background: var(--error-bg); color: var(--error-text); }
  .add-q-btn {
    width: 100%; padding: 10px; border: 1px dashed var(--border2); border-radius: var(--radius);
    background: transparent; color: var(--text2); font-size: 13px; margin-top: 4px;
  }
  .add-q-btn:hover { background: var(--bg3); }

  /* ===== 모달 (로그아웃/삭제 확인) ===== */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: none; align-items: center; justify-content: center; z-index: 300; }
  .modal-overlay.active { display: flex; }
  .modal-box { width: 300px; background: var(--bg); border-radius: var(--radius-lg); padding: 22px; text-align: center; }
  .modal-box .m-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .modal-box .m-sub { font-size: 12.5px; color: var(--text2); margin-bottom: 18px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 10px; border-radius: var(--radius); font-size: 13.5px; font-weight: 600; border: 1px solid var(--border2); background: var(--bg); }
  .modal-btns button.danger { background: var(--error-text); color: #fff; border: none; }
  .modal-btns button.danger:hover { opacity: .88; }
  .modal-btns button:not(.danger):hover { background: var(--bg3); }

  /* ===== 헤더(모바일 상세 진입 시 뒤로가기) ===== */
  .mobile-topbar { display: none; }

  /* ===== 동기화 인디케이터 ===== */
  .sync-dot { display: inline-flex; align-items: center; gap: 4px; }

  /* ===== 반응형 ===== */
  @media (max-width: 640px) {
    .sidebar { width: 100%; }
    .main-panel { display: none; }
    body.show-main .sidebar { display: none; }
    body.show-main .main-panel { display: block; }
    .mobile-topbar {
      display: flex; align-items: center; gap: 10px; padding: 14px 16px;
      border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10;
    }
    .mobile-back { font-size: 14px; color: var(--text2); border: none; background: transparent; padding: 4px 6px 4px 0; }
    .panel-inner { padding: 20px 16px 80px; }
    .login-box { width: 86%; }
  }
  @media (min-width: 641px) {
    .mobile-topbar { display: none !important; }
  }
</style>
</head>
<body>

<!-- ===== 로그인 오버레이 ===== -->
<div id="login-overlay" class="login-overlay active">
  <div class="login-box">
    <div class="login-title">심리 상자</div>
    <div class="login-sub">PIN 4자리를 입력하세요</div>
    <input type="password" id="pin-input" class="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
    <button id="login-btn" class="login-btn" onclick="doLogin()">로그인</button>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<!-- ===== 메인 앱 ===== -->
<div id="app">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="brand">심리 상자</div>
        <div class="head-btns">
          <button class="icon-btn" title="문항 관리" onclick="openSettings()">⚙</button>
        </div>
      </div>
      <div class="new-entry-bar">
        <button class="new-entry-btn" onclick="startWizard()">+ 새 기록 작성</button>
      </div>
      <div class="sync-row">
        <span id="sync-indicator" class="sync-dot">●  대기 중</span>
        <span class="logout-link" onclick="doLogout()">로그아웃</span>
      </div>
      <div class="entry-list" id="entry-list"></div>
    </aside>

    <main class="main-panel" id="main-panel">
      <div class="mobile-topbar">
        <button class="mobile-back" onclick="backToList()">← 목록</button>
      </div>
      <div class="panel-inner" id="panel-inner"></div>
    </main>
  </div>
</div>

<!-- ===== 로그아웃 확인 모달 ===== -->
<div class="modal-overlay" id="modal-logout">
  <div class="modal-box">
    <div class="m-title">로그아웃 하시겠어요?</div>
    <div class="m-sub">다시 로그인하려면 PIN이 필요합니다.</div>
    <div class="modal-btns">
      <button onclick="closeModal('modal-logout')">취소</button>
      <button class="danger" onclick="confirmLogout()">로그아웃</button>
    </div>
  </div>
</div>

<!-- ===== 기록 삭제 확인 모달 ===== -->
<div class="modal-overlay" id="modal-del-entry">
  <div class="modal-box">
    <div class="m-title">이 기록을 삭제할까요?</div>
    <div class="m-sub">삭제하면 복구할 수 없습니다.</div>
    <div class="modal-btns">
      <button onclick="closeModal('modal-del-entry')">취소</button>
      <button class="danger" onclick="confirmDeleteEntry()">삭제</button>
    </div>
  </div>
</div>

<!-- ===== 문항 삭제 확인 모달 ===== -->
<div class="modal-overlay" id="modal-del-q">
  <div class="modal-box">
    <div class="m-title">이 문항을 삭제할까요?</div>
    <div class="m-sub">이미 작성된 과거 기록에는 영향을 주지 않습니다.</div>
    <div class="modal-btns">
      <button onclick="closeModal('modal-del-q')">취소</button>
      <button class="danger" onclick="confirmDeleteQuestion()">삭제</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   심리 상자 (Mind79) — Supabase 동기화
============================================================ */
const SB_URL  = 'https://YOUR-PROJECT-REF.supabase.co';      // ← 본인 프로젝트 URL로 교체
const SB_ANON = 'YOUR-ANON-KEY';                               // ← 본인 anon key로 교체
const AK_STORAGE   = 'Mind79_ak';
const DATA_CACHE   = 'Mind79_data';

const CATEGORY_LABEL = { A:'관찰 및 측정', B:'인지 오류 식별', C:'논리적 검증', D:'가치 및 메타인지', E:'행동 지향 및 수용', F:'종합 및 최종 통합' };

let S = { questions: [], entries: [] };   // 서버 동기화 데이터
let view = 'list';                         // list | detail | wizard | settings
let currentEntryId = null;
let openQaId = null;                       // 상세보기에서 펼쳐진 문항 id
let wizard = null;                         // { answers:{}, step, title }
let syncTimer = null, syncing = false;
let authFailCount = 0;
const AUTH_FAIL_THRESHOLD = 3;

/* ---------- 기본 유틸 ---------- */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function getAccessKey() { return localStorage.getItem(AK_STORAGE); }
function setAccessKey(k) { localStorage.setItem(AK_STORAGE, k); }
function clearAccessKey() { localStorage.removeItem(AK_STORAGE); }
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function setSyncIndicator(state, text) {
  const el = document.getElementById('sync-indicator');
  if (el) el.textContent = text;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
/* 강도 1~10 → 색상 (초록=낮음/편안, 빨강=높음/고통) */
function intensityColor(n) {
  const v = Math.max(1, Math.min(10, Number(n) || 1));
  if (v <= 3) return 'var(--int-low)';
  if (v <= 6) return 'var(--int-mid)';
  return 'var(--int-high)';
}
function extractMetric(entry, metricName) {
  const q = (entry.questionsSnapshot || []).find(q => q.metric === metricName);
  if (!q) return null;
  const a = (entry.answers || []).find(a => a.questionId === q.id);
  if (!a || !a.answerText) return null;
  const m = String(a.answerText).match(/\d+/);
  return m ? Math.max(1, Math.min(10, parseInt(m[0], 10))) : null;
}

/* ============================================================
   로그인 / 로그아웃 / 동기화 (aimemo와 동일한 보안 패턴)
============================================================ */
async function rpc(fn, args) {
  const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON, 'Content-Type': 'application/json' },
    body: JSON.stringify(args)
  });
  return r;
}

async function doLogin() {
  const pin = document.getElementById('pin-input').value.trim();
  const msg = document.getElementById('login-msg');
  const btn = document.getElementById('login-btn');
  if (!/^\d{4}$/.test(pin)) { msg.className = 'login-msg err'; msg.textContent = 'PIN 4자리 숫자를 입력하세요'; return; }
  btn.disabled = true; msg.className = 'login-msg'; msg.textContent = '확인 중...';
  try {
    const r = await rpc('Mind79_login', { p_pin: pin });
    if (!r.ok) { msg.className = 'login-msg err'; msg.textContent = '서버 오류 (' + r.status + ')'; btn.disabled = false; return; }
    const data = await r.json();
    if (data.ok) {
      setAccessKey(data.key);
      document.getElementById('pin-input').value = '';
      msg.className = 'login-msg ok'; msg.textContent = '로그인 성공';
      await afterLogin();
    } else if (data.reason === 'wrong_pin') {
      msg.className = 'login-msg err'; msg.textContent = `PIN 불일치 (남은 시도: ${data.remaining}회)`;
      document.getElementById('pin-input').value = ''; btn.disabled = false;
    } else if (data.reason === 'locked') {
      const until = new Date(data.until).toLocaleTimeString('ko-KR');
      msg.className = 'login-msg err'; msg.textContent = `잠금 상태 (${until}까지)`; btn.disabled = false;
    } else if (data.reason === 'no_pin') {
      msg.className = 'login-msg err'; msg.textContent = 'PIN이 등록되지 않았습니다'; btn.disabled = false;
    } else {
      msg.className = 'login-msg err'; msg.textContent = '로그인 실패'; btn.disabled = false;
    }
  } catch (e) {
    msg.className = 'login-msg err'; msg.textContent = '네트워크 오류: ' + e.message; btn.disabled = false;
  }
}

async function afterLogin() {
  document.getElementById('login-overlay').classList.remove('active');
  document.getElementById('app').classList.add('active');
  await pullFromServer();
}

function doLogout() { openModal('modal-logout'); }

async function confirmLogout() {
  closeModal('modal-logout');
  const key = getAccessKey();
  if (key) { try { await rpc('Mind79_logout', { p_key: key }); } catch (e) {} }
  Object.keys(localStorage).forEach(k => { if (k.startsWith('Mind79_')) localStorage.removeItem(k); });
  S = { questions: [], entries: [] };
  document.getElementById('app').classList.remove('active');
  document.getElementById('login-overlay').classList.add('active');
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-msg').textContent = '';
  authFailCount = 0;
  setTimeout(() => document.getElementById('pin-input').focus(), 50);
}

async function pullFromServer() {
  const key = getAccessKey();
  if (!key) return;
  setSyncIndicator('pending', '↓ 불러오는 중...');
  try {
    const r = await rpc('Mind79_pull', { p_key: key });
    if (r.status === 401 || r.status === 403) { registerAuthFail(); return; }
    if (!r.ok) {
      const t = await r.text();
      if (t.includes('unauthorized')) { registerAuthFail(); return; }
      setSyncIndicator('err', '⚠ 불러오기 실패'); return;
    }
    authFailCount = 0;
    const data = await r.json();
    if (data && typeof data === 'object') {
      S.questions = Array.isArray(data.questions) ? data.questions : [];
      S.entries   = Array.isArray(data.entries)   ? data.entries   : [];
    }
    localStorage.setItem(DATA_CACHE, JSON.stringify(S));
    setSyncIndicator('ok', '✓ 동기화됨');
    renderSidebarList();
    renderMain();
  } catch (e) {
    setSyncIndicator('err', '⚠ 네트워크 오류');
  }
}

function queueSync() {
  if (!getAccessKey()) return;
  setSyncIndicator('pending', '● 변경됨');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToServer, 1200);
}

async function pushToServer() {
  const key = getAccessKey();
  if (!key) return;
  if (syncing) { syncTimer = setTimeout(pushToServer, 800); return; }
  syncing = true;
  setSyncIndicator('pending', '↑ 저장 중...');
  try {
    const r = await rpc('Mind79_push', { p_key: key, p_data: { questions: S.questions, entries: S.entries } });
    if (r.status === 401 || r.status === 403) { registerAuthFail(); return; }
    if (!r.ok) {
      const t = await r.text();
      if (t.includes('unauthorized')) { registerAuthFail(); return; }
      setSyncIndicator('err', '⚠ 저장 실패'); return;
    }
    authFailCount = 0;
    localStorage.setItem(DATA_CACHE, JSON.stringify(S));
    setSyncIndicator('ok', '✓ 저장됨');
  } catch (e) {
    setSyncIndicator('err', '⚠ 네트워크 오류');
  } finally {
    syncing = false;
  }
}

function registerAuthFail() {
  authFailCount++;
  setSyncIndicator('err', `⚠ 동기화 실패 (${authFailCount}/${AUTH_FAIL_THRESHOLD})`);
  if (authFailCount >= AUTH_FAIL_THRESHOLD) {
    clearAccessKey();
    document.getElementById('app').classList.remove('active');
    document.getElementById('login-overlay').classList.add('active');
    document.getElementById('login-msg').className = 'login-msg err';
    document.getElementById('login-msg').textContent = '다시 로그인하세요';
    document.getElementById('login-btn').disabled = false;
    authFailCount = 0;
    setTimeout(() => document.getElementById('pin-input').focus(), 50);
  }
}

/* ============================================================
   모달 헬퍼
============================================================ */
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

/* ============================================================
   화면 전환 (PC: 사이드바+메인 동시 / 모바일: 풀스크린 전환)
============================================================ */
function showMain() { document.body.classList.add('show-main'); }
function backToList() { document.body.classList.remove('show-main'); view = 'list'; openQaId = null; renderMain(); renderSidebarList(); }

/* ============================================================
   사이드바: 기록 리스트
============================================================ */
function renderSidebarList() {
  const wrap = document.getElementById('entry-list');
  const sorted = [...S.entries].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  if (sorted.length === 0) {
    wrap.innerHTML = `<div class="empty-list">아직 작성한 기록이 없어요.<br>'새 기록 작성'으로 시작해보세요.</div>`;
    return;
  }
  wrap.innerHTML = sorted.map(e => {
    const init = extractMetric(e, 'initial');
    const fin  = extractMetric(e, 'final');
    const chips = (init !== null || fin !== null) ? `
      <div class="intensity-mini">
        ${init !== null ? `<span class="int-chip" style="background:${intensityColor(init)}">${init}</span>` : '<span class="int-chip" style="background:var(--text3)">-</span>'}
        <span class="int-arrow">→</span>
        ${fin !== null ? `<span class="int-chip" style="background:${intensityColor(fin)}">${fin}</span>` : '<span class="int-chip" style="background:var(--text3)">-</span>'}
      </div>` : '';
    return `
      <div class="entry-card ${e.id === currentEntryId ? 'selected' : ''}" onclick="openEntry('${e.id}')">
        <button class="entry-del-btn" onclick="event.stopPropagation(); askDeleteEntry('${e.id}')">✕</button>
        <div class="entry-card-title">${escapeHtml(e.title || '제목 없음')}</div>
        <div class="entry-card-date">${fmtDate(e.createdAt)}</div>
        ${chips}
      </div>`;
  }).join('');
}

/* ============================================================
   메인 패널 렌더 (상태에 따라)
============================================================ */
function renderMain() {
  const el = document.getElementById('panel-inner');
  if (view === 'list') {
    el.innerHTML = `<div class="empty-state"><div class="big">🗒️</div>왼쪽에서 기록을 선택하거나<br>새 기록을 작성해보세요.</div>`;
  } else if (view === 'detail') {
    renderDetailView(el);
  } else if (view === 'wizard') {
    renderWizardView(el);
  } else if (view === 'settings') {
    renderSettingsView(el);
  }
}

/* ============================================================
   상세보기 (기존 기록 열람 / 수정)
============================================================ */
function openEntry(id) {
  currentEntryId = id;
  view = 'detail';
  openQaId = null;
  showMain();
  renderMain();
  renderSidebarList();
}

function renderDetailView(el) {
  const entry = S.entries.find(e => e.id === currentEntryId);
  if (!entry) { el.innerHTML = `<div class="empty-state">기록을 찾을 수 없습니다.</div>`; return; }
  const init = extractMetric(entry, 'initial');
  const fin  = extractMetric(entry, 'final');

  const qaHtml = (entry.questionsSnapshot || []).map(q => {
    const a = (entry.answers || []).find(a => a.questionId === q.id);
    const text = a ? a.answerText : '';
    const isOpen = openQaId === q.id;
    return `
      <div class="qa-item ${isOpen ? 'open' : ''}" id="qa-${q.id}">
        <div class="qa-head" onclick="toggleQa('${q.id}')">
          <div class="qa-num">${q.order}</div>
          <div class="qa-q">
            <span class="cat-badge">${q.category}</span>${escapeHtml(q.text)}
            ${!isOpen ? `<div class="qa-preview">${text ? escapeHtml(text) : '응답 없음'}</div>` : ''}
          </div>
          <div class="qa-chevron">▶</div>
        </div>
        <div class="qa-body">
          <textarea class="qa-textarea" id="ans-${q.id}" oninput="markDirty()">${escapeHtml(text)}</textarea>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="detail-head">
      <input class="detail-title-input" id="detail-title" value="${escapeHtml(entry.title || '')}" oninput="markDirty()">
    </div>
    <div class="detail-meta">작성일 ${fmtDate(entry.createdAt)}${entry.updatedAt && entry.updatedAt !== entry.createdAt ? ` · 수정됨 ${fmtDate(entry.updatedAt)}` : ''}</div>
    ${(init !== null || fin !== null) ? `
    <div class="intensity-banner">
      <span class="label">감정강도</span>
      <span class="big-chip" style="background:${init!==null?intensityColor(init):'var(--text3)'}">${init !== null ? init : '-'}</span>
      <span class="arrow-big">→</span>
      <span class="big-chip" style="background:${fin!==null?intensityColor(fin):'var(--text3)'}">${fin !== null ? fin : '-'}</span>
      ${(init !== null && fin !== null) ? `<span class="delta">${fin < init ? `${init - fin}점 감소` : fin > init ? `${fin - init}점 증가` : '변화 없음'}</span>` : ''}
    </div>` : ''}
    <div id="qa-list">${qaHtml}</div>
    <div class="detail-actions">
      <button class="save-btn" id="detail-save-btn" onclick="saveEntryEdits()" disabled>저장됨</button>
    </div>
  `;
}

function toggleQa(qid) {
  openQaId = (openQaId === qid) ? null : qid;
  const entry = S.entries.find(e => e.id === currentEntryId);
  // 입력 중인 내용 보존을 위해 answers에 먼저 반영 후 리렌더
  syncTextareasToEntry(entry);
  renderDetailView(document.getElementById('panel-inner'));
}

function syncTextareasToEntry(entry) {
  if (!entry) return;
  (entry.questionsSnapshot || []).forEach(q => {
    const ta = document.getElementById('ans-' + q.id);
    if (!ta) return;
    let a = (entry.answers || []).find(a => a.questionId === q.id);
    if (!a) { a = { questionId: q.id, answerText: '' }; entry.answers.push(a); }
    a.answerText = ta.value;
  });
  const titleInput = document.getElementById('detail-title');
  if (titleInput) entry.title = titleInput.value;
}

function markDirty() {
  const btn = document.getElementById('detail-save-btn');
  if (btn) { btn.disabled = false; btn.textContent = '저장하기'; }
}

function saveEntryEdits() {
  const entry = S.entries.find(e => e.id === currentEntryId);
  if (!entry) return;
  syncTextareasToEntry(entry);
  entry.updatedAt = new Date().toISOString();
  const btn = document.getElementById('detail-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = '저장됨'; }
  renderSidebarList();
  queueSync();
}

/* ---------- 기록 삭제 ---------- */
let pendingDeleteEntryId = null;
function askDeleteEntry(id) { pendingDeleteEntryId = id; openModal('modal-del-entry'); }
function confirmDeleteEntry() {
  S.entries = S.entries.filter(e => e.id !== pendingDeleteEntryId);
  if (currentEntryId === pendingDeleteEntryId) { currentEntryId = null; view = 'list'; document.body.classList.remove('show-main'); }
  pendingDeleteEntryId = null;
  closeModal('modal-del-entry');
  renderSidebarList();
  renderMain();
  queueSync();
}

/* ============================================================
   새 기록 작성 (1문항씩 스텝 진행)
============================================================ */
function startWizard() {
  const sortedQs = [...S.questions].sort((a,b) => a.order - b.order);
  if (sortedQs.length === 0) { alert('등록된 문항이 없습니다. 먼저 설정에서 문항을 추가해주세요.'); return; }
  wizard = { step: -1, title: '', answers: {} }; // step -1 = 제목 입력 단계
  view = 'wizard';
  currentEntryId = null;
  showMain();
  renderMain();
  renderSidebarList();
}

function renderWizardView(el) {
  const sortedQs = [...S.questions].sort((a,b) => a.order - b.order);
  const total = sortedQs.length;

  if (wizard.step === -1) {
    el.innerHTML = `
      <div class="wizard-title-row">
        <label>이번 기록의 제목을 입력하세요</label>
        <input class="wizard-title-input" id="wiz-title" placeholder="예: 팀장님과의 갈등" value="${escapeHtml(wizard.title)}" autofocus>
      </div>
      <div class="wizard-nav">
        <button class="nav-btn" onclick="cancelWizard()">취소</button>
        <button class="nav-btn primary" onclick="wizardStartQuestions()">시작하기</button>
      </div>
    `;
    return;
  }

  const q = sortedQs[wizard.step];
  const pct = Math.round(((wizard.step + 1) / total) * 100);
  el.innerHTML = `
    <div class="wizard-step-meta">
      <span><span class="cat-badge">${q.category}</span>${CATEGORY_LABEL[q.category] || ''}</span>
      <span>${wizard.step + 1} / ${total}</span>
    </div>
    <div class="wizard-progress-track"><div class="wizard-progress-fill" style="width:${pct}%"></div></div>
    <div class="wizard-q">${escapeHtml(q.text)}</div>
    <textarea class="wizard-textarea" id="wiz-answer" placeholder="자유롭게 적어보세요...">${escapeHtml(wizard.answers[q.id] || '')}</textarea>
    <div class="wizard-nav">
      <button class="nav-btn" onclick="wizardPrev()">이전</button>
      <button class="nav-btn primary" onclick="wizardNext()">${wizard.step === total - 1 ? '저장' : '다음'}</button>
    </div>
  `;
  setTimeout(() => { const ta = document.getElementById('wiz-answer'); if (ta) ta.focus(); }, 0);
}

function wizardStartQuestions() {
  wizard.title = document.getElementById('wiz-title').value.trim();
  if (!wizard.title) { wizard.title = '제목 없음'; }
  wizard.step = 0;
  renderWizardView(document.getElementById('panel-inner'));
}

function wizardCaptureCurrent() {
  const sortedQs = [...S.questions].sort((a,b) => a.order - b.order);
  if (wizard.step < 0 || wizard.step >= sortedQs.length) return;
  const q = sortedQs[wizard.step];
  const ta = document.getElementById('wiz-answer');
  if (ta) wizard.answers[q.id] = ta.value;
}

function wizardNext() {
  const sortedQs = [...S.questions].sort((a,b) => a.order - b.order);
  wizardCaptureCurrent();
  if (wizard.step === sortedQs.length - 1) {
    finishWizard(sortedQs);
    return;
  }
  wizard.step++;
  renderWizardView(document.getElementById('panel-inner'));
}

function wizardPrev() {
  wizardCaptureCurrent();
  if (wizard.step === 0) { wizard.step = -1; }
  else { wizard.step--; }
  renderWizardView(document.getElementById('panel-inner'));
}

function cancelWizard() {
  wizard = null;
  view = 'list';
  document.body.classList.remove('show-main');
  renderMain();
  renderSidebarList();
}

function finishWizard(sortedQs) {
  const now = new Date().toISOString();
  const entry = {
    id: uid(),
    title: wizard.title,
    createdAt: now,
    updatedAt: now,
    questionsSnapshot: sortedQs.map(q => ({ id: q.id, category: q.category, order: q.order, text: q.text, metric: q.metric || null })),
    answers: sortedQs.map(q => ({ questionId: q.id, answerText: wizard.answers[q.id] || '' }))
  };
  S.entries.push(entry);
  wizard = null;
  currentEntryId = entry.id;
  view = 'detail';
  renderMain();
  renderSidebarList();
  queueSync();
}

/* ============================================================
   설정: 문항 관리 (마스터 문항 추가/수정/삭제/순서변경)
   ※ 과거 기록은 questionsSnapshot으로 보존되므로 영향 없음
============================================================ */
function openSettings() {
  view = 'settings';
  currentEntryId = null;
  showMain();
  renderMain();
  renderSidebarList();
}

function renderSettingsView(el) {
  const cats = ['A','B','C','D','E','F'];
  const sorted = [...S.questions].sort((a,b) => a.order - b.order);
  let html = `<div class="detail-head"><div style="font-size:21px;font-weight:700;letter-spacing:-0.3px;">문항 관리</div></div>
    <div class="detail-meta">문항을 수정해도 이미 작성된 과거 기록은 그대로 보존됩니다.</div>`;

  cats.forEach(cat => {
    const qs = sorted.filter(q => q.category === cat);
    if (qs.length === 0) return;
    html += `<div class="settings-section"><div class="settings-cat-label">${cat} · ${CATEGORY_LABEL[cat]}</div>`;
    qs.forEach((q, idx) => {
      html += `
        <div class="q-edit-row">
          <button class="q-mini-btn" onclick="moveQuestion('${q.id}',-1)" title="위로">▲</button>
          <button class="q-mini-btn" onclick="moveQuestion('${q.id}',1)" title="아래로">▼</button>
          <textarea rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'; updateQuestionText('${q.id}', this.value)">${escapeHtml(q.text)}</textarea>
          <button class="q-mini-btn danger" onclick="askDeleteQuestion('${q.id}')" title="삭제">✕</button>
        </div>`;
    });
    html += `<button class="add-q-btn" onclick="addQuestion('${cat}')">+ ${cat} 섹션에 문항 추가</button></div>`;
  });

  el.innerHTML = html;
}

function updateQuestionText(qid, text) {
  const q = S.questions.find(q => q.id === qid);
  if (q) { q.text = text; queueSync(); }
}

function moveQuestion(qid, dir) {
  const sameCat = S.questions.filter(q => q.category === S.questions.find(x => x.id === qid).category).sort((a,b) => a.order - b.order);
  const idx = sameCat.findIndex(q => q.id === qid);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sameCat.length) return;
  const a = sameCat[idx], b = sameCat[swapIdx];
  const tmp = a.order; a.order = b.order; b.order = tmp;
  renderSettingsView(document.getElementById('panel-inner'));
  queueSync();
}

function addQuestion(cat) {
  const catQs = S.questions.filter(q => q.category === cat);
  const maxOrder = S.questions.length ? Math.max(...S.questions.map(q => q.order)) : 0;
  S.questions.push({ id: uid(), category: cat, order: maxOrder + 1, text: '새 문항을 입력하세요' });
  renderSettingsView(document.getElementById('panel-inner'));
  queueSync();
}

let pendingDeleteQId = null;
function askDeleteQuestion(qid) { pendingDeleteQId = qid; openModal('modal-del-q'); }
function confirmDeleteQuestion() {
  S.questions = S.questions.filter(q => q.id !== pendingDeleteQId);
  pendingDeleteQId = null;
  closeModal('modal-del-q');
  renderSettingsView(document.getElementById('panel-inner'));
  queueSync();
}

/* ============================================================
   초기화
============================================================ */
window.addEventListener('DOMContentLoaded', () => {
  const pinInput = document.getElementById('pin-input');
  pinInput.addEventListener('input', (e) => { if (e.target.value.length === 4) doLogin(); });
  pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
  setTimeout(() => pinInput.focus(), 50);

  // 캐시된 데이터로 우선 렌더 (오프라인 대비), 로그인 성공 시 서버 데이터로 갱신
  try {
    const cached = localStorage.getItem(DATA_CACHE);
    if (cached) S = JSON.parse(cached);
  } catch (e) {}

  // 이미 access_key가 있으면 자동 로그인 시도
  if (getAccessKey()) {
    document.getElementById('login-overlay').classList.remove('active');
    document.getElementById('app').classList.add('active');
    renderSidebarList();
    renderMain();
    pullFromServer();
  }
});
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>국어 문해력 퀴즈</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root {
  --ink:#1a1a2e;--paper:#f8f6ff;--paper2:#ede9f8;--accent:#5c35a8;--accent2:#8b5cf6;
  --dim:#7c6fa0;--border:#cdc4e8;--green:#2d7a4f;--red:#b91c1c;--blue:#1d4ed8;
  --radius:10px;--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);min-height:100dvh;display:flex;flex-direction:column;}

/* HEADER */
header{background:var(--ink);color:var(--paper);padding:14px 24px;padding-top:calc(14px + var(--safe-top));display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;position:relative;}
.logo{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:700;letter-spacing:.04em;}
.logo span{color:#a78bfa;}
.header-sub{font-size:.78rem;color:#aaa;}
.admin-corner{position:absolute;right:14px;top:50%;transform:translateY(-50%);margin-top:calc(var(--safe-top)/2);}
.admin-corner button{background:none;border:1px solid #555;color:#aaa;border-radius:6px;padding:5px 10px;font-size:.72rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.admin-corner button:hover{border-color:#a78bfa;color:#a78bfa;}
.admin-badge{display:inline-block;background:#a78bfa;color:white;border-radius:4px;padding:2px 8px;font-size:.7rem;font-weight:700;margin-left:6px;vertical-align:middle;}

/* MISSION BAR */
.mission-bar{background:linear-gradient(135deg,#1a1a2e 0%,#2d1e54 100%);color:var(--paper);padding:10px 20px;display:none;}
.mission-bar.visible{display:block;}
.mission-title{font-size:.72rem;color:#aaa;margin-bottom:6px;text-align:center;}
.mission-goals{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.mission-goal{background:rgba(255,255,255,.08);border-radius:8px;padding:6px 12px;font-size:.78rem;display:flex;align-items:center;gap:6px;}
.mission-goal .goal-label{color:#bbb;}
.mission-goal .goal-prog{font-weight:700;color:#a78bfa;}
.mission-goal.done .goal-prog{color:#6fcf97;}
.mission-goal.done::after{content:' ✓';color:#6fcf97;font-weight:700;}
.mission-overall{margin-top:8px;display:flex;align-items:center;gap:10px;}
.mission-bar-track{flex:1;height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden;}
.mission-bar-fill{height:100%;background:linear-gradient(90deg,#a78bfa,#6fcf97);border-radius:4px;transition:width .5s ease;}
.mission-pct{font-size:.78rem;color:#aaa;white-space:nowrap;}
.mission-complete-msg{text-align:center;font-size:.85rem;color:#6fcf97;font-weight:700;margin-top:6px;display:none;}
.mission-complete-msg.visible{display:block;}

/* CATEGORY TABS */
.cat-bar{background:var(--paper2);border-bottom:2px solid var(--border);padding:0 16px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;justify-content:center;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-btn{padding:10px 14px;border:none;background:none;font-family:'Noto Sans KR',sans-serif;font-size:.85rem;font-weight:500;color:var(--dim);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;}
.cat-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.cat-btn:hover:not(.active){color:var(--ink);}

/* STATS */
.stats-bar{display:flex;gap:16px;padding:8px 16px;background:var(--paper2);border-bottom:1px solid var(--border);font-size:.8rem;color:var(--dim);flex-wrap:wrap;justify-content:center;}
.stats-bar strong{color:var(--ink);}

/* MODE TABS */
.mode-bar{padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;background:var(--paper);border-bottom:1px solid var(--border);}
.mode-btn{padding:7px 18px;border-radius:20px;border:1.5px solid var(--border);background:var(--paper);font-family:'Noto Sans KR',sans-serif;font-size:.82rem;cursor:pointer;color:var(--dim);transition:all .2s;}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:700;}

/* MAIN */
.main{padding:16px;max-width:900px;margin:0 auto;width:100%;flex:1;}

/* BROWSE GRID */
.browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.browse-card{background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 12px;cursor:default;transition:box-shadow .2s;position:relative;}
.browse-card:hover{box-shadow:0 4px 16px #0001;}
.browse-word{font-family:'Noto Serif KR',serif;font-size:1.2rem;font-weight:700;color:var(--ink);margin-bottom:6px;}
.browse-meaning{font-size:.82rem;color:var(--dim);line-height:1.5;}
.browse-cat-badge{position:absolute;top:8px;right:8px;font-size:.62rem;background:var(--paper2);color:var(--dim);border-radius:4px;padding:2px 6px;}

/* QUIZ */
.quiz-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;padding:8px 0;max-width:520px;margin:0 auto;}
.quiz-progress-bar{width:100%;height:6px;background:var(--paper2);border-radius:3px;overflow:hidden;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--green));border-radius:3px;transition:width .4s;}
.quiz-meta{display:flex;justify-content:space-between;width:100%;font-size:.8rem;color:var(--dim);}
.quiz-question{background:white;border:2px solid var(--border);border-radius:16px;padding:28px 24px;text-align:center;width:100%;}
.quiz-q-label{font-size:.78rem;color:var(--dim);margin-bottom:10px;}
.quiz-q-cat{display:inline-block;font-size:.68rem;background:var(--paper2);color:var(--accent);border-radius:10px;padding:2px 10px;margin-bottom:12px;font-weight:700;}
.quiz-q-word{font-family:'Noto Serif KR',serif;font-size:2.2rem;font-weight:700;line-height:1.2;color:var(--ink);margin-bottom:4px;}
.quiz-q-sub{font-size:.8rem;color:var(--dim);}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.quiz-opt{padding:15px 12px;border-radius:12px;border:2px solid var(--border);background:white;font-family:'Noto Sans KR',sans-serif;font-size:.88rem;cursor:pointer;text-align:center;line-height:1.4;transition:all .15s;}
.quiz-opt:hover:not(:disabled){border-color:var(--accent2);background:#f5f0ff;}
.quiz-opt.correct{border-color:var(--green);background:#edfaf1;color:var(--green);font-weight:700;}
.quiz-opt.wrong{border-color:var(--red);background:#fdecea;color:var(--red);}
.quiz-opt:disabled{cursor:default;}
.quiz-score{font-size:.9rem;color:var(--dim);}
.quiz-result{text-align:center;padding:28px 24px;background:white;border-radius:16px;border:2px solid var(--border);width:100%;}
.quiz-result .big{font-size:2.8rem;font-weight:700;color:var(--accent);font-family:'Noto Serif KR',serif;}
.quiz-result .grade{font-size:1.1rem;margin-top:4px;font-weight:700;}
.quiz-restart{padding:12px 28px;background:var(--accent);color:white;border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:14px;}
.quiz-wrong-list{margin-top:16px;text-align:left;width:100%;}
.quiz-wrong-list h4{font-size:.85rem;color:var(--dim);margin-bottom:8px;}
.wrong-item{background:var(--paper2);border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.82rem;}
.wrong-item .wi-word{font-weight:700;color:var(--accent);margin-bottom:2px;}
.wrong-item .wi-ans{color:var(--green);}

/* REPORT */
.report-wrap{display:flex;flex-direction:column;gap:16px;}
.report-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.report-header h2{font-family:'Noto Serif KR',serif;font-size:1.15rem;}
.report-sync-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:8px;background:white;font-size:.8rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.report-sync-btn:hover{background:var(--paper2);}
.report-day{background:white;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;}
.report-day-header{background:var(--paper2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.report-day-date{font-weight:700;font-size:.9rem;}
.report-day-summary{font-size:.78rem;color:var(--dim);display:flex;gap:10px;flex-wrap:wrap;}
.report-day-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:700;}
.report-day-badge.complete{background:#edfaf1;color:var(--green);}
.report-day-badge.partial{background:#f5f0ff;color:var(--accent2);}
.report-day-body{padding:14px 16px;display:none;}
.report-day-body.open{display:block;}
.report-session{border-left:3px solid var(--border);padding:8px 0 8px 14px;margin-bottom:10px;}
.report-session:last-child{margin-bottom:0;}
.report-session-time{font-size:.72rem;color:var(--dim);margin-bottom:4px;}
.report-session-row{display:flex;gap:8px;flex-wrap:wrap;font-size:.82rem;}
.report-tag{display:inline-flex;align-items:center;gap:4px;background:var(--paper2);border-radius:6px;padding:2px 8px;font-size:.75rem;color:var(--dim);}
.report-tag strong{color:var(--ink);}
.report-tag.green{background:#edfaf1;color:var(--green);}
.report-tag.red{background:#fdecea;color:var(--red);}
.report-tag.orange{background:#fff3e0;color:#e67e22;}
.report-empty{text-align:center;padding:40px 20px;color:var(--dim);font-size:.9rem;}
.report-goal-status{background:white;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;}
.report-goal-status h3{font-size:.85rem;color:var(--dim);margin-bottom:10px;}
.goal-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.82rem;}
.goal-row:last-child{margin-bottom:0;}
.goal-mini-bar{flex:1;height:6px;background:var(--paper2);border-radius:3px;overflow:hidden;}
.goal-mini-fill{height:100%;border-radius:3px;transition:width .4s;}
.goal-mini-fill.done{background:var(--green);}
.goal-mini-fill.prog{background:var(--accent2);}
.no-goal-msg{font-size:.82rem;color:var(--dim);text-align:center;padding:10px 0;}

/* ADMIN/LOGIN MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--paper);border-radius:16px;padding:28px 24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.modal-title{font-family:'Noto Serif KR',serif;font-size:1.2rem;font-weight:700;margin-bottom:20px;}
.modal-close{float:right;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--dim);}
.form-group{margin-bottom:16px;}
.form-label{font-size:.82rem;color:var(--dim);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.95rem;background:white;outline:none;}
.form-input:focus{border-color:var(--accent2);}
.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.9rem;background:white;outline:none;cursor:pointer;}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}
.btn-primary{padding:11px 20px;background:var(--accent);color:white;border:none;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;width:100%;}
.btn-primary:hover{background:#4a278a;}
.btn-secondary{padding:10px 20px;background:white;color:var(--dim);border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.9rem;cursor:pointer;}
.btn-danger{padding:10px 20px;background:white;color:var(--red);border:1.5px solid var(--red);border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.9rem;cursor:pointer;}
.modal-error{color:var(--red);font-size:.82rem;margin-top:8px;display:none;}
.modal-error.visible{display:block;}
.modal-success{color:var(--green);font-size:.82rem;margin-top:8px;display:none;}
.modal-success.visible{display:block;}
.divider{height:1px;background:var(--border);margin:20px 0;}
.goal-item{background:var(--paper2);border-radius:8px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.goal-item-label{font-size:.85rem;font-weight:500;}
.goal-item-desc{font-size:.75rem;color:var(--dim);margin-top:2px;}
.goal-item-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:1rem;padding:2px 6px;}
.github-setup{background:#f6f8fa;border:1px solid #d0d7de;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:.82rem;color:#57606a;}
.github-setup strong{color:var(--ink);}
.github-connected{background:#edfaf1;border-color:#b4e4bc;color:var(--green);}
.sync-status{font-size:.75rem;color:var(--dim);text-align:right;margin-top:4px;}
.empty{text-align:center;padding:60px 20px;color:var(--dim);}

/* MOBILE */
@media(max-width:600px){
  body{padding-bottom:calc(64px + var(--safe-bottom));}
  header{padding:12px 16px 10px;padding-top:calc(12px + var(--safe-top));}
  .logo{font-size:1.2rem;}
  .admin-corner button{font-size:.65rem;padding:4px 8px;}
  .cat-bar{padding:0 8px;justify-content:flex-start;}
  .cat-btn{padding:8px 10px;font-size:.78rem;}
  .stats-bar{gap:10px;font-size:.72rem;padding:6px 12px;}
  .mode-bar{position:fixed;bottom:0;left:0;right:0;padding:8px 0;padding-bottom:calc(8px + var(--safe-bottom));background:var(--ink);border-top:1px solid #333;border-bottom:none;gap:0;z-index:100;display:grid;grid-template-columns:repeat(3,1fr);flex-wrap:unset;justify-content:unset;}
  .mode-btn{border-radius:0;border:none;background:transparent;color:#888;font-size:.62rem;padding:6px 2px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.2;}
  .mode-btn .tab-icon{font-size:1.2rem;}
  .mode-btn.active{background:transparent;color:#a78bfa;font-weight:700;}
  .main{padding:10px 12px;}
  .browse-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .browse-card{padding:10px;}
  .browse-word{font-size:1rem;}
  .quiz-q-word{font-size:1.7rem;}
  .quiz-options{gap:8px;}
  .quiz-opt{padding:13px 8px;font-size:.82rem;}
  .mission-bar{padding:8px 12px;}
}
</style>
</head>
<body>
<header>
  <div class="logo">國語 <span>문해력</span></div>
  <div class="header-sub">한자어 · 사자성어 · 속담 · 우리말 — 750문항</div>
  <div class="admin-corner">
    <button onclick="openAdminModal()" id="adminBtn">⚙ 관리자</button>
  </div>
</header>

<div class="mission-bar" id="missionBar">
  <div class="mission-title">📌 오늘의 목표</div>
  <div class="mission-goals" id="missionGoals"></div>
  <div class="mission-overall">
    <div class="mission-bar-track"><div class="mission-bar-fill" id="missionFill" style="width:0%"></div></div>
    <div class="mission-pct" id="missionPct">0%</div>
  </div>
  <div class="mission-complete-msg" id="missionComplete">🎉 오늘 과제 모두 완료! 수고했어! 🎉</div>
</div>

<div class="cat-bar" id="catTabs"></div>
<div class="stats-bar" id="statsBar"></div>

<div class="mode-bar" id="modeBar">
  <button class="mode-btn active" onclick="setMode('browse')">
    <span class="tab-icon">📖</span><span>단어장</span>
  </button>
  <button class="mode-btn" onclick="setMode('quiz')">
    <span class="tab-icon">✏️</span><span>퀴즈</span>
  </button>
  <button class="mode-btn" onclick="setMode('report')">
    <span class="tab-icon">📊</span><span>리포트</span>
  </button>
</div>

<div class="main" id="mainContent"></div>

<!-- LOGIN MODAL -->
<div class="modal-overlay hidden" id="loginModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('loginModal')">✕</button>
    <div class="modal-title">🔐 관리자 로그인</div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input class="form-input" type="password" id="loginPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="modal-error" id="loginErr">비밀번호가 틀렸습니다.</div>
    <button class="btn-primary" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="modal-overlay hidden" id="adminModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('adminModal')">✕</button>
    <div class="modal-title">⚙ 관리자 패널 <span class="admin-badge">관리자</span></div>
    <div id="githubStatus" class="github-setup"><strong>GitHub 저장소 연동</strong> — 설정 후 기록이 클라우드에 자동 저장됩니다.</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">GitHub 사용자명</label><input class="form-input" type="text" id="ghUser" placeholder="예: myname"></div>
      <div class="form-group"><label class="form-label">저장소 이름</label><input class="form-input" type="text" id="ghRepo" placeholder="예: korean-log"></div>
    </div>
    <div class="form-group"><label class="form-label">Personal Access Token <span style="color:var(--dim);font-size:.75rem">— 세션 종료 시 삭제됨</span></label><input class="form-input" type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxx"></div>
    <div class="form-group"><label class="form-label">저장 파일 경로</label><input class="form-input" type="text" id="ghPath" placeholder="korean-log.json"></div>
    <button class="btn-secondary" style="width:100%;margin-bottom:6px" onclick="saveGithubConfig()">💾 GitHub 설정 저장 및 테스트</button>
    <div class="sync-status" id="syncStatus"></div>
    <div class="divider"></div>
    <div style="font-size:.95rem;font-weight:700;margin-bottom:12px;">📌 오늘의 학습 목표 설정</div>
    <div class="form-group">
      <label class="form-label">목표 조건</label>
      <select class="form-select" id="goalCondition">
        <option value="AND">AND — 모든 목표 달성해야 완료</option>
        <option value="OR">OR — 하나만 달성해도 완료</option>
        <option value="EACH">EACH — 각각 독립 완료 표시</option>
      </select>
    </div>
    <div style="background:var(--paper2);border-radius:10px;padding:14px;margin-bottom:12px;">
      <div style="font-size:.82rem;font-weight:700;margin-bottom:10px;color:var(--dim);">+ 목표 추가</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">카테고리</label>
          <select class="form-select" id="ng_cat">
            <option value="all">전체</option>
            <option value="한자어">한자어</option>
            <option value="사자성어">사자성어</option>
            <option value="속담">속담</option>
            <option value="우리말">우리말</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">문제 수 (0=제한없음)</label>
          <input class="form-input" type="number" id="ng_count" value="10" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">목표 점수 % (0=제한없음)</label>
        <input class="form-input" type="number" id="ng_score" value="80" min="0" max="100">
      </div>
      <button class="btn-secondary" style="width:100%" onclick="addGoalItem()">+ 목표 추가</button>
    </div>
    <div id="goalList"></div>
    <button class="btn-primary" style="margin-bottom:8px" onclick="saveTodayGoals()">✅ 오늘 목표 저장</button>
    <button class="btn-danger" style="width:100%" onclick="clearTodayGoals()">🗑 오늘 목표 초기화</button>
    <div class="modal-success" id="adminSuccess">저장되었습니다.</div>
    <div class="modal-error" id="adminErr"></div>
    <div class="divider"></div>
    <button class="btn-secondary" style="width:100%" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<script>

// ════════════════════════════════════════════════════
// 유틸
// ════════════════════════════════════════════════════
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function nowStr(){const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function nowISO(){return new Date().toISOString();}
function catLabel(c){return c==='all'?'전체':c;}

function getList(cat){
  if(cat==='전체') return DB.map(d=>({word:d[0],meaning:d[1],cat:d[2]}));
  return DB.filter(d=>d[2]===cat).map(d=>({word:d[0],meaning:d[1],cat:d[2]}));
}

function saveLocalLog(){localStorage.setItem('kor_log',JSON.stringify(localLog));}

function startSession(mode,cat){
  if(activeSession&&activeSession.mode===mode&&activeSession.cat===cat) return;
  if(activeSession) finishSession();
  sessionStartTime=Date.now();
  activeSession={id:Date.now(),time:nowStr(),mode,cat,count:0,correct:0,skipped:0,finished:false,startISO:nowISO()};
}
function finishSession(extra){
  if(!activeSession) return;
  const elapsed=Math.round((Date.now()-sessionStartTime)/1000);
  activeSession.elapsed=elapsed;
  if(extra) Object.assign(activeSession,extra);
  activeSession.finished=true;
  const dt=todayStr();
  if(!localLog[dt]) localLog[dt]={date:dt,sessions:[]};
  localLog[dt].sessions.push({...activeSession});
  saveLocalLog();
  activeSession=null;
  sessionStartTime=null;
  updateMissionBar();
  if(ghPAT&&ghConfig.user) syncToGithub();
}
function logAnswer(correct){
  if(!activeSession) return;
  activeSession.count++;
  if(correct) activeSession.correct++;
}

// ════════════════════════════════════════════════════
// GitHub 동기화
// ════════════════════════════════════════════════════
async function syncToGithub(){
  if(!ghPAT||!ghConfig.user||!ghConfig.repo) return;
  const path=ghConfig.path||'korean-log.json';
  const url=`https://api.github.com/repos/${ghConfig.user}/${ghConfig.repo}/contents/${path}`;
  const headers={'Authorization':`token ${ghPAT}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  let sha='';
  try{
    const r=await fetch(url,{headers});
    if(r.ok){const d=await r.json();sha=d.sha;const remote=JSON.parse(atob(d.content.replace(/\n/g,'')));for(const[dt,val] of Object.entries(remote)) if(!localLog[dt]) localLog[dt]=val;saveLocalLog();}
  }catch(e){}
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(localLog,null,2))));
  const body={message:`국어 학습 기록 ${todayStr()}`,content};
  if(sha) body.sha=sha;
  try{
    const r=await fetch(url,{method:'PUT',headers,body:JSON.stringify(body)});
    const el=document.getElementById('syncStatus');
    if(el) el.textContent=r.ok?`✅ 동기화 완료 (${nowStr()})`:`⚠ 동기화 실패 (${r.status})`;
    if(r.ok&&currentMode==='report') renderReport();
  }catch(e){const el=document.getElementById('syncStatus');if(el) el.textContent='⚠ 네트워크 오류';}
}
async function loadFromGithub(){
  if(!ghPAT||!ghConfig.user||!ghConfig.repo) return false;
  const path=ghConfig.path||'korean-log.json';
  const url=`https://api.github.com/repos/${ghConfig.user}/${ghConfig.repo}/contents/${path}`;
  try{
    const r=await fetch(url,{headers:{'Authorization':`token ${ghPAT}`,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok) return false;
    const d=await r.json();
    const remote=JSON.parse(atob(d.content.replace(/\n/g,'')));
    for(const[dt,val] of Object.entries(remote)) if(!localLog[dt]) localLog[dt]=val;
    saveLocalLog();
    return true;
  }catch(e){return false;}
}

// ════════════════════════════════════════════════════
// 미션 바
// ════════════════════════════════════════════════════
function getMissionProgress(){
  if(!todayGoals||!todayGoals.goals.length) return null;
  const dt=todayStr();
  const sessions=(localLog[dt]||{}).sessions||[];
  return todayGoals.goals.map(g=>{
    const matched=sessions.filter(s=>(g.cat==='all'||s.cat===g.cat)&&s.mode==='quiz'&&s.finished);
    const totalCount=matched.reduce((a,s)=>a+(s.count||0),0);
    const totalCorrect=matched.reduce((a,s)=>a+(s.correct||0),0);
    const scoreRate=totalCount>0?Math.round(totalCorrect/totalCount*100):0;
    const countDone=g.count<=0||totalCount>=g.count;
    const scoreDone=g.score<=0||scoreRate>=g.score;
    const done=countDone&&scoreDone;
    const countPct=g.count>0?Math.min(100,Math.round(totalCount/g.count*100)):100;
    const scorePct=g.score>0?Math.min(100,scoreRate):100;
    const pct=Math.round((countPct+scorePct)/2);
    return{...g,done,pct,totalCount,scoreRate};
  });
}
function updateMissionBar(){
  const bar=document.getElementById('missionBar');
  const goalsEl=document.getElementById('missionGoals');
  const fill=document.getElementById('missionFill');
  const pctEl=document.getElementById('missionPct');
  const completeMsg=document.getElementById('missionComplete');
  if(!todayGoals||!todayGoals.goals.length){bar.classList.remove('visible');return;}
  bar.classList.add('visible');
  const progress=getMissionProgress();
  if(!progress) return;
  goalsEl.innerHTML=progress.map(p=>{
    const parts=[];
    if(p.count>0) parts.push(`${p.totalCount}/${p.count}문제`);
    if(p.score>0) parts.push(`${p.scoreRate}/${p.score}점`);
    return`<div class="mission-goal ${p.done?'done':''}"><span class="goal-label">${p.cat} 퀴즈</span><span class="goal-prog">${parts.join(' · ')||'진행 중'}</span></div>`;
  }).join('');
  const cond=todayGoals.condition;
  const doneCnt=progress.filter(p=>p.done).length;
  let overallPct=cond==='OR'?(doneCnt>0?100:Math.max(...progress.map(p=>p.pct))):Math.round(progress.reduce((a,p)=>a+p.pct,0)/progress.length);
  const allDone=cond==='OR'?doneCnt>0:doneCnt===progress.length;
  fill.style.width=overallPct+'%';
  pctEl.textContent=overallPct+'%';
  completeMsg.classList.toggle('visible',allDone);
}

// ════════════════════════════════════════════════════
function renderQuiz(reset){
  const list=getList(currentCat);
  if(list.length<4){document.getElementById('mainContent').innerHTML='<div class="empty">퀴즈를 위해 4항목 이상 필요합니다.</div>';return;}
  if(!quizState||reset){
    const shuffled=[...list].sort(()=>Math.random()-.5);
    quizState={list:shuffled,idx:0,score:0,answered:false,total:Math.min(20,shuffled.length),wrongList:[],cat:currentCat};
    startSession('quiz',currentCat);
  }
  const qs=quizState;
  if(qs.idx>=qs.total){
    finishSession({finalScore:qs.score,finalTotal:qs.total});
    _renderQuizResult(qs);
    return;
  }
  const h=qs.list[qs.idx];
  // 퀴즈 타입: 0=단어→뜻, 1=뜻→단어
  const type=qs.idx%2;
  const pool=list.filter(x=>x.word!==h.word);
  const wrong=pool.sort(()=>Math.random()-.5).slice(0,3);
  const opts=[...wrong,h].sort(()=>Math.random()-.5);
  const pct=Math.round(qs.idx/qs.total*100);
  document.getElementById('mainContent').innerHTML=`
    <div class="quiz-wrap">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      <div class="quiz-meta"><span>${qs.idx+1}/${qs.total}</span><span>점수: ${qs.score}</span></div>
      <div class="quiz-question">
        <div class="quiz-q-cat">${h.cat}</div>
        <div class="quiz-q-label">${type===0?'이 단어/표현의 뜻은?':'이 뜻에 맞는 단어는?'}</div>
        <div class="quiz-q-word">${type===0?h.word:h.meaning}</div>
      </div>
      <div class="quiz-options" id="qOpts">
        ${opts.map((o,i)=>`
          <button class="quiz-opt" id="qo${i}" onclick="answerQuiz(${i},'${escQ(o.word)}','${escQ(h.word)}','${escQ(h.word)}','${escQ(h.meaning)}')">
            ${type===0?o.meaning:o.word}
          </button>`).join('')}
      </div>
    </div>`;
}

function escQ(s){return(s||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;');}

function answerQuiz(idx,chosen,correct,word,meaning){
  const qs=quizState;
  if(qs.answered) return;
  qs.answered=true;
  const isCorrect=chosen===correct;
  if(isCorrect) qs.score++;
  else qs.wrongList.push({word,meaning});
  logAnswer(isCorrect);
  const type=qs.idx%2;
  const h=qs.list[qs.idx];
  document.querySelectorAll('.quiz-opt').forEach((btn,i)=>{
    const val=btn.textContent.trim();
    const correctVal=type===0?h.meaning:h.word;
    if(val===correctVal) btn.classList.add('correct');
    else if(i===idx&&!isCorrect) btn.classList.add('wrong');
    btn.disabled=true;
  });
  setTimeout(()=>{qs.idx++;qs.answered=false;renderQuiz(false);},1100);
}

function _renderQuizResult(qs){
  const pct=Math.round(qs.score/qs.total*100);
  let grade='';
  if(pct>=90) grade='🏆 최우수';
  else if(pct>=80) grade='🥇 우수';
  else if(pct>=70) grade='🥈 양호';
  else if(pct>=60) grade='🥉 보통';
  else grade='📚 더 연습 필요';
  const wrongHtml=qs.wrongList.length?`
    <div class="quiz-wrong-list">
      <h4>❌ 틀린 문제 (${qs.wrongList.length}개)</h4>
      ${qs.wrongList.map(w=>`<div class="wrong-item"><div class="wi-word">${w.word}</div><div class="wi-ans">→ ${w.meaning}</div></div>`).join('')}
    </div>`:'';
  document.getElementById('mainContent').innerHTML=`
    <div class="quiz-wrap">
      <div class="quiz-result">
        <div style="font-size:.85rem;color:var(--dim);margin-bottom:6px">퀴즈 완료!</div>
        <div class="big">${qs.score} / ${qs.total}</div>
        <div class="grade">${grade} (${pct}점)</div>
        ${wrongHtml}
      </div>
      <button class="quiz-restart" onclick="quizState=null;renderQuiz(true)">다시 퀴즈</button>
    </div>`;
}

// ════════════════════════════════════════════════════
// 리포트
// ════════════════════════════════════════════════════
function renderReport(){
  const main=document.getElementById('mainContent');
  const dates=Object.keys(localLog).sort().reverse();
  const progress=getMissionProgress();
  let goalHtml='';
  if(todayGoals&&todayGoals.goals.length&&progress){
    const cond=todayGoals.condition;
    const condLabel={AND:'모두 달성',OR:'하나 이상',EACH:'각각 독립'}[cond];
    goalHtml=`<div class="report-goal-status"><h3>📌 오늘 목표 (${condLabel})</h3>${progress.map(p=>`
      <div class="goal-row">
        <span style="min-width:80px;font-size:.8rem">${p.cat} 퀴즈</span>
        <div class="goal-mini-bar"><div class="goal-mini-fill ${p.done?'done':'prog'}" style="width:${p.pct}%"></div></div>
        <span style="min-width:36px;text-align:right;font-size:.8rem;color:${p.done?'var(--green)':'var(--dim)'}">${p.pct}%</span>
        ${p.done?'<span style="color:var(--green);font-size:.8rem">✓</span>':''}
      </div>`).join('')}</div>`;
  } else {
    goalHtml=`<div class="report-goal-status"><div class="no-goal-msg">오늘 설정된 목표 없음<br><span style="font-size:.75rem">관리자 모드에서 목표를 설정해주세요.</span></div></div>`;
  }
  if(!dates.length){
    main.innerHTML=`<div class="report-wrap"><div class="report-header"><h2>📊 학습 리포트</h2><button class="report-sync-btn" onclick="syncReport()">🔄 동기화</button></div>${goalHtml}<div class="report-empty">아직 학습 기록이 없습니다.<br>퀴즈를 시작하면 자동으로 기록됩니다.</div></div>`;
    return;
  }
  const daysHtml=dates.map(dt=>{
    const day=localLog[dt];
    const sessions=day.sessions||[];
    const totalCount=sessions.reduce((a,s)=>a+(s.count||0),0);
    const totalCorrect=sessions.reduce((a,s)=>a+(s.correct||0),0);
    const totalSec=sessions.reduce((a,s)=>a+(s.elapsed||0),0);
    const avgScore=totalCount>0?Math.round(totalCorrect/totalCount*100):0;
    const mins=Math.floor(totalSec/60);const secs=totalSec%60;
    let dayBadge='';
    if(dt===todayStr()&&todayGoals&&progress){
      const doneCnt=progress.filter(p=>p.done).length;
      const allDone=todayGoals.condition==='OR'?doneCnt>0:doneCnt===progress.length;
      dayBadge=allDone?'<span class="report-day-badge complete">✓ 완료</span>':'<span class="report-day-badge partial">진행 중</span>';
    }
    const sessHtml=sessions.map(s=>{
      const elMin=Math.floor((s.elapsed||0)/60);const elSec=(s.elapsed||0)%60;
      const sr=s.count>0?Math.round(s.correct/s.count*100):0;
      return`<div class="report-session">
        <div class="report-session-time">🕐 ${s.time||''} · ${elMin}분 ${elSec}초</div>
        <div class="report-session-row">
          <span class="report-tag"><strong>퀴즈</strong></span>
          <span class="report-tag">${s.cat}</span>
          ${s.count>0?`<span class="report-tag">문제 <strong>${s.count}</strong></span>`:''}
          ${s.correct>0?`<span class="report-tag green">정답 <strong>${s.correct}</strong></span>`:''}
          ${s.count>0?`<span class="report-tag ${sr>=80?'green':sr>=60?'orange':'red'}">정답률 <strong>${sr}%</strong></span>`:''}
          ${s.finalScore!==undefined?`<span class="report-tag ${s.finalScore/s.finalTotal>=0.8?'green':'red'}">최종 <strong>${s.finalScore}/${s.finalTotal}</strong></span>`:''}
        </div>
      </div>`;
    }).join('');
    return`<div class="report-day">
      <div class="report-day-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div>
          <div class="report-day-date">${dt.replace(/-/g,'.')} ${dayBadge}</div>
          <div class="report-day-summary"><span>${mins}분 ${secs}초</span><span>${totalCount}문제</span>${totalCount>0?`<span>정답률 ${avgScore}%</span>`:''}<span>${sessions.length}세션</span></div>
        </div>
        <span style="color:var(--dim)">▾</span>
      </div>
      <div class="report-day-body ${dt===todayStr()?'open':''}">${sessHtml}</div>
    </div>`;
  }).join('');
  main.innerHTML=`<div class="report-wrap"><div class="report-header"><h2>📊 학습 리포트</h2><button class="report-sync-btn" onclick="syncReport()">🔄 동기화</button></div>${goalHtml}${daysHtml}</div>`;
}
async function syncReport(){
  const btn=document.querySelector('.report-sync-btn');
  if(btn) btn.textContent='⏳ 동기화 중...';
  if(ghPAT&&ghConfig.user) await syncToGithub();
  else alert('GitHub 연동이 필요합니다.\n관리자 모드에서 GitHub 설정을 완료해주세요.');
  if(btn) btn.textContent='🔄 동기화';
  renderReport();
}

pendingGoals = todayGoals ? [...(todayGoals.goals||[])] : [];

buildCatTabs();

render();

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>마음 정리</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --g50:  #f0faf4;
  --g100: #d6f0e2;
  --g200: #a8dbb8;
  --g300: #6ec493;
  --g500: #2f9e5a;
  --g700: #1a6e3c;
  --g900: #0d3d20;
  --surface: #f4fbf6;
  --card: #ffffff;
  --txt: #16312a;
  --txt2: #3d6657;
  --txt3: #7aab91;
  --bdr: #c0e4cf;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(20,80,45,0.08);
}

html, body {
  height: 100%;
  background: var(--surface);
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  color: var(--txt);
  -webkit-font-smoothing: antialiased;
}

/* ── 앱 래퍼 ── */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom, 16px);
}

/* ── 헤더 ── */
.header {
  background: linear-gradient(160deg, #e2f7ea 0%, #c8efda 100%);
  padding: 52px 20px 22px;
  border-bottom: 1px solid var(--bdr);
}
.header h1 { font-size: 24px; font-weight: 700; color: var(--g700); letter-spacing: -0.5px; }
.header p  { font-size: 13px; color: var(--txt2); margin-top: 5px; line-height: 1.5; }

/* ── 버튼 2개 ── */
.trigger-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 20px 16px 4px;
}
.trigger-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 18px 12px 16px;
  border: 1.5px solid;
  border-radius: var(--radius);
  background: var(--card);
  cursor: pointer;
  font-size: 15px; font-weight: 700;
  transition: transform 0.12s, box-shadow 0.12s;
  box-shadow: var(--shadow);
}
.trigger-btn:active { transform: scale(0.96); box-shadow: none; }
.trigger-btn .emoji { font-size: 28px; }
.btn-anger  { color: #a04800; border-color: #f0b880; }
.btn-anger:hover  { background: #fff8f2; border-color: #e8903a; }
.btn-anxiety { color: #264e8a; border-color: #9fbce8; }
.btn-anxiety:hover { background: #f2f6ff; border-color: #5588d0; }

/* ── 섹션 ── */
.section-head {
  display: flex; align-items: center; gap: 8px;
  padding: 22px 16px 8px;
  font-size: 12px; font-weight: 700; color: var(--txt3);
  text-transform: uppercase; letter-spacing: 1px;
}
.section-count {
  background: var(--g100); color: var(--g700);
  font-size: 11px; font-weight: 700;
  padding: 2px 7px; border-radius: 20px;
}
.card-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }

.empty-box {
  text-align: center; padding: 18px;
  font-size: 13px; color: var(--txt3);
  background: var(--card);
  border: 1px dashed var(--bdr);
  border-radius: var(--radius);
}

/* ── 기록 카드 ── */
.record-card {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: var(--radius);
  padding: 14px 14px 14px 14px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow);
}
.rec-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.rec-icon.anger   { background: #fff0e0; }
.rec-icon.anxiety { background: #eaf0ff; }
.rec-info { flex: 1; min-width: 0; }
.rec-title { font-size: 14px; font-weight: 600; color: var(--txt); }
.rec-meta  { font-size: 12px; color: var(--txt3); margin-top: 3px; }
.badge {
  font-size: 11px; font-weight: 700;
  padding: 4px 9px; border-radius: 20px;
  white-space: nowrap; flex-shrink: 0;
}
.badge-done       { background: #d8f4e4; color: #1a6e3c; }
.badge-processing { background: #fff2d6; color: #7a5200; }
.badge-critical   { background: #ffe4e4; color: #8a1a1a; }

/* ── 모달 오버레이 ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,30,20,0.40);
  z-index: 200;
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }

/* ── 모달 시트 ── */
.sheet {
  background: #fff;
  border-radius: 22px 22px 0 0;
  width: 100%; max-width: 480px;
  max-height: 90dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}
.sheet-handle {
  width: 40px; height: 4px;
  background: #d0d8d4;
  border-radius: 2px;
  margin: 14px auto 0;
}
.sheet-header {
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--bdr);
  position: sticky; top: 0; background: #fff; z-index: 1;
}
.sheet-header h2 { font-size: 19px; font-weight: 700; color: var(--txt); }
.progress-bar {
  height: 5px; background: #e0e8e4;
  border-radius: 3px; margin-top: 12px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--g300);
  border-radius: 3px; transition: width 0.35s ease;
}
.progress-text { font-size: 12px; color: var(--txt3); margin-top: 6px; }

.sheet-body { padding: 22px 20px 8px; }

/* ── 질문 ── */
.q-text {
  font-size: 17px; font-weight: 600;
  line-height: 1.55; color: var(--txt);
  margin-bottom: 8px;
}
.q-sub {
  font-size: 13px; color: var(--txt2);
  line-height: 1.55; display: block;
  margin-bottom: 26px;
}

/* ── 점수 척도 ── */
.scale-labels {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--txt3);
  margin-bottom: 8px; padding: 0 2px;
}
.scale-row {
  display: flex; gap: 8px;
  justify-content: center;
  margin-bottom: 10px;
}
.scale-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: 1.5px solid var(--bdr);
  background: #fff;
  font-size: 17px; font-weight: 700;
  color: var(--txt2);
  cursor: pointer;
  transition: all 0.12s;
  -webkit-appearance: none;
}
.scale-btn:hover  { border-color: var(--g300); background: var(--g50); }
.scale-btn.sel    { background: var(--g500); border-color: var(--g500); color: #fff; }
.scale-hint {
  text-align: center; font-size: 12px; color: var(--txt3);
  min-height: 18px; margin-bottom: 18px; transition: opacity 0.2s;
}

/* ── 모달 하단 버튼 ── */
.sheet-footer {
  display: flex; gap: 10px;
  padding: 12px 20px 8px;
  position: sticky; bottom: 0; background: #fff;
  border-top: 1px solid var(--bdr);
}
.btn-close-m {
  padding: 14px 18px;
  background: #fff; color: var(--txt2);
  border: 1px solid var(--bdr);
  border-radius: var(--radius);
  font-size: 15px; font-weight: 600; cursor: pointer;
  -webkit-appearance: none;
}
.btn-next-m {
  flex: 1; padding: 14px;
  background: var(--g500); color: #fff;
  border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: background 0.15s;
  -webkit-appearance: none;
}
.btn-next-m:disabled { background: #b0d4be; cursor: not-allowed; }
.btn-next-m:not(:disabled):active { background: var(--g700); }

/* ── 결과 화면 ── */
.result-wrap { text-align: center; padding: 16px 20px 20px; }
.result-emoji { font-size: 56px; margin: 8px 0 12px; }
.result-cat   { font-size: 22px; font-weight: 800; margin-bottom: 10px; color: var(--txt); }
.result-badge-lg {
  display: inline-block;
  font-size: 14px; font-weight: 700;
  padding: 6px 18px; border-radius: 30px;
  margin-bottom: 16px;
}
.result-desc {
  font-size: 14px; color: var(--txt2);
  line-height: 1.7; margin-bottom: 22px;
  text-align: left;
}
.flag-box {
  background: var(--g50); border: 1px solid var(--bdr);
  border-radius: var(--radius); padding: 14px 16px;
  text-align: left; margin-bottom: 22px;
}
.flag-box-title {
  font-size: 12px; font-weight: 700; color: var(--txt3);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 10px;
}
.flag-item {
  display: flex; align-items: flex-start; gap: 9px;
  font-size: 13px; color: var(--txt2);
  padding: 4px 0; line-height: 1.5;
}
.flag-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0; margin-top: 4px;
}
.dot-ok      { background: var(--g300); }
.dot-warn    { background: #e8a030; }
.dot-danger  { background: #d04040; }
.btn-confirm {
  width: 100%; padding: 16px;
  background: var(--g500); color: #fff;
  border: none; border-radius: var(--radius);
  font-size: 16px; font-weight: 700;
  cursor: pointer; -webkit-appearance: none;
}
.btn-confirm:active { background: var(--g700); }
</style>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <div class="header">
    <h1>마음 정리</h1>
    <p>감정을 직면하고, 뇌에게 종료 신호를 보내세요</p>
  </div>

  <!-- 버튼 2개 -->
  <div class="trigger-row">
    <button class="trigger-btn btn-anger" onclick="openModal('anger')">
      <span class="emoji">🔥</span>
      분노 처리
    </button>
    <button class="trigger-btn btn-anxiety" onclick="openModal('anxiety')">
      <span class="emoji">🌀</span>
      불안 처리
    </button>
  </div>

  <!-- 처리 완료 -->
  <div class="section-head">
    처리 완료
    <span class="section-count" id="cnt-done">0</span>
  </div>
  <div class="card-list" id="list-done">
    <div class="empty-box">아직 없음</div>
  </div>

  <!-- 처리 중 -->
  <div class="section-head">
    처리 중
    <span class="section-count" id="cnt-processing">0</span>
  </div>
  <div class="card-list" id="list-processing">
    <div class="empty-box">아직 없음</div>
  </div>

  <!-- 분석 요망 -->
  <div class="section-head">
    분석 요망
    <span class="section-count" id="cnt-critical">0</span>
  </div>
  <div class="card-list" id="list-critical">
    <div class="empty-box">아직 없음</div>
  </div>

</div><!-- /app -->

<!-- 모달 오버레이 -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>

    <div class="sheet-header">
      <h2 id="sh-title">분노 처리</h2>
      <div class="progress-bar">
        <div class="progress-fill" id="sh-prog" style="width:0%"></div>
      </div>
      <div class="progress-text" id="sh-step">질문 1 / 7</div>
    </div>

    <div class="sheet-body" id="sh-body"></div>

    <div class="sheet-footer" id="sh-footer">
      <button class="btn-close-m" onclick="closeModal()">닫기</button>
      <button class="btn-next-m" id="btn-next" disabled onclick="nextStep()">다음</button>
    </div>
  </div>
</div>

<script>
/* ───────────────────────────────
   문항 데이터
─────────────────────────────── */
const Q = {
  anger: [
    {
      q: "분노의 대상이 나에게 실질적인 피해를 입혔는가?",
      sub: "물리적·경제적·관계적 피해를 모두 포함합니다",
      flag: s => s >= 4, flagLabel: "실질 피해 확인됨"
    },
    {
      q: "지금 당장 현실적으로 할 수 있는 대응 행동이 있는가?",
      sub: "항의·대화·법적 대응 등 구체적 행동이 가능한지",
      flag: s => s >= 4, flagLabel: "즉각 대응 필요"
    },
    {
      q: "이 일이 1년 후에도 나에게 영향을 미칠 것 같은가?",
      sub: "시간 원근법 — 지금 느껴지는 것보다 작을 수 있습니다",
      flag: s => s >= 4, flagLabel: "장기 영향 예상"
    },
    {
      q: "상대방이 의도적으로 나를 해쳤다고 확신하는가?",
      sub: "실수·오해·무지일 가능성도 생각해보세요",
      flag: s => s >= 4, flagLabel: "의도적 가해 판단"
    },
    {
      q: "이 분노를 계속 품고 있는 것이 나에게 이득이 되는가?",
      sub: "분노 유지의 실질적 이점이 있는지 솔직하게",
      flag: s => s <= 2, flagLabel: "분노 유지 손실 인식 부족"
    },
    {
      q: "비슷한 상황에서 다른 사람도 동일하게 분노할 것 같은가?",
      sub: "나만의 과민반응은 아닌지 점검해보세요",
      flag: s => s <= 2, flagLabel: "사회적 타당성 낮음"
    },
    {
      q: "분노 대상과의 관계가 앞으로도 계속되는가?",
      sub: "지속적 관계라면 감정 처리가 더욱 중요합니다",
      flag: s => s >= 4, flagLabel: "지속 관계 → 처리 필요"
    }
  ],
  anxiety: [
    {
      q: "불안해하는 일이 실제로 일어날 가능성이 높은가?",
      sub: "가능성을 최대한 객관적으로 평가해보세요",
      flag: s => s >= 4, flagLabel: "높은 발생 가능성"
    },
    {
      q: "그 일이 일어나지 않도록 내가 할 수 있는 구체적 행동이 있는가?",
      sub: "통제 가능한 요소가 지금 있는지 생각해보세요",
      flag: s => s >= 4, flagLabel: "즉각 행동 필요"
    },
    {
      q: "만약 그 일이 일어난다면, 나는 어떻게든 버텨낼 수 있을 것 같은가?",
      sub: "나의 회복력과 대처 능력을 떠올려보세요",
      flag: s => s <= 2, flagLabel: "자기효능감 낮음"
    },
    {
      q: "이 불안이 같은 주제로 반복해서 떠오르는가?",
      sub: "반복 소환 여부는 신경망 고착화의 중요한 신호입니다",
      flag: s => s >= 4, flagLabel: "반추 패턴 감지"
    },
    {
      q: "불안의 원인이 내가 통제할 수 없는 외부 요인인가?",
      sub: "통제 불가능한 것에 에너지를 쏟고 있지 않은지",
      flag: s => s >= 4, flagLabel: "통제 불가 외부 요인"
    },
    {
      q: "지금 이 불안이 신체 증상으로 나타나고 있는가?",
      sub: "긴장, 불면, 심장 두근거림, 소화불량 등",
      flag: s => s >= 4, flagLabel: "신체화 증상 존재"
    },
    {
      q: "비슷한 걱정을 예전에도 했고, 결국 별일 없이 지나간 적이 있는가?",
      sub: "과거의 증거가 지금의 불안을 교정합니다",
      flag: s => s <= 2, flagLabel: "과거 회복 경험 인식 부족"
    }
  ]
};

/* ───────────────────────────────
   카테고리 정의
─────────────────────────────── */
const CAT = {
  done: {
    label: '처리 완료',
    emoji: '✅',
    desc: '질문들을 통해 이 감정은 충분히 검토되었습니다.\n뇌에게 종료 신호를 보내세요.\n다음에 이 생각이 떠오르면, 스스로에게 말하세요 — "이건 이미 처리했어."',
    badgeCls: 'badge-done',
    bigBadgeCls: 'bg-done',
    bigColor: '#1a6e3c',
    bigBg: '#d8f4e4'
  },
  processing: {
    label: '처리 중',
    emoji: '⏳',
    desc: '아직 정리가 더 필요한 부분이 있어요.\n지금 당장 결론 내리지 않아도 됩니다.\n며칠 후 다시 돌아보며 상황이 어떻게 달라졌는지 확인해보세요.',
    badgeCls: 'badge-processing',
    bigColor: '#7a5200',
    bigBg: '#fff2d6'
  },
  critical: {
    label: '분석 요망',
    emoji: '🔍',
    desc: '이 감정에는 더 깊은 분석이 필요합니다.\n혼자 안고 있기보다, 신뢰할 수 있는 사람과 나누거나 전문적 도움을 고려해보세요.\n문제를 직시하는 것이 이미 용기 있는 첫 걸음입니다.',
    badgeCls: 'badge-critical',
    bigColor: '#8a1a1a',
    bigBg: '#ffe4e4'
  }
};

/* ───────────────────────────────
   상태
─────────────────────────────── */
let state = {
  type: 'anger',
  step: 0,
  scores: [],
  flags: [],
  selected: null
};

let records = JSON.parse(localStorage.getItem('maum_records') || '[]');

/* ───────────────────────────────
   History API 모달 관리
─────────────────────────────── */
let modalOpen = false;

function openModal(type) {
  state = { type, step: 0, scores: [], flags: [], selected: null };
  const info = type === 'anger' ? '🔥 분노 처리' : '🌀 불안 처리';
  document.getElementById('sh-title').textContent = info;
  document.getElementById('overlay').classList.add('open');
  modalOpen = true;
  if (window.history.state?.modal !== true) {
    window.history.pushState({ modal: true }, '');
  }
  renderQ();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  modalOpen = false;
  if (window.history.state?.modal === true) {
    window.history.back();
  }
}

window.addEventListener('popstate', () => {
  if (modalOpen) {
    document.getElementById('overlay').classList.remove('open');
    modalOpen = false;
  }
});

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

/* ───────────────────────────────
   질문 렌더
─────────────────────────────── */
const HINTS = ['', '전혀 아니다', '아닌 편이다', '보통이다', '그런 편이다', '매우 그렇다'];

function renderQ() {
  const qs = Q[state.type];
  const total = qs.length;
  const i = state.step;

  const pct = Math.round((i / total) * 100);
  document.getElementById('sh-prog').style.width = pct + '%';
  document.getElementById('sh-step').textContent = `질문 ${i + 1} / ${total}`;

  state.selected = null;
  document.getElementById('btn-next').disabled = true;

  const q = qs[i];
  document.getElementById('sh-body').innerHTML = `
    <div class="q-text">${q.q}</div>
    <span class="q-sub">${q.sub}</span>
    <div class="scale-labels">
      <span>전혀 아니다</span>
      <span>매우 그렇다</span>
    </div>
    <div class="scale-row">
      ${[1,2,3,4,5].map(n => `<button class="scale-btn" id="sb${n}" onclick="pick(${n})">${n}</button>`).join('')}
    </div>
    <div class="scale-hint" id="hint"></div>
  `;

  document.getElementById('sh-footer').innerHTML = `
    <button class="btn-close-m" onclick="closeModal()">닫기</button>
    <button class="btn-next-m" id="btn-next" disabled onclick="nextStep()">다음</button>
  `;
}

function pick(n) {
  state.selected = n;
  [1,2,3,4,5].forEach(i => {
    document.getElementById('sb'+i).classList.toggle('sel', i === n);
  });
  const hint = document.getElementById('hint');
  if (hint) hint.textContent = HINTS[n];
  document.getElementById('btn-next').disabled = false;
}

function nextStep() {
  if (state.selected === null) return;
  const q = Q[state.type][state.step];
  state.scores.push(state.selected);
  if (q.flag(state.selected)) {
    state.flags.push({ label: q.flagLabel, score: state.selected });
  }
  state.step++;
  if (state.step >= Q[state.type].length) {
    showResult();
  } else {
    renderQ();
  }
}

/* ───────────────────────────────
   분류 로직 (플래그 기반)
─────────────────────────────── */
function classify() {
  const n = state.flags.length;
  if (n >= 3) return 'critical';
  if (n >= 1) return 'processing';
  return 'done';
}

/* ───────────────────────────────
   결과 화면
─────────────────────────────── */
function showResult() {
  const cat = classify();
  const info = CAT[cat];

  document.getElementById('sh-prog').style.width = '100%';
  document.getElementById('sh-step').textContent = '분석 완료';

  const flagHTML = state.flags.length > 0
    ? state.flags.map((f, idx) => {
        const cls = cat === 'critical' && idx === 0 ? 'dot-danger' : 'dot-warn';
        return `<div class="flag-item"><span class="flag-dot ${cls}"></span><span>${f.label} <span style="color:var(--txt3)">(${f.score}점)</span></span></div>`;
      }).join('')
    : `<div class="flag-item"><span class="flag-dot dot-ok"></span><span>특별한 위험 신호 없음</span></div>`;

  const descLines = info.desc.split('\n').map(l => `<p style="margin-bottom:6px">${l}</p>`).join('');

  document.getElementById('sh-body').innerHTML = `
    <div class="result-wrap">
      <div class="result-emoji">${info.emoji}</div>
      <div class="result-cat">${info.label}</div>
      <span class="result-badge-lg ${info.badgeCls}" style="background:${info.bigBg};color:${info.bigColor}">
        ${info.label}로 분류됨
      </span>
      <div class="result-desc">${descLines}</div>
      <div class="flag-box">
        <div class="flag-box-title">감지된 항목</div>
        ${flagHTML}
      </div>
      <button class="btn-confirm" onclick="confirmResult('${cat}')">기록하고 닫기</button>
    </div>
  `;

  document.getElementById('sh-footer').innerHTML = '';
}

/* ───────────────────────────────
   기록 저장 & 목록 렌더
─────────────────────────────── */
function confirmResult(cat) {
  const typeLabel = state.type === 'anger' ? '분노' : '불안';
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const dateStr = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

  const rec = {
    id: Date.now(),
    type: state.type,
    cat,
    typeLabel,
    dateStr,
    flagCount: state.flags.length,
    flagLabels: state.flags.map(f => f.label)
  };

  records.unshift(rec);
  localStorage.setItem('maum_records', JSON.stringify(records));
  closeModal();
  renderLists();
}

function renderLists() {
  const cats = ['done', 'processing', 'critical'];
  cats.forEach(cat => {
    const items = records.filter(r => r.cat === cat);
    const listEl = document.getElementById('list-' + cat);
    const cntEl  = document.getElementById('cnt-' + cat);
    cntEl.textContent = items.length;

    if (items.length === 0) {
      listEl.innerHTML = '<div class="empty-box">아직 없음</div>';
      return;
    }

    listEl.innerHTML = items.map(r => `
      <div class="record-card">
        <div class="rec-icon ${r.type}">${r.type === 'anger' ? '🔥' : '🌀'}</div>
        <div class="rec-info">
          <div class="rec-title">${r.typeLabel} 감정 처리</div>
          <div class="rec-meta">${r.dateStr} · 플래그 ${r.flagCount}개</div>
        </div>
        <span class="badge ${CAT[r.cat].badgeCls}">${CAT[r.cat].label}</span>
      </div>
    `).join('');
  });
}

/* ── 초기화 ── */
renderLists();
</script>
</body>
</html>
